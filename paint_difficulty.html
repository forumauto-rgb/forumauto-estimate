    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid #334155;
    position: sticky; top: 64px; z-index: 99;
  }
  .tab-btn {
    flex: 1; padding: 11px 4px; background: transparent;
    border: none; border-bottom: 3px solid transparent;
    color: var(--muted); cursor: pointer; font-size: 12px;
    font-weight: 700; font-family: 'Noto Sans JP', sans-serif;

  .tab-btn.active {

  }

  .search-input {

  .search-btn {

    border-radius: 6px; padding: 6px 10px;
    cursor: pointer; font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text); transition: all 0.2s;

  .quick-code { font-weight: 700; }

    background: var(--bg2); border-radius: 12px;

    background: var(--bg2); border-radius: 12px;

    </div>
  </div>

</div>

    note:"スズキ系シルバー。黒ずみの教科書的な代表色"
  },
  "D4S": {
    maker:"スバル", name:"アイスシルバーメタリック",
    level:"注意色（黒ずみ）", lc:"#8e44ad", surcharge:"10〜20%割増",
    type:"メタリック（シルバー系）",
    warns:[
      "【黒ずみ注意】青白い輝きが特徴で粒子の向きに非常に敏感",
      "ガン角度を一定に保ちドライ気味に仕上げることで黒ずみを防ぐ"
    ],
    proc:"シルバーメタリックベース → クリヤー",
    pigment:"中",
    note:"スバル系アイスシルバー。レガシィ・フォレスター等"
  },
  "NH731P": {
    maker:"ホンダ", name:"クリスタルブラックパール",
    level:"注意色", lc:"#8e44ad", surcharge:"10〜20%割増",
    type:"ブラックパール",
    warns:[
      "ブラック系パールは傷・磨きムラが最も目立つ",
      "ボカシ際の研磨でパール粒子が露出しやすい",
      "高品質仕上げには全パネル磨き込みを推奨"
    ],
    proc:"ブラックベース → パール → クリヤー",
    pigment:"中",
    note:"ホンダ最多採用黒パール。ステップワゴン・ヴェゼル等"
  }
};

const LEVEL_ORDER = {"超難色":0,"難色":1,"注意色（黒ずみ）":2,"注意色":3};

// ============================================================
// 初期化
// ============================================================
window.onload = function() {
  // クイックボタン生成
  const quickCodes = ["46V","46G","41V","083","070","QAB","X11","T29"];
  const qb = document.getElementById('quickBtns');
  quickCodes.forEach(code => {
    const d = DB[code];
    if(!d) return;
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.innerHTML = '<span class="quick-code" style="color:' + d.lc + '">' + code + '</span>'
      + '<span style="color:var(--dim);margin-left:5px">' + d.name.substring(0,8) + '</span>';
    btn.onclick = () => { document.getElementById('searchInput').value = code; doSearch(); };
    qb.appendChild(btn);
  });

  // 一覧生成
  renderList('all');
};

// ============================================================
// タブ切替
// ============================================================
function showTab(name) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ============================================================
// 検索
// ============================================================
function doSearch() {
  const code = document.getElementById('searchInput').value.trim().toUpperCase();
  const area = document.getElementById('resultArea');
  const quick = document.getElementById('quickArea');
  if(!code) return;

  const d = DB[code];
  if(!d) {
    quick.style.display = 'none';
    area.innerHTML = '<div class="not-found"><div class="not-found-icon">🔍</div>'
      + '<div style="color:var(--muted);font-size:14px">「' + code + '」はデータベースに未登録です</div>'
      + '<div style="color:var(--dim);font-size:12px;margin-top:8px">一覧タブで全登録色を確認、<br>またはAIアドバイスタブで相談できます</div>'
      + '<button class="back-btn" style="margin-top:14px" onclick="clearSearch()">← 戻る</button></div>';
    return;
  }

  quick.style.display = 'none';

  const pigColor = d.pigment.includes('非常に高') ? '#e74c3c' : d.pigment.includes('高') ? '#e67e22' : 'var(--text)';

  let warnsHtml = d.warns.map(w =>
    '<div class="warn-item"><span class="warn-arrow">▶</span><span>' + w + '</span></div>'
  ).join('');

  area.innerHTML = `
    <button class="back-btn" onclick="clearSearch()">← 戻る</button>
    <div class="result-card" style="border-left-color:${d.lc}">
      <div class="result-top">
        <div>
          <div class="result-code">${code}</div>
          <div class="result-maker">${d.maker}</div>
        </div>
        <span class="badge" style="background:${d.lc}">${d.level}</span>
      </div>
      <div class="result-name">${d.name}</div>
      <div class="result-type">${d.type}</div>

      <div class="info-block">
        <div class="info-block-title" style="color:var(--gold)">💴 見積り割増目安</div>
        <div class="surcharge-value">${d.surcharge}</div>
      </div>

      <div class="info-block">
        <div class="info-block-title" style="color:var(--red)">⚠️ 塗装注意事項</div>
        ${warnsHtml}
      </div>

      <div class="grid2">
        <div class="info-block" style="margin-bottom:0">
          <div class="info-block-title" style="color:var(--muted)">塗装工程</div>
          <div style="font-size:11px;margin-top:4px;line-height:1.6">${d.proc}</div>
        </div>
        <div class="info-block" style="margin-bottom:0">
          <div class="info-block-title" style="color:var(--muted)">顔料コスト</div>
          <div style="font-size:13px;font-weight:700;margin-top:4px;color:${pigColor}">${d.pigment}</div>
        </div>
      </div>

      ${d.note ? '<div class="info-block" style="margin-top:8px"><div class="info-block-title" style="color:var(--muted)">補足メモ</div><div style="font-size:12px;margin-top:4px">' + d.note + '</div></div>' : ''}

      <button class="ai-btn" onclick="requestAI('${code}')">🤖 AIが詳細アドバイスを生成する</button>
    </div>`;
}

function clearSearch() {
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('quickArea').style.display = '';
}

// ============================================================
// 一覧
// ============================================================
let currentFilter = 'all';
function renderList(filter) {
  currentFilter = filter;
  const area = document.getElementById('listArea');
  area.innerHTML = '';
  const entries = Object.entries(DB)
    .filter(([,v]) => filter === 'all' || v.level.includes(filter))
    .sort(([,a],[,b]) => (LEVEL_ORDER[a.level]??9) - (LEVEL_ORDER[b.level]??9));

  entries.forEach(([code, d]) => {
    const el = document.createElement('div');
    el.className = 'list-item';
    el.style.borderLeftColor = d.lc;
    el.innerHTML = `
      <div class="list-item-top">
        <div><span class="list-code">${code}</span><span class="list-name">${d.name}</span></div>
        <span class="badge" style="background:${d.lc};font-size:10px">${d.level}</span>
      </div>
      <div class="list-sub">${d.maker} ／ 割増：${d.surcharge}</div>`;
    el.onclick = () => {
      document.getElementById('searchInput').value = code;
      showTabDirect('search');
      doSearch();
    };
    area.appendChild(el);
  });
}

function filterList(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(filter);
}

function showTabDirect(name) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
}

// ============================================================
// AI アドバイス
// ============================================================
async function requestAI(code) {
  const d = DB[code];
  if(!d) return;

  // AIタブに切り替え
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-ai').classList.add('active');
  document.querySelectorAll('.tab-btn')[2].classList.add('active');

  document.getElementById('aiArea').innerHTML = `
    <div class="ai-loading">
      <div class="spinner"></div>
      <div style="color:var(--gold)">AIが詳細アドバイスを生成中...</div>
      <div style="color:var(--muted);font-size:12px;margin-top:6px">${code}：${d.name}</div>
    </div>`;

  const prompt = `あなたはフォーラムオート（静岡県袋井市）の57年の経験を持つベテラン板金塗装職人AIアシスタントです。
以下のカラーについて、見積り担当者・塗装職人向けに実践的なアドバイスを日本語で出力してください。

【カラー情報】
メーカー：${d.maker}
カラーコード：${code}
色名：${d.name}
難易度：${d.level}
塗装工程：${d.proc}
主な注意点：${d.warns.join('、')}

以下の4項目を見出し付きで記述してください：
1. 見積り時のポイント（割増理由の説明方法）
2. 塗装前の準備・確認事項
3. 施工中の最大注意点
4. 保険会社・お客様への説明トーク例（1〜2文）`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('') || '取得できませんでした';
    document.getElementById('aiArea').innerHTML = `
      <div class="ai-result">
        <div class="ai-result-title">🤖 AI詳細アドバイス ／ ${code}：${d.name}</div>
        <div class="ai-result-body">${text}</div>
      </div>`;
  } catch(e) {
    document.getElementById('aiArea').innerHTML = `
      <div class="ai-result">
        <div class="ai-result-title" style="color:var(--red)">⚠️ エラー</div>
        <div style="font-size:13px;color:var(--muted)">AIアドバイスの取得に失敗しました。<br>ネットワークを確認してください。</div>
      </div>`;
  }
}
</script>
</body>
</html>
