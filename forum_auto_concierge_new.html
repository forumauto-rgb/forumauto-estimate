<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>フォーラムオート｜ご相談窓口</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root {
  --bg: #f5f0eb;
  --white: #ffffff;
  --primary: #c0392b;
  --primary-light: #e74c3c;
  --dark: #2c2c2c;
  --mid: #666;
  --light: #999;
  --border: #e0d8d0;
  --bubble-staff: #ffffff;
  --bubble-user: #fff3e0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  font-size: 15px;
}

/* ===== トップ選択画面 ===== */
#topScreen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  background: linear-gradient(160deg, #fff8f5 0%, #f5f0eb 100%);
}
.logo-area { text-align: center; margin-bottom: 32px; }
.logo-fa {
  width: 64px; height: 64px; background: var(--primary);
  border-radius: 14px; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  font-size: 26px; font-weight: 900; color: white; letter-spacing: -1px;
}
.logo-name { font-size: 18px; font-weight: 700; color: var(--dark); }
.logo-sub { font-size: 12px; color: var(--light); margin-top: 3px; }

.top-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; line-height: 1.4; }
.top-sub { font-size: 13px; color: var(--mid); text-align: center; margin-bottom: 36px; line-height: 1.7; }

.mode-cards { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
.mode-card {
  background: var(--white);
  border-radius: 18px;
  padding: 22px 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 16px;
}
.mode-card:active { transform: scale(0.98); border-color: var(--primary); }
.mode-card { cursor: pointer; -webkit-tap-highlight-color: rgba(0,0,0,0.05); min-height: 80px; }
.mode-icon {
  width: 54px; height: 54px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.mode-icon.saki { background: #fff0f0; }
.mode-icon.takashi { background: #f0f4ff; }
.mode-card-text h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.mode-card-text p { font-size: 12px; color: var(--mid); line-height: 1.5; }
.mode-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; margin-left: 6px; vertical-align: middle;
}
.badge-a { background: #fff0f0; color: var(--primary); }
.badge-b { background: #f0f4ff; color: #3a5bd9; }

.top-footer { margin-top: 32px; text-align: center; }
.tel-link {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--white); border-radius: 50px; padding: 12px 24px;
  box-shadow: var(--shadow); color: var(--dark); text-decoration: none;
  font-weight: 700; font-size: 16px;
}
.tel-link span { font-size: 20px; }
.top-note { font-size: 11px; color: var(--light); margin-top: 10px; }

/* ===== チャット共通 ===== */
#chatScreen { display: none; flex-direction: column; height: 100vh; }

.chat-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.back-btn {
  background: none; border: none; font-size: 22px;
  cursor: pointer; padding: 4px; color: var(--mid);
}
.staff-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.staff-avatar.saki { background: #fff0f0; }
.staff-avatar.takashi { background: #f0f4ff; }
.staff-info h4 { font-size: 15px; font-weight: 700; }
.staff-info p { font-size: 11px; color: var(--light); }
.online-dot {
  width: 8px; height: 8px; background: #2ecc71;
  border-radius: 50%; margin-left: auto; flex-shrink: 0;
}

.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 16px 14px 20px;
  display: flex; flex-direction: column; gap: 14px;
}

/* バブル */
.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg-row.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.msg-avatar.saki { background: #fff0f0; }
.msg-avatar.takashi { background: #f0f4ff; }

.bubble {
  max-width: 78%; padding: 12px 15px;
  border-radius: 18px; font-size: 14px; line-height: 1.7;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.bubble.staff {
  background: var(--bubble-staff);
  border-bottom-left-radius: 4px;
}
.bubble.user {
  background: var(--bubble-user);
  border-bottom-right-radius: 4px;
  color: var(--dark);
}
.bubble-time { font-size: 10px; color: var(--light); margin-top: 3px; padding: 0 4px; }

/* 選択肢ボタン */
.choices {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 6px; padding-left: 42px;
}
.choice-btn {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 11px 18px;
  font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; text-align: left;
  transition: all 0.15s; color: var(--dark);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.choice-btn:active { background: #fff0f0; border-color: var(--primary); color: var(--primary); }
.choice-btn.selected { background: #fff0f0; border-color: var(--primary); color: var(--primary); pointer-events: none; }

/* タイピング */
.typing { display: flex; align-items: center; gap: 4px; padding: 12px 15px; }
.dot { width: 7px; height: 7px; background: var(--light); border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* 入力欄（Bモード） */
.chat-input-area {
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  display: flex; gap: 8px; align-items: flex-end;
}
.chat-input {
  flex: 1; border: 1.5px solid var(--border);
  border-radius: 22px; padding: 10px 16px;
  font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  outline: none; resize: none; max-height: 100px;
  line-height: 1.5; color: var(--dark);
}
.chat-input:focus { border-color: var(--primary); }
.send-btn {
  width: 42px; height: 42px; background: var(--primary);
  border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; transition: background 0.2s;
}
.send-btn:active { background: var(--primary-light); }
.voice-btn {
  width: 42px; height: 42px; background: #f0f4ff;
  border: 1.5px solid #c5d0f5; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

/* CTAボタン */
.cta-block {
  background: #fff8f0; border: 1.5px solid #f0d0b0;
  border-radius: 14px; padding: 16px; margin-top: 4px;
}
.cta-block p { font-size: 13px; color: var(--mid); margin-bottom: 12px; line-height: 1.6; }
.cta-tel {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--primary); color: white; border-radius: 50px;
  padding: 13px; font-weight: 700; font-size: 16px;
  text-decoration: none; margin-bottom: 8px;
}
.cta-line {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: #06c755; color: white; border-radius: 50px;
  padding: 11px; font-weight: 700; font-size: 14px;
  text-decoration: none;
}
</style>
</head>
<body>

<!-- ===== トップ画面 ===== -->
<div id="topScreen">
  <div class="logo-area">
    <div class="logo-fa">FA</div>
    <div class="logo-name">フォーラムオート</div>
    <div class="logo-sub">袋井市下山梨545｜鈑金塗装専門店</div>
  </div>

  <div class="top-title">お気軽にご相談ください😊</div>
  <div class="top-sub">
    車のキズ・へこみ・事故修理など<br>
    どんな小さなことでもお聞きします
  </div>

  <div class="mode-cards">

      </div>
    </div>
  </div>

  <div class="top-footer">
    <a href="tel:0538-49-0632" class="tel-link">
      <span>📞</span> 0538-49-0632
    </a>

  </div>
</div>

<!-- ===== チャット画面 ===== -->
<div id="chatScreen">
  <div class="chat-header">
    <button class="back-btn" onclick="goTop()" ontouchend="goTop()">←</button>
    <div class="staff-avatar" id="headerAvatar"></div>
    <div class="staff-info">
      <h4 id="headerName"></h4>
      <p id="headerSub"></p>
    </div>
    <div class="online-dot"></div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-area" id="inputArea" style="display:none">
    <textarea class="chat-input" id="chatInput" placeholder="メッセージを入力..." rows="1"
      oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="音声ON/OFF">🔊</button>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
// ============================================================
// 設定
// ============================================================
const ELEVENLABS_API_KEY = 'ee89c81a338891b8d030a3e17c55ca5ee594f235b17399cb9fa85553d42d3b0c';
const TAKASHI_VOICE_ID = 'LNzr3u01PIEDg0fRlvE7';
const TEL = '0538-49-0632';

let currentMode = '';
let voiceEnabled = true;
let stepA = 0;
let convHistory = [];

// ============================================================
// 画面切り替え
// ============================================================
function startMode(mode) {
  if(window._modeStarted) return;
  window._modeStarted = true;
  setTimeout(() => { window._modeStarted = false; }, 1000);
  currentMode = mode;
  document.getElementById('topScreen').style.display = 'none';
  const cs = document.getElementById('chatScreen');
  cs.style.display = 'flex';

  if(mode === 'A') {
    document.getElementById('headerAvatar').className = 'staff-avatar saki';
    document.getElementById('headerAvatar').textContent = '👩';
    document.getElementById('headerName').textContent = 'サキ（受付）';
    document.getElementById('headerSub').textContent = '選択式でご案内します';
    document.getElementById('inputArea').style.display = 'none';
    stepA = 0;
    startChatA();
  } else {
    document.getElementById('headerAvatar').className = 'staff-avatar takashi';
    document.getElementById('headerAvatar').textContent = '👨';
    document.getElementById('headerName').textContent = 'タカシ（スタッフ）';
    document.getElementById('headerSub').textContent = '音声＋文字でご対応します';
    document.getElementById('inputArea').style.display = 'flex';
    startChatB();
  }
}

function goTop() {
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('topScreen').style.display = 'flex';
  document.getElementById('chatMessages').innerHTML = '';
  convHistory = [];
  stepA = 0;
}

// ============================================================
// 共通：メッセージ追加
// ============================================================
function getTime() {
  const d = new Date();
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

function addStaffMsg(text, avatarClass, avatarIcon) {
  const box = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.innerHTML = `
    <div class="msg-avatar ${avatarClass}">${avatarIcon}</div>
    <div>
      <div class="bubble staff">${text}</div>
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  box.appendChild(row);
  scrollBottom();
}

function addUserMsg(text) {
  const box = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div>
      <div class="bubble user">${text}</div>
      <div class="bubble-time" style="text-align:right">${getTime()}</div>
    </div>`;
  box.appendChild(row);
  scrollBottom();
}

function addChoices(items, callback) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'choices';
  div.id = 'choices-' + Date.now();
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = item;
    btn.onclick = () => {
      div.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      btn.classList.add('selected');
      addUserMsg(item);
      setTimeout(() => callback(item), 400);
    };
    div.appendChild(btn);
  });
  box.appendChild(div);
  scrollBottom();
}

function addTyping(avatarClass, avatarIcon) {
  const box = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.id = 'typing';
  row.innerHTML = `
    <div class="msg-avatar ${avatarClass}">${avatarIcon}</div>
    <div class="bubble staff typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  box.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function addCTA() {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.style.paddingLeft = '42px';
  div.innerHTML = `
    <div class="cta-block">
      <p>📍 静岡県袋井市下山梨545<br>まずはお電話またはお気軽にお立ち寄りください😊</p>
      <a href="tel:${TEL}" class="cta-tel">📞 ${TEL}に電話する</a>
      <a href="https://line.me/ti/g/dUCBJhxCE-" class="cta-line">💬 LINEで写真を送る</a>
    </div>`;
  box.appendChild(div);
  scrollBottom();
}

function scrollBottom() {
  const box = document.getElementById('chatMessages');
  setTimeout(() => box.scrollTop = box.scrollHeight, 100);
}

// ============================================================
// ElevenLabs 音声
// ============================================================
async function speak(text) {
  if(!voiceEnabled) return;
  const clean = text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27FF}]/gu, '')
    .replace(/😊|😢|💦|👍|🙏|📷|💬|📞/g, '')
    .replace(/\n/g, '。')
    // ===== 漢字読み仮名変換 =====
    .replace(/お首/g, 'おくび')
    .replace(/お体/g, 'おからだ')
    .replace(/診て/g, 'みて')
    .replace(/診察/g, 'しんさつ')
    .replace(/相手方/g, 'あいてがた')
    .replace(/相手/g, 'あいて')
    .replace(/保険が使える/g, 'ほけんがつかえる')
    .replace(/使える/g, 'つかえる')
    .replace(/使えない/g, 'つかえない')
    .replace(/お車/g, 'おくるま')
    .replace(/車両/g, 'しゃりょう')
    .replace(/傷/g, 'きず')
    .replace(/キズ/g, 'きず')
    .replace(/修理/g, 'しゅうり')
    .replace(/板金/g, 'ばんきん')
    .replace(/塗装/g, 'とそう')
    .replace(/部品/g, 'ぶひん')
    .replace(/費用/g, 'ひよう')
    .replace(/保険/g, 'ほけん')
    .replace(/使用/g, 'しよう')
    .replace(/ご使用/g, 'ごしよう')
    .replace(/車体/g, 'しゃたい')
    .replace(/鈑金/g, 'ばんきん')
    .replace(/概算/g, 'がいさん')
    .replace(/自費/g, 'じひ')
    .replace(/等級/g, 'とうきゅう')
    .replace(/見積/g, 'みつもり')
    .replace(/損傷/g, 'そんしょう')
    .replace(/交換/g, 'こうかん')
    .replace(/対応/g, 'たいおう')
    .replace(/加入/g, 'かにゅう')
    .replace(/更新/g, 'こうしん')
    .replace(/請求/g, 'せいきゅう')
    .replace(/事故/g, 'じこ')
    .replace(/物損/g, 'ぶっそん')
    .replace(/届け出/g, 'とどけで')
    .replace(/来店/g, 'らいてん')
    .replace(/予約/g, 'よやく')
    .replace(/状態/g, 'じょうたい')
    .replace(/程度/g, 'ていど')
    .replace(/負担/g, 'ふたん')
    .replace(/提案/g, 'ていあん')
    .trim();
  try {
    const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + TAKASHI_VOICE_ID, {
      method: 'POST',
      headers: {
        'xi-api-key': ELEVENLABS_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        text: clean,
        model_id: 'eleven_turbo_v2_5',
        voice_settings: {
          stability: 0.55,
          similarity_boost: 0.80,
          style: 0.35,
          use_speaker_boost: true,
          speed: 1.1
        }
      })
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play();
  } catch(e) { console.log('音声エラー:', e); }
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('voiceBtn').textContent = voiceEnabled ? '🔊' : '🔇';
}

// ============================================================
// Aモード（サキ・選択式）
// ============================================================
const SAKI_AV = 'saki';
const SAKI_IC = '👩';

function staffMsgA(text) { addStaffMsg(text, SAKI_AV, SAKI_IC); }

function startChatA() {
  setTimeout(() => {
    staffMsgA('こんにちは😊 フォーラムオートのサキです。\nお車のことでご不安なことがあれば\nどんな小さなことでもお気軽に話しかけてください。\n一緒に考えますね🙏');
    setTimeout(() => {
      staffMsgA('まず、今日はどういったことでお困りですか？');
      addChoices([
        '🚗 車をぶつけてしまった',
        '🔍 キズやへこみに気づいた',
        '🚙 当て逃げされた・事故にあった',
        '💰 修理費用だけ知りたい',
        '🛡️ 保険で直せるか聞きたい',
        '📅 修理の予約がしたい',
        '❓ その他・相談したい'
      ], handleA_Q1);
    }, 800);
  }, 500);
}

function handleA_Q1(ans) {
  addTyping(SAKI_AV, SAKI_IC);
  setTimeout(() => {
    removeTyping();
    if(ans.includes('ぶつけて')) {
      staffMsgA('それは心配でしたね💦\n大事なお車に傷がついてしまうと\nほんとうにつらいですよね…\n\nどのあたりをぶつけてしまいましたか？');
      addChoices(['ドア','バンパー（前）','バンパー（後ろ）','フェンダー','ボンネット','トランク','ルーフ（屋根）','サイドミラー','ホイール・タイヤ','複数箇所・よく分からない'], handleA_Q2_part);
    } else if(ans.includes('キズ')) {
      staffMsgA('それは気になりますよね😢\n大切なお車のキズを見つけた時って\nほんとうに嫌な気持ちになりますよね…\n\nいつ頃気づかれましたか？\n原因が分からなくても大丈夫ですよ😊');
      addChoices(['今日気づいた','数日前から気になっていた','いつからか分からない'], (a) => {
        addTyping(SAKI_AV, SAKI_IC);
        setTimeout(() => {
          removeTyping();
          staffMsgA('そうでしたか。キズの場所はどのあたりですか？');
          addChoices(['ドア','バンパー','ボンネット','フェンダー','その他・複数箇所'], handleA_Q2_part);
        }, 800);

    if(txt.includes('バンパー') || txt.includes('ぶつけ') || txt.includes('傷') || txt.includes('キズ')) {
      fallback = '大事なお車に傷がついてしまったんですね😢\nそれはつらいですよね…\n\nどのくらいの傷でしたか？\nこすれた程度なのか、へこみや深い傷があるのかを\n教えていただけると助かります。\n場所はどのあたりでしょうか？';
    } else if(txt.includes('へこ') || txt.includes('凹')) {
      fallback = 'へこみがあるんですね💦\nそれは心配でしたね…\n\nへこみはどのくらいの大きさですか？\nこぶし大以上になると修理費用もそれなりになりますので\n保険のご使用も選択肢に入れておくと\n良いかもしれませんね。';
    } else if(txt.includes('保険')) {
      fallback = '保険のご相談ですね👍\n車両保険に入っていれば\nほぼ自己負担なしで直せるケースが多いですよ。\nまだの方は次回の更新でぜひご検討ください。\nまずお電話でご相談いただけますか？\n0538-49-0632です😊';
    } else if(txt.includes('費用') || txt.includes('いくら') || txt.includes('金額')) {
      fallback = '費用はお車の状態を実際に見てみないと\n正確にはお伝えが難しいんですよ😅\n最近は塗料や部品の値段が上がっていますので\n自費だと思ったより高くなることも。\n保険が使えるケースも多いので\nまず一度見せていただけますか？';
    } else if(txt.includes('タイヤ') || txt.includes('ホイール')) {
      fallback = 'ホイールやタイヤですね😊\nホイールは傷の程度によってリペアか交換になります。\nタイヤはパンクや変形があれば交換になりますね。\nまず実際に見せていただけますか？';
    }
    addStaffMsg(fallback, TAKASHI_AV, TAKASHI_IC);
    convHistory.push({ role: 'assistant', content: fallback });
    if(voiceEnabled) speak(fallback);
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
