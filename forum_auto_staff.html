<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォーラムオート 社員管理</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231a2744'/><text y='68' x='50' text-anchor='middle' font-size='52' fill='white'>👥</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Oswald:wght@400;600&display=swap');
:root {
  --primary:#1a2744;--accent:#e8392a;--accent2:#f5a623;--bg:#f0f2f5;--card:#ffffff;
  --text:#1a2744;--text-light:#6b7a99;--border:#d8dde8;--success:#2ecc71;
  --shadow:0 4px 20px rgba(26,39,68,0.10);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--primary);color:white;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.2);}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;}
.header-logo{display:flex;align-items:center;gap:10px;}
.header-logo .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header-logo h1{font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:1px;line-height:1.2;}
.header-logo p{font-size:11px;opacity:0.7;}
.tab-nav{background:var(--primary);border-top:1px solid rgba(255,255,255,0.1);display:flex;overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:10px 18px;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;}
.tab-btn.active{color:white;border-bottom-color:var(--accent);}
.main{padding:16px;max-width:960px;margin:0 auto;}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--bg);display:flex;align-items:center;gap:8px;}
.card-title .icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.icon-primary{background:var(--primary);color:white;}
.icon-accent{background:var(--accent);color:white;}
.icon-green{background:var(--success);color:white;}
.icon-orange{background:var(--accent2);color:white;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.stat-card{background:var(--card);border-radius:10px;padding:16px;box-shadow:var(--shadow);text-align:center;}
.stat-num{font-size:28px;font-weight:700;font-family:'Oswald',sans-serif;}
.stat-label{font-size:11px;color:var(--text-light);margin-top:4px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.toolbar input,.toolbar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:white;}
.toolbar input{flex:1;min-width:160px;}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--primary);color:white;}
.btn-accent{background:var(--accent);color:white;}
.btn-outline{background:white;color:var(--primary);border:2px solid var(--primary);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-green{background:var(--success);color:white;}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.staff-card{background:var(--card);border-radius:12px;padding:18px;box-shadow:var(--shadow);border:1.5px solid transparent;transition:all 0.2s;cursor:pointer;}
.staff-card:hover{border-color:var(--primary);transform:translateY(-2px);}
.staff-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.staff-name{font-size:16px;font-weight:700;}
.staff-role{font-size:12px;color:var(--text-light);margin-top:2px;}
.staff-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;}
.info-row{display:flex;flex-direction:column;gap:2px;}
.info-label{font-size:10px;color:var(--text-light);font-weight:700;}
.info-val{font-size:13px;color:var(--text);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-green{background:#e8f8ee;color:#1b8a4a;}
.badge-orange{background:#fff3e0;color:#e65100;}
.badge-red{background:#fff0ee;color:#e8392a;}
.badge-gray{background:#f0f2f5;color:#6b7a99;}
.badge-blue{background:#e8f0ff;color:#1a2744;}
.certs-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.cert-tag{padding:2px 8px;background:#e8f0ff;color:#1a2744;border-radius:20px;font-size:11px;font-weight:700;}
.card-actions{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bg);}
.years-bar{height:4px;background:#f0f2f5;border-radius:2px;margin-top:6px;}
.years-fill{height:4px;background:var(--primary);border-radius:2px;transition:width 0.5s;}
/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(26,39,68,0.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:white;border-radius:16px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--primary);}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text-light);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);}
.form-group textarea{min-height:70px;resize:vertical;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
/* カレンダー */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-label{text-align:center;font-size:11px;font-weight:700;color:var(--text-light);padding:6px 0;}
.cal-cell{min-height:60px;padding:4px;border:1px solid var(--border);border-radius:6px;background:white;font-size:12px;}
.cal-cell.today{background:#fff0ee;border-color:var(--accent);}
.cal-cell.other-month{opacity:0.4;}
.cal-date{font-size:11px;font-weight:700;margin-bottom:2px;}
.cal-event{background:var(--primary);color:white;border-radius:3px;padding:1px 4px;font-size:10px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event.cert{background:#2e7d32;}
.cal-event.holiday{background:var(--accent);}
/* ローディング */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(26,39,68,0.5);z-index:600;align-items:center;justify-content:center;}
.loading-overlay.show{display:flex;}
.loading-box{background:white;border-radius:16px;padding:32px 40px;text-align:center;}
.spinner{width:40px;height:40px;border:4px solid var(--bg);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--primary);color:white;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,0.2);transition:transform 0.3s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--success);}
.toast.error{background:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.empty{text-align:center;padding:40px;color:var(--text-light);}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}.staff-grid{grid-template-columns:1fr;}.stats{grid-template-columns:repeat(2,1fr);}}
@media print{.header,.tab-nav,.toolbar,.card-actions,.btn,.no-print{display:none!important;}.main{padding:0;}.card{box-shadow:none;border:1px solid #ddd;}}
</style>
</head>

// ========== 時計 ==========
function updateTime() {
  var now = new Date();
  var d = now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  var t = now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

// ========== タブ ==========
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'certs') renderCerts();
  if (name === 'calendar') renderCalendar();
}

// ========== Supabase ==========
async function sbQuery(table, method, body, filter) {
  method = method || 'GET'; filter = filter || '';
  var url = SUPABASE_URL + '/rest/v1/' + table + filter;
  var opts = {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : method === 'PATCH' ? 'return=minimal' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(url, opts);
  if (!res.ok) throw new Error(await res.text());
  // PATCH・DELETEはレスポンスボディが空なのでjson()を呼ばない
  if (method === 'DELETE' || method === 'PATCH') return null;
  return res.json();
}

// ========== 勤続年数計算 ==========
function calcYears(joinDate) {
  if (!joinDate) return 0;
  var now = new Date();
  var join = new Date(joinDate);
  var y = now.getFullYear() - join.getFullYear();
  var m = now.getMonth() - join.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < join.getDate())) y--;
  return Math.max(0, y);
}

function calcYearsMonths(joinDate) {
  if (!joinDate) return '—';
  var now = new Date();
  var join = new Date(joinDate);
  var y = now.getFullYear() - join.getFullYear();
  var m = now.getMonth() - join.getMonth();
  if (m < 0) { y--; m += 12; }
  if (now.getDate() < join.getDate()) m = Math.max(0, m - 1);
  return y + '年' + m + 'ヶ月';
}

// ========== アバター色 ==========

  {bg:'#fce4ec',c:'#880e4f'},{bg:'#e0f2f1',c:'#004d40'},{bg:'#ede7f6',c:'#4527a0'}
];
function avatarColor(i){ return AVATAR_COLORS[i % AVATAR_COLORS.length]; }
function initials(name){ return (name||'?').replace(/\s+/g,'').slice(0,2); }

// ========== ステータスバッジ ==========
function statusBadge(s) {
  var map = {'在籍':'badge-green','試用期間':'badge-orange','休職':'badge-red','退職':'badge-gray'};
  return '<span class="badge '+(map[s]||'badge-gray')+'">'+s+'</span>';
}

// ========== 読み込み ==========
async function loadStaff() {
  try {
    var data = await sbQuery('staff', 'GET', null, '?order=join_date.asc');
    allStaff = data || [];
    renderStats();
    filterStaff();

    renderStats();
    filterStaff();
    showToast('⚠ Supabase未接続：サンプルデータを表示中', 'error');
  }
}

// ========== 統計 ==========
function renderStats() {
  var total = allStaff.length;
  var active = allStaff.filter(function(s){return s.status==='在籍';}).length;
  var avgY = total ? Math.round(allStaff.reduce(function(sum,s){return sum+calcYears(s.join_date);},0)/total) : 0;
  var depts = [...new Set(allStaff.map(function(s){return s.dept;}))].length;
  document.getElementById('statsArea').innerHTML =
    '<div class="stat-card"><div class="stat-num" style="color:var(--primary);">'+total+'</div><div class="stat-label">👥 総社員数</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:var(--success);">'+active+'</div><div class="stat-label">✅ 在籍中</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:var(--accent2);">'+avgY+'</div><div class="stat-label">📅 平均勤続（年）</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:var(--accent);">'+depts+'</div><div class="stat-label">🏢 部署数</div></div>';

// ========== フィルター・表示 ==========
function filterStaff() {
  var q = (document.getElementById('searchInput').value||'').toLowerCase();
  var dept = document.getElementById('deptFilter').value;
  var st = document.getElementById('statusFilter').value;
  var filtered = allStaff.filter(function(s){
    var match = !q || (s.name||'').toLowerCase().includes(q) || (s.dept||'').includes(q) || (s.role||'').includes(q) || (s.name_kana||'').includes(q);
    var dMatch = !dept || s.dept === dept;
    var sMatch = !st || s.status === st;
    return match && dMatch && sMatch;
  });
  renderStaffGrid(filtered);
}

function renderStaffGrid(list) {
  var el = document.getElementById('staffGrid');
  if (!list.length) { el.innerHTML = '<div class="empty">該当する社員がいません</div>'; return; }
  el.innerHTML = list.map(function(s, i) {
    var yrs = calcYears(s.join_date);
    var ac = avatarColor(i);
    var certs = (s.certs||'').split(',').filter(function(c){return c.trim();});
    var certTags = certs.slice(0,3).map(function(c){return '<span class="cert-tag">'+c.trim()+'</span>';}).join('');
    if (certs.length > 3) certTags += '<span class="cert-tag">+' + (certs.length-3) + '</span>';
    var maxY = 40;
    var pct = Math.min(100, Math.round(yrs/maxY*100));
    return '<div class="staff-card" onclick="showDetail(\''+s.id+'\')">'+
      '<div class="staff-card-header">'+
        '<div class="avatar" style="background:'+ac.bg+';color:'+ac.c+';">'+initials(s.name)+'</div>'+
        '<div>'+
          '<div class="staff-name">'+s.name+'</div>'+
          '<div class="staff-role">'+(s.name_kana?s.name_kana+' / ':'')+(s.role||'')+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="staff-info">'+
        '<div class="info-row"><span class="info-label">部署</span><span class="info-val">'+(s.dept||'—')+'</span></div>'+
        '<div class="info-row"><span class="info-label">ステータス</span><span class="info-val">'+statusBadge(s.status||'在籍')+'</span></div>'+
        '<div class="info-row"><span class="info-label">入社日</span><span class="info-val">'+(s.join_date||'—')+'</span></div>'+
        '<div class="info-row"><span class="info-label">勤続</span><span class="info-val"><strong>'+calcYearsMonths(s.join_date)+'</strong></span></div>'+
      '</div>'+
      '<div class="years-bar"><div class="years-fill" style="width:'+pct+'%;"></div></div>'+
      (certTags ? '<div class="certs-list">'+certTags+'</div>' : '')+
      '<div class="card-actions no-print">'+
        '<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEditModal(\''+s.id+'\')">✏️ 編集</button>'+
        '<button class="btn btn-sm" style="background:#fff0ee;color:var(--accent);" onclick="event.stopPropagation();deleteStaff(\''+s.id+'\',\''+s.name+'\')">🗑 削除</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ========== 詳細モーダル ==========
function showDetail(id) {
  var s = allStaff.find(function(x){return x.id===id;});
  if (!s) return;
  var i = allStaff.indexOf(s);
  var ac = avatarColor(i);
  var certs = (s.certs||'').split(',').filter(function(c){return c.trim();});
  document.getElementById('detailContent').innerHTML =
    '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">'+
      '<div class="avatar" style="width:64px;height:64px;font-size:24px;background:'+ac.bg+';color:'+ac.c+';">'+initials(s.name)+'</div>'+
      '<div>'+
        '<div style="font-size:20px;font-weight:700;">'+s.name+'</div>'+
        '<div style="font-size:13px;color:var(--text-light);">'+(s.name_kana||'')+'</div>'+
        '<div style="margin-top:4px;">'+statusBadge(s.status||'在籍')+'</div>'+
      '</div>'+
    '</div>'+
    '<table style="width:100%;font-size:13px;border-collapse:collapse;">'+
      row('部署', s.dept||'—') +
      row('役職', s.role||'—') +
      row('入社日', s.join_date||'—') +
      row('勤続年数', '<strong>'+calcYearsMonths(s.join_date)+'</strong>') +
      row('電話番号', s.phone ? '<a href="tel:'+s.phone+'">'+s.phone+'</a>' : '—') +
      row('緊急連絡先', s.emergency_contact||'—') +
      row('備考', s.notes||'—') +
    '</table>'+
    (certs.length ? '<div style="margin-top:14px;"><div style="font-size:11px;font-weight:700;color:var(--text-light);margin-bottom:6px;">資格・免許</div><div class="certs-list">'+certs.map(function(c){return '<span class="cert-tag">'+c.trim()+'</span>';}).join('')+'</div></div>' : '');
  document.getElementById('detailEditBtn').onclick = function(){ closeDetailModal(); openEditModal(id); };
  document.getElementById('detailDeleteBtn').onclick = function(){ closeDetailModal(); deleteStaff(id, s.name); };
  document.getElementById('detailModal').style.display = 'flex';
}
function row(label, val) {
  return '<tr><td style="padding:7px 0;color:var(--text-light);width:100px;font-size:12px;">'+label+'</td><td style="padding:7px 0;">'+val+'</td></tr>';
}
function closeDetailModal() { document.getElementById('detailModal').style.display='none'; }

// ========== 追加・編集モーダル ==========
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '社員追加';
  ['fName','fKana','fRole','fPhone','fEmergency','fCerts','fNotes'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  document.getElementById('fDept').value = '板金・塗装';
  document.getElementById('fStatus').value = '在籍';
  document.getElementById('fJoinDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('staffModal').style.display = 'flex';
}
function openEditModal(id) {
  var s = allStaff.find(function(x){return x.id===id;});
  if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '社員編集：' + s.name;
  document.getElementById('fName').value = s.name||'';
  document.getElementById('fKana').value = s.name_kana||'';
  document.getElementById('fDept').value = s.dept||'板金・塗装';
  document.getElementById('fRole').value = s.role||'';
  document.getElementById('fJoinDate').value = s.join_date||'';
  document.getElementById('fStatus').value = s.status||'在籍';
  document.getElementById('fPhone').value = s.phone||'';
  document.getElementById('fEmergency').value = s.emergency_contact||'';
  document.getElementById('fCerts').value = s.certs||'';
  document.getElementById('fNotes').value = s.notes||'';
  document.getElementById('staffModal').style.display = 'flex';
}
function closeModal() { document.getElementById('staffModal').style.display='none'; }

async function saveStaff() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { showToast('氏名は必須です', 'error'); return; }
  var payload = {
    name: name,
    name_kana: document.getElementById('fKana').value.trim(),
    dept: document.getElementById('fDept').value,
    role: document.getElementById('fRole').value.trim(),
    join_date: document.getElementById('fJoinDate').value || null,
    status: document.getElementById('fStatus').value,
    phone: document.getElementById('fPhone').value.trim(),
    emergency_contact: document.getElementById('fEmergency').value.trim(),
    certs: document.getElementById('fCerts').value.trim(),
    notes: document.getElementById('fNotes').value.trim()
  };
  showLoading('保存中...');
  try {
    if (editingId) {
      await sbQuery('staff', 'PATCH', payload, '?id=eq.'+editingId);
      showToast(name+' を更新しました ✅', 'success');
    } else {
      await sbQuery('staff', 'POST', payload);
      showToast(name+' を登録しました ✅', 'success');
    }
    closeModal();
    await loadStaff();
  } catch(e) {
    showToast('保存失敗: '+e.message, 'error');
  } finally { hideLoading(); }
}

async function deleteStaff(id, name) {
  if (!confirm('「'+name+'」を削除しますか？この操作は元に戻せません。')) return;
  showLoading('削除中...');
  try {
    await fetch(SUPABASE_URL+'/rest/v1/staff?id=eq.'+id, {
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    showToast(name+' を削除しました', 'success');
    await loadStaff();
  } catch(e) { showToast('削除失敗: '+e.message, 'error'); }
  finally { hideLoading(); }
}

// ========== 資格タブ ==========
function renderCerts() {
  var certsMap = {};
  allStaff.forEach(function(s) {
    (s.certs||'').split(',').forEach(function(c) {
      c = c.trim();
      if (!c) return;
      if (!certsMap[c]) certsMap[c] = [];
      certsMap[c].push(s.name);
    });
  });
  var keys = Object.keys(certsMap).sort();
  if (!keys.length) { document.getElementById('certsTable').innerHTML='<div class="empty">資格データなし</div>'; return; }
  var h = '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
  h += '<tr style="background:var(--bg);"><th style="padding:10px;text-align:left;border-bottom:2px solid var(--border);">資格・免許</th><th style="padding:10px;text-align:left;border-bottom:2px solid var(--border);">取得者</th><th style="padding:10px;text-align:center;border-bottom:2px solid var(--border);">人数</th></tr>';
  keys.forEach(function(cert) {
    h += '<tr style="border-bottom:1px solid var(--border);">';
    h += '<td style="padding:10px;"><span class="cert-tag">'+cert+'</span></td>';
    h += '<td style="padding:10px;color:var(--text);">'+certsMap[cert].join('、')+'</td>';
    h += '<td style="padding:10px;text-align:center;font-weight:700;">'+certsMap[cert].length+'名</td>';
    h += '</tr>';
  });
  h += '</table>';
  document.getElementById('certsTable').innerHTML = h;
  document.getElementById('expiringCerts').innerHTML = '<div class="empty" style="color:var(--success);">✅ 現在期限切れ間近の資格はありません</div>';
}

var GCAL_API_KEY = 'AIzaSyDSYtJFo8rBD4ibV82uWPZTC65hIN3x3_A';
var GCAL_ID = 'c_3203387bbac9311a212cf7f50d243c0cbdffd02278ecd10014b23280d92ccdf9@group.calendar.google.com';

function renderCalendar() {

async function loadUpcomingEvents() {
  var statusEl = document.getElementById('eventsLoadStatus');
  var listEl = document.getElementById('upcomingEvents');
  if (statusEl) statusEl.textContent = '読み込み中...';
  var now = new Date();
  var future = new Date(now.getTime() + 30*24*60*60*1000);
  var timeMin = now.toISOString();
  var timeMax = future.toISOString();
  var url = 'https://www.googleapis.com/calendar/v3/calendars/'
    + encodeURIComponent(GCAL_ID)
    + '/events?key=' + GCAL_API_KEY
    + '&timeMin=' + encodeURIComponent(timeMin)
    + '&timeMax=' + encodeURIComponent(timeMax)
    + '&singleEvents=true&orderBy=startTime&maxResults=20';
  try {
    var res = await fetch(url);
    if (!res.ok) {
      var err = await res.json();
      throw new Error(err.error ? err.error.message : 'APIエラー');
    }
    var data = await res.json();
    var items = data.items || [];
    if (statusEl) statusEl.textContent = items.length + '件';
    if (!items.length) {
      listEl.innerHTML = '<div class="empty">直近30日間の予定はありません</div>';
      return;
    }
    listEl.innerHTML = items.map(function(ev) {
      var start = ev.start.dateTime || ev.start.date;
      var dt = new Date(start);
      var isAllDay = !ev.start.dateTime;
      var dateStr = dt.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
      var timeStr = isAllDay ? '終日' : dt.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      var today = new Date();
      var isToday = dt.toDateString() === today.toDateString();
      var isTomorrow = dt.toDateString() === new Date(today.getTime()+86400000).toDateString();
      var dayLabel = isToday ? '<span style="background:var(--accent);color:white;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;">今日</span>'
                   : isTomorrow ? '<span style="background:var(--accent2);color:white;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;">明日</span>' : '';
      return '<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bg);">'
        + '<div style="min-width:48px;height:48px;background:'+(isToday?'var(--accent)':'var(--primary)')+';color:white;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">'
        + '<div style="font-size:16px;font-weight:700;line-height:1;">'+dt.getDate()+'</div>'
        + '<div style="font-size:10px;opacity:0.8;">'+(dt.getMonth()+1)+'月</div>'
        + '</div>'
        + '<div style="flex:1;">'
        + '<div style="font-size:14px;font-weight:700;color:var(--text);">'+(ev.summary||'（タイトルなし）')+dayLabel+'</div>'
        + '<div style="font-size:12px;color:var(--text-light);margin-top:3px;">📅 '+dateStr+'　⏰ '+timeStr+'</div>'
        + (ev.location ? '<div style="font-size:12px;color:var(--text-light);margin-top:2px;">📍 '+ev.location+'</div>' : '')
        + (ev.description ? '<div style="font-size:12px;color:var(--text-light);margin-top:2px;white-space:pre-line;">'+ev.description.slice(0,80)+'</div>' : '')
        + '</div>'
        + '<button onclick="openEvent(this)" data-url="' + (ev.htmlLink||'') + '" style="background:var(--bg);border:none;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;flex-shrink:0;">詳細</button>'
        + '</div>';
    }).join('');
  } catch(e) {
    if (statusEl) statusEl.textContent = 'エラー';
    listEl.innerHTML = '<div style="padding:16px;background:#fff0ee;border-radius:8px;font-size:13px;color:var(--accent);">'
      + '⚠️ カレンダーの読み込みに失敗しました<br>'
      + '<span style="font-size:12px;color:#888;">' + e.message + '</span><br><br>'
      + '<span style="font-size:12px;color:#555;">カレンダーを「一般公開」に設定するか、APIキーの制限を確認してください。</span>'
      + '</div>';
  }
}

// ========== ユーティリティ ==========
function openEvent(btn) {
  var url = btn.getAttribute('data-url');
  if (url) window.open(url, '_blank');
}

function showToast(msg, type) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast'+(type?' '+type:'')+' show';
  setTimeout(function(){el.classList.remove('show');},3500);
}
function showLoading(msg){ document.getElementById('loadingText').textContent=msg||'処理中...'; document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading(){ document.getElementById('loadingOverlay').classList.remove('show'); }

// ========== 初期化 ==========
document.addEventListener('DOMContentLoaded', function(){ loadStaff(); });
