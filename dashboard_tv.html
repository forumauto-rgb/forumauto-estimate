<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォーラムオート 作業状況 TV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1e;color:white;font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;}
.header{background:linear-gradient(135deg,#0d1b3e,#1a3a6b);border-bottom:2px solid #2196f3;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;height:66px;flex-shrink:0;}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{font-size:20px;font-weight:bold;color:#64b5f6;letter-spacing:1px;}
.tagline{font-size:12px;color:#90a4ae;}
.header-right{display:flex;align-items:center;gap:16px;}
.home-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;background:rgba(255,255,255,0.15);border-radius:8px;color:white;text-decoration:none;font-size:13px;font-weight:bold;border:1px solid rgba(255,255,255,0.2);}
.home-btn:hover{background:rgba(255,255,255,0.25);}
.clock-box{text-align:right;}
.clock{font-size:30px;font-weight:bold;color:white;letter-spacing:2px;font-variant-numeric:tabular-nums;}
.date-str{font-size:12px;color:#90a4ae;margin-top:1px;}
/* サマリーバー */
.summary-bar{display:flex;gap:0;background:#0d1b3e;border-bottom:1px solid #1a2a5e;height:62px;flex-shrink:0;}
.sum-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid #1a2a5e;padding:4px;}
.sum-item:last-child{border-right:none;}
.sum-label{font-size:10px;color:#78909c;margin-bottom:2px;}
.sum-value{font-size:24px;font-weight:900;line-height:1;}
.sum-unit{font-size:10px;color:#78909c;}
.sum-active{color:#64b5f6;}
.sum-warn{color:#ffb74d;}
.sum-ok{color:#81c784;}
/* メインエリア: カンバン + レンタカーパネル */
.main-wrap{display:flex;gap:8px;padding:8px 12px;height:calc(100vh - 66px - 62px - 46px);overflow:hidden;}
/* カンバン（左側・可変幅） */
.kanban-wrap{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;flex:1;overflow:hidden;}
/* ★ レンタカーパネル（右側） */
.rental-panel{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow:hidden;}
.rental-panel-header{background:linear-gradient(135deg,#e65100,#ff6d00);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:bold;display:flex;align-items:center;justify-content:space-between;}
.rental-panel-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.rental-panel-body::-webkit-scrollbar{width:3px;}
.rental-panel-body::-webkit-scrollbar-thumb{background:#2a3a5e;border-radius:2px;}
.rental-car-row{background:#111d3a;border:1px solid #1e2d5a;border-radius:8px;padding:7px 10px;}
.rental-car-row.busy{border-left:3px solid #ef5350;}
.rental-car-row.free{border-left:3px solid #66bb6a;}
.rc-name{font-size:12px;font-weight:bold;color:#e3f2fd;margin-bottom:2px;}
.rc-plate{font-size:10px;color:#546e7a;}
.rc-status{font-size:11px;font-weight:bold;margin-top:3px;}
.rc-status.busy{color:#ef5350;}
.rc-status.free{color:#66bb6a;}
.rc-who{font-size:10px;color:#ffb74d;margin-top:2px;}
.rc-date{font-size:10px;color:#78909c;}
.column{background:#0d1b3e;border-radius:8px;border:1px solid #1a2a5e;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.col-header{padding:6px 8px;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.col-count-badge{font-size:11px;font-weight:bold;background:rgba(255,255,255,0.15);padding:1px 7px;border-radius:10px;}
.col-body{overflow-y:auto;flex:1;padding:4px;}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:#2a3a5e;border-radius:2px;}
.h-受付{background:linear-gradient(135deg,#3949ab,#5c6bc0);}
.h-見積中{background:linear-gradient(135deg,#e65100,#f57c00);}
.h-作業待ち{background:linear-gradient(135deg,#01579b,#0288d1);}
.h-板金中{background:linear-gradient(135deg,#6a1b9a,#8e24aa);}
.h-塗装中{background:linear-gradient(135deg,#b71c1c,#d32f2f);}
.h-組付け磨き{background:linear-gradient(135deg,#00838f,#4dd0e1);}
.h-完成{background:linear-gradient(135deg,#1b5e20,#2e7d32);}
.h-納車済{background:linear-gradient(135deg,#37474f,#546e7a);}
.case-card{background:#111d3a;border:1px solid #1e2d5a;border-left:6px solid #2196f3;border-radius:6px;padding:16px 18px;margin-bottom:8px;}
.case-card.ins{border-left-color:#ef5350;}
.case-card.own{border-left-color:#ffa726;}
.case-card.done{border-left-color:#66bb6a;}
.card-name{font-size:32px;font-weight:bold;color:#e3f2fd;margin-bottom:6px;line-height:1.2;}
.card-car{font-size:24px;color:#90a4ae;line-height:1.2;}
.card-badges{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:2px;}
.cbadge{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:bold;}
.cbadge-ins{background:#1a237e;color:#90caf9;}
.cbadge-own{background:#4e342e;color:#ffcc80;}
.cbadge-staff{background:#1a237e;color:#ce93d8;}
.cbadge-total{background:#1b5e20;color:#a5d6a7;}
.cbadge-rental{background:#4a1500;color:#ffb74d;}
.card-date{font-size:9px;color:#546e7a;}
.footer{height:46px;background:#0d1b3e;border-top:1px solid #1a2a5e;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;color:#546e7a;flex-shrink:0;}
.footer-marquee{overflow:hidden;flex:1;margin:0 16px;}
.marquee-inner{white-space:nowrap;display:inline-block;animation:marquee 40s linear infinite;}
@keyframes marquee{0%{transform:translateX(100vw);}100%{transform:translateX(-200%);}}
.update-dot{width:7px;height:7px;border-radius:50%;background:#2e7d32;display:inline-block;margin-right:5px;}
.update-dot.blink{animation:blink 0.5s;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">🏭 フォーラムオート 作業状況</div>
      <div class="tagline">静岡県袋井市下山梨545　TEL: 0538-49-0632</div>
    </div>
  </div>
  <div class="header-right">
    <button onclick="openTvCalPopup()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;">📅 カレンダー</button>
    <a href="ダッシュボード.html" class="home-btn">🏠 ホームに戻る</a>

      <button onclick="changeZoom(-0.1)" style="width:28px;height:28px;border:none;border-radius:6px;background:rgba(255,255,255,0.15);color:white;font-size:18px;font-weight:bold;cursor:pointer;line-height:1;">－</button>

<div class="summary-bar">

  <div class="sum-item"><div class="sum-label">本日受付</div><div class="sum-value sum-warn" id="s-today">-</div><div class="sum-unit">台</div></div>

  <div class="sum-item"><div class="sum-label">塗装中</div><div class="sum-value" style="color:#ef9a9a" id="s-tosou">-</div><div class="sum-unit">台</div></div>
  <div class="sum-item"><div class="sum-label">組付け磨き</div><div class="sum-value" style="color:#4dd0e1" id="s-kumitsuke">-</div><div class="sum-unit">台</div></div>
  <div class="sum-item"><div class="sum-label">完成・納車待ち</div><div class="sum-value sum-ok" id="s-ready">-</div><div class="sum-unit">台</div></div>

<div class="main-wrap" id="mainWrap">
  <!-- カンバン（修理進捗） -->
  <div class="kanban-wrap" id="kanban">

        <button onclick="openTvRentalPopup()" style="background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;">🔍 拡大</button>
        <span id="rental-count" style="font-size:11px;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:10px;">-</span>

  <div class="footer-marquee"><span class="marquee-inner" id="marquee">フォーラムオート　板金・塗装・修理・レッカー　TEL: 0538-49-0632　30秒自動更新</span></div>

</div>

<script>
var SB_URL='https://uhppgdwbyrijnqpvusxw.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocHBnZHdieXJpam5xcHZ1c3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDEyMDksImV4cCI6MjA4OTExNzIwOX0.mJ2GXQUsRZAZ-VL6XTVTz3gfG3MTNtfnWxsIPU_DK60';
// ★ ズーム機能
var currentZoom = 1.0;
var MIN_ZOOM = 0.5;
var MAX_ZOOM = 2.5;

function applyZoom() {
  var wrap = document.getElementById('mainWrap');
  if (!wrap) return;
  // transform-origin を top left にして、スケール後に scroll で対応
  wrap.style.transformOrigin = 'top left';
  wrap.style.transform = 'scale(' + currentZoom + ')';
  // ズーム後のサイズ補正（はみ出し対応）
  wrap.style.width = (100 / currentZoom) + '%';
  wrap.style.height = 'calc((100vh - 66px - 62px - 46px) / ' + currentZoom + ')';
  document.getElementById('zoomLabel').textContent = Math.round(currentZoom * 100) + '%';
  // localStorage に保存
  try { localStorage.setItem('fa_tv_zoom', currentZoom); } catch(e) {}
}

function changeZoom(delta) {
  var next = Math.round((currentZoom + delta) * 10) / 10;
  if (next < MIN_ZOOM || next > MAX_ZOOM) return;
  currentZoom = next;
  applyZoom();
}

function resetZoom() {
  currentZoom = 1.0;
  applyZoom();
}

// 前回のズームを復元
(function() {
  try {
    var saved = parseFloat(localStorage.getItem('fa_tv_zoom'));
    if (saved && saved >= MIN_ZOOM && saved <= MAX_ZOOM) currentZoom = saved;
  } catch(e) {}
  // DOM準備後に適用
  document.addEventListener('DOMContentLoaded', function() { applyZoom(); });
})();

// キーボードショートカット（+/-キー）
document.addEventListener('keydown', function(e) {
  if (e.key === '+' || e.key === '=') changeZoom(0.1);
  if (e.key === '-' || e.key === '_') changeZoom(-0.1);
  if (e.key === '0') resetZoom();
});

var STATUSES=['受付','見積中','作業待ち','板金中','塗装中','組付け磨き','完成','納車済'];

function updateClock(){
  var n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
  var days=['日','月','火','水','木','金','土'];
  document.getElementById('dateStr').textContent=
    n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日（'+days[n.getDay()]+'）';
}
setInterval(updateClock,1000);
updateClock();

// ★ レンタカーマスタから状況を取得（正しいテーブル名）
async function loadRentalCars(){
  try{
    var r=await fetch(SB_URL+'/rest/v1/'+encodeURIComponent('レンタカーマスタ')+'?order='+encodeURIComponent('現在の状況')+'.asc&select=id,'+encodeURIComponent('車種')+','+encodeURIComponent('登録番号')+','+encodeURIComponent('金額')+','+encodeURIComponent('現在の状況')+','+encodeURIComponent('備考'),{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    return r.ok ? await r.json() : [];
  }catch(e){ return []; }
}

// ★ 貸出中レコードから「誰に」を取得
async function loadRentalActiveMap(){
  try{
    var r=await fetch(SB_URL+'/rest/v1/receptions?rental_needed=eq.true&type=neq.'+encodeURIComponent('レンタカー返却')+'&order=reception_datetime.desc&limit=50',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    var recs = r.ok ? await r.json() : [];
    var map = {};
    recs.forEach(function(rec){
      var key = rec.rental_type || rec.car_model || '';
      if(key && !map[key]) map[key] = rec;
    });
    return map;
  }catch(e){ return {}; }
}

async function loadAll(){
  var dot=document.getElementById('dot');
  dot.classList.add('blink');
  try{
    // 見積データ（納車済みは直近30日以内のみ取得）
    var r=await fetch(SB_URL+'/rest/v1/estimates?status=neq.deleted&order=estimate_date.desc&limit=200&select=id,estimate_no,customer_name,car_name,plate,repair_type,repair_status,staff_name,delivery_date,estimate_date,grand_total,updated_at',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    var allEstimates=r.ok?await r.json():[];

    // ★ 納車済み3日後自動非表示フィルタ
    var now = new Date();
    var estimates = allEstimates.filter(function(e){
      if((e.repair_status||'受付') !== '納車済') return true; // 納車済み以外は全表示
      // 納車済み → 納車予定日 or 更新日 or 見積日 から3日以内のみ表示
      var baseDate = e.delivery_date || e.updated_at || e.estimate_date;
      if(!baseDate) return false; // 日付不明は非表示
      var diff = (now - new Date(baseDate)) / (1000*60*60*24); // 日数差
      return diff <= 3; // 3日以内のみ表示
    });

    // ★ レンタカーマスタ（正しいテーブル）
    var rentalCars = await loadRentalCars();
    // ★ 貸出中詳細（誰に）
    var rentalActiveMap = await loadRentalActiveMap();

    renderAll(estimates, rentalCars, rentalActiveMap);
    document.getElementById('lastUpdate').textContent='最終更新: '+new Date().toLocaleTimeString('ja-JP');
  }catch(e){
    document.getElementById('lastUpdate').textContent='エラー: '+e.message;
  }
  setTimeout(function(){ dot.classList.remove('blink'); },600);
}

function renderAll(estimates, rentalCars, rentalActiveMap){
  var today=new Date().toISOString().split('T')[0];
  var active=estimates.filter(function(e){return e.repair_status!=='納車済';}).length;
  var todayC=estimates.filter(function(e){return e.estimate_date===today;}).length;
  var bankin=estimates.filter(function(e){return e.repair_status==='板金中';}).length;
  var tosou=estimates.filter(function(e){return e.repair_status==='塗装中';}).length;
  var kumitsuke=estimates.filter(function(e){return e.repair_status==='組付け磨き';}).length;
  var ready=estimates.filter(function(e){return e.repair_status==='完成';}).length;

  // ★ レンタカーマスタからカウント
  var rBusy = rentalCars.filter(function(r){return r['現在の状況']==='貸出中';}).length;
  var rFree = rentalCars.filter(function(r){return r['現在の状況']==='空き';}).length;

  document.getElementById('s-active').textContent=active;
  document.getElementById('s-today').textContent=todayC;
  document.getElementById('s-bankin').textContent=bankin;
  document.getElementById('s-tosou').textContent=tosou;
  document.getElementById('s-kumitsuke').textContent=kumitsuke;
  document.getElementById('s-ready').textContent=ready;
  document.getElementById('s-rental').textContent=rBusy;
  document.getElementById('s-free').textContent=rFree;

  // カンバン
  var kanban=document.getElementById('kanban');
  kanban.innerHTML=STATUSES.map(function(status){
    var cards=estimates.filter(function(e){return (e.repair_status||'受付')===status;});
    // ★ 納車済みカラムに注記を追加
    var headerExtra = status==='納車済'
      ? '<span style="font-size:9px;opacity:0.7;margin-left:4px;">3日後消去</span>'
      : '';
    return '<div class="column">'
      +'<div class="col-header h-'+status+'">'
      +'<span>'+status+headerExtra+'</span>'
      +'<span class="col-count-badge">'+cards.length+'</span>'
      +'</div>'
      +'<div class="col-body">'
      +(cards.length===0
        ?'<div style="text-align:center;color:#2a3a5e;padding:12px;font-size:11px;">─</div>'
        :cards.map(function(e){return renderCard(e, rentalActiveMap);}).join(''))
      +'</div></div>';
  }).join('');

  // ★ レンタカーパネル（右側）
  renderRentalPanel(rentalCars, rentalActiveMap);

  var activeNames=estimates.filter(function(e){return e.repair_status!=='納車済';}).map(function(e){
    return (e.customer_name||'')+'様（'+(e.car_name||'')+'）'+(e.repair_status||'');
  }).join('　／　');
  if(activeNames){
    document.getElementById('marquee').textContent='【進行中案件】 '+activeNames;
  }
}

// ★ レンタカーパネル描画
function renderRentalPanel(rentalCars, rentalActiveMap){
  var body = document.getElementById('rentalPanelBody');
  var cnt = document.getElementById('rental-count');
  var busy = rentalCars.filter(function(r){return r['現在の状況']==='貸出中';}).length;
  var total = rentalCars.length;
  if(cnt) cnt.textContent = busy+'台貸出中 / 全'+total+'台';

  // 空き→後ろ、貸出中→前に並べる
  var sorted = rentalCars.slice().sort(function(a,b){
    if(a['現在の状況']==='貸出中' && b['現在の状況']!=='貸出中') return -1;
    if(a['現在の状況']!=='貸出中' && b['現在の状況']==='貸出中') return 1;
    return 0;
  });

  if(!sorted.length){
    body.innerHTML='<div style="text-align:center;padding:16px;color:#546e7a;font-size:12px;">データなし</div>';
    return;
  }

  body.innerHTML = sorted.map(function(car){
    var isBusy = car['現在の状況'] === '貸出中';
    var carName = car['車種'] || '';
    var plate = car['登録番号'] || '';
    var price = car['金額'] ? '¥'+Number(car['金額']).toLocaleString()+'/日' : '';
    var rec = rentalActiveMap[carName];

    var whoLine = '';
    var dateLine = '';
    if(isBusy && rec){
      whoLine = '<div class="rc-who">👤 '+(rec.customer_name||'不明')+' 様</div>';
      var dt = rec.reception_datetime ? new Date(rec.reception_datetime).toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}) : '';
      var days = rec.reception_datetime ? Math.floor((new Date()-new Date(rec.reception_datetime))/86400000) : 0;
      var checklist = {};
      try{ checklist = JSON.parse(rec.checklist||'{}'); }catch(e){}
      var returnDate = checklist.rentalEnd ? '→'+checklist.rentalEnd+'返却予定' : '';
      dateLine = '<div class="rc-date">貸出日: '+dt+(days>0?' ('+days+'日経過)':'')+(returnDate?' '+returnDate:'')+'</div>';
      if(rec.note) dateLine += '<div class="rc-date">案件: '+rec.note+'</div>';
    }

    return '<div class="rental-car-row '+(isBusy?'busy':'free')+'">'
      +'<div class="rc-name">🚗 '+carName+'</div>'
      +'<div class="rc-plate">'+plate+(price?' / '+price:'')+'</div>'
      +'<div class="rc-status '+(isBusy?'busy':'free')+'">'+(isBusy?'● 貸出中':'○ 空き')+'</div>'
      +whoLine
      +dateLine
      +'</div>';
  }).join('');
}

// カードにレンタカー情報バッジを追加
function renderCard(e, rentalActiveMap){
  var repClass=e.repair_status==='完成'?'done':(e.repair_type==='own'?'own':'ins');
  return '<div class="case-card '+repClass+'">'
    +'<div class="card-name">'+(e.customer_name||'未設定')+'　様</div>'
    +'<div class="card-car">'+(e.car_name||'')+'</div>'
    +'</div>';
}

setInterval(loadAll,30000);
loadAll();
</script>

<script>
var TV_GCAL_BASE = 'https://calendar.google.com/calendar/embed?src='
  + 'c_3203387bbac9311a212cf7f50d243c0cbdffd02278ecd10014b23280d92ccdf9%40group.calendar.google.com'
  + '&ctz=Asia%2FTokyo&hl=ja&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&bgcolor=%23ffffff';
var tvCalCurrentView = 'MONTH';
var tvCalZoomLevel = 1.0;

function tvCalBuildUrl(mode, date) {
  var url = TV_GCAL_BASE + '&mode=' + mode;
  if (date) url += '&dates=' + date + '%2F' + date;
  return url;
}

function tvCalView(mode) {
  tvCalCurrentView = mode;
  var iframe = document.getElementById('tvGcalIframe');
  if (iframe) iframe.src = tvCalBuildUrl(mode);
  var map = { MONTH:'Month', WEEK:'Week', AGENDA:'Agenda' };
  ['Month','Week','Agenda'].forEach(function(m) {
    var btn = document.getElementById('tvBtn' + m);
    if (!btn) return;
    var active = (mode === m.toUpperCase());
    btn.style.background = active ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.15)';
    btn.style.color = active ? '#1a2744' : 'white';
  });
  if (iframe) iframe.style.scrolling = (mode === 'AGENDA') ? 'yes' : 'no';
}

function tvCalToday() {
  var today = new Date();
  var ymd = today.getFullYear()
    + ('0'+(today.getMonth()+1)).slice(-2)
    + ('0'+today.getDate()).slice(-2);
  var iframe = document.getElementById('tvGcalIframe');
  if (iframe) iframe.src = tvCalBuildUrl(tvCalCurrentView, ymd);
}

function tvCalZoom(delta) {
  tvCalZoomLevel = Math.min(2.0, Math.max(0.5, tvCalZoomLevel + delta));
  var wrap = document.getElementById('tvCalWrap');
  if (wrap) {
    wrap.style.transform = 'scale(' + tvCalZoomLevel + ')';
    wrap.style.transformOrigin = 'top left';
    wrap.style.width = Math.round(100 / tvCalZoomLevel) + '%';
    wrap.style.height = Math.round(100 / tvCalZoomLevel) + '%';
  }
  var lbl = document.getElementById('tvCalZoomLabel');
  if (lbl) lbl.textContent = Math.round(tvCalZoomLevel * 100) + '%';
}

function openTvCalPopup() {
  var m = document.getElementById('tvCalModal');
  if (m) m.style.display = 'flex';
}
function closeTvCalPopup() {
  var m = document.getElementById('tvCalModal');
  if (m) m.style.display = 'none';
}
function openTvRentalPopup() {
  var m = document.getElementById('tvRentalModal');
  if (!m) return;
  m.style.display = 'flex';
  var dst = document.getElementById('tvRentalModalGrid');
  if (!dst) return;
  // ★ rentalPanelBodyの内容をコピー（正しいコピー元）
  var src = document.getElementById('rentalPanelBody');
  if (src && src.innerHTML.trim()) {
    // パネル用の小さいカードをポップアップ用に大きく表示
    dst.innerHTML = src.innerHTML;
    // ポップアップ内のフォントを大きく調整
    dst.querySelectorAll('*').forEach(function(el){
      var fs = window.getComputedStyle(el).fontSize;
      if (fs) {
        var size = parseFloat(fs);
        if (size < 13) el.style.fontSize = '13px';
      }
    });
  } else {
    dst.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;font-size:14px;">データ読み込み中...</div>';
  }
}
function closeTvRentalPopup() {
  var m = document.getElementById('tvRentalModal');
  if (m) m.style.display = 'none';
}
// ESCキーで閉じる
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeTvCalPopup(); closeTvRentalPopup(); }
});
</script>
