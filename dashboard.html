<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォーラムオート 作業ダッシュボード</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0f2f5;min-height:100vh;}
.header{background:linear-gradient(135deg,#1a3a6b,#2196f3);color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header h1{font-size:18px;font-weight:bold;}
.header-right{display:flex;align-items:center;gap:12px;}
.refresh-btn{background:rgba(255,255,255,0.2);color:white;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;}
.refresh-btn:hover{background:rgba(255,255,255,0.3);}
.last-update{font-size:11px;opacity:0.8;}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:16px 20px 0;}
.sum-card{background:white;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.sum-card .label{font-size:11px;color:#888;margin-bottom:4px;}
.sum-card .value{font-size:24px;font-weight:bold;color:#1a3a6b;}
.sum-card .sub{font-size:11px;color:#aaa;margin-top:2px;}
.tabs{display:flex;gap:0;padding:16px 20px 0;border-bottom:2px solid #e0e0e0;margin:0 20px;}
.tab-btn{padding:10px 20px;font-size:13px;font-weight:bold;border:none;background:none;cursor:pointer;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab-btn.active{color:#1565c0;border-bottom-color:#1565c0;}
.kanban{display:flex;gap:12px;padding:16px 20px;overflow-x:auto;min-height:400px;}
.column{min-width:200px;flex-shrink:0;background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.col-header{padding:12px 14px;font-size:12px;font-weight:bold;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.col-count{font-size:11px;font-weight:normal;opacity:0.8;background:rgba(255,255,255,0.3);padding:1px 7px;border-radius:10px;}
.col-body{padding:8px;min-height:120px;}
.case-card{background:#f8f9ff;border:1.5px solid #e3e8ff;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;}
.case-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.1);transform:translateY(-1px);}
@keyframes blinkCard{0%,100%{border-color:#e65100;background:#fff8f0;}50%{border-color:#ff8f00;background:#ffe0b2;}}
.case-card-complete{animation:blinkCard 1.2s ease-in-out infinite;border:2px solid #e65100 !important;}
.case-card .cname{font-size:13px;font-weight:bold;color:#1a3a6b;}
.case-card .ccar{font-size:11px;color:#555;margin-top:2px;}
.case-card .cbadges{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:bold;}
.badge-ins{background:#e3f2fd;color:#1565c0;}
.badge-own{background:#fff3e0;color:#e65100;}
.badge-rent{background:#e8f5e9;color:#2e7d32;}
.case-card .cdate{font-size:10px;color:#aaa;margin-top:4px;}
.case-card .cstatus-sel{width:100%;margin-top:6px;font-size:11px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;background:white;}
.rental-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:16px 20px;}
.rental-card{background:white;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.08);border-top:4px solid #ccc;}
.rental-card.free{border-top-color:#2e7d32;}
.rental-card.busy{border-top-color:#e53935;}
.rental-card.maint{border-top-color:#f57c00;}
.rental-card .rname{font-size:14px;font-weight:bold;margin-bottom:4px;}
.rental-card .rplate{font-size:11px;color:#888;}
.rental-card .rstatus{font-size:11px;font-weight:bold;margin-top:6px;padding:3px 8px;border-radius:10px;display:inline-block;}
.rstatus-free{background:#e8f5e9;color:#2e7d32;}
.rstatus-busy{background:#fce4ec;color:#c62828;}
.rstatus-maint{background:#fff3e0;color:#e65100;}
.rental-card .rcustomer{font-size:11px;color:#555;margin-top:4px;}
#map-container{padding:16px 20px;}
#map{height:500px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.map-legend{display:flex;gap:12px;margin-top:8px;font-size:11px;color:#666;}
.map-legend span{display:flex;align-items:center;gap:4px;}
.loading{text-align:center;padding:40px;color:#888;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
@media(max-width:600px){
  .kanban{flex-direction:column;}
  .column{min-width:auto;}
  .summary{grid-template-columns:repeat(2,1fr);}
}
.notify{position:fixed;top:70px;right:16px;background:#1a3a6b;color:white;padding:10px 16px;border-radius:8px;font-size:12px;z-index:9999;display:none;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏭 フォーラムオート 作業ダッシュボード</h1>
  </div>
  <a href="ダッシュボード.html" style="display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(255,255,255,0.15);border-radius:8px;color:white;text-decoration:none;font-size:12px;font-weight:bold;">🏠 ホームに戻る</a>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">読み込み中...</span>
    <button class="refresh-btn" onclick="loadAll()">🔄 更新</button>
    <a href="https://forumauto-rgb.github.io/forumauto-estimate/" target="_blank" style="color:white;font-size:12px;text-decoration:none;background:rgba(255,255,255,0.2);padding:6px 12px;border-radius:8px;">📋 見積ソフト</a>
  </div>
</div>

<div class="summary" id="summary">
  <div class="sum-card"><div class="label">進行中案件</div><div class="value" id="s-active">-</div><div class="sub">台</div></div>
  <div class="sum-card"><div class="label">本日受付</div><div class="value" id="s-today">-</div><div class="sub">台</div></div>
  <div class="sum-card"><div class="label">代車貸出中</div><div class="value" id="s-rental">-</div><div class="sub">台</div></div>
  <div class="sum-card"><div class="label">代車空き</div><div class="value" id="s-rental-free">-</div><div class="sub">台</div></div>
  <div class="sum-card"><div class="label">完成待ち納車</div><div class="value" id="s-ready">-</div><div class="sub">台</div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('kanban',this)">📋 作業進捗</button>
  <button class="tab-btn" onclick="showTab('rental',this)">🚗 レンタカー</button>
  <button class="tab-btn" onclick="showTab('calendar',this)">📅 カレンダー</button>
  <button class="tab-btn" onclick="showTab('staff',this)">👥 社員管理</button>
  <button class="tab-btn" onclick="showTab('mapview',this)">📍 顧客マップ</button>
</div>

<div id="kanban" class="tab-panel active">
  <div class="kanban" id="kanbanBoard">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<div id="rental" class="tab-panel">
  <div style="padding:12px 20px 0;display:flex;justify-content:flex-end;">
    <button onclick="openRentalPopup();document.getElementById('rentalGridModal').innerHTML=document.getElementById('rentalGrid').innerHTML;" style="background:#1a3a6b;color:white;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;">🔍 大きく表示</button>
  </div>
  <div class="rental-grid" id="rentalGrid">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<div id="calendar" class="tab-panel">
  <div style="padding:16px 20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:700;color:#1a3a6b;">📅 フォーラムオート 社内カレンダー</div>
      <div style="display:flex;gap:8px;">
        <button onclick="addCalEvent()" style="background:#e8392a;color:white;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;">＋ 予定追加</button>
        <button onclick="openCalPopup()" style="background:#1a3a6b;color:white;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;">🔍 大きく表示</button>
        <button onclick="refreshCal()" style="background:#f0f2f5;color:#1a3a6b;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;">🔄 更新</button>
      </div>
    </div>
    <!-- Googleカレンダー埋め込み -->
    <div style="border-radius:10px;overflow:hidden;border:1.5px solid #d8dde8;">
      <iframe id="dashCalIframe"
        src="https://calendar.google.com/calendar/embed?src=c_3203387bbac9311a212cf7f50d243c0cbdffd02278ecd10014b23280d92ccdf9%40group.calendar.google.com&ctz=Asia%2FTokyo&hl=ja&mode=MONTH&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0&bgcolor=%23ffffff"
        style="border:0;width:100%;height:580px;display:block;"
        frameborder="0" scrolling="no">
      </iframe>
    </div>
    <!-- 直近の予定 -->
    <div style="margin-top:16px;background:white;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <div style="font-size:13px;font-weight:700;color:#1a3a6b;margin-bottom:10px;">📋 直近30日の予定 <span id="dashCalCount" style="font-size:11px;font-weight:400;color:#888;"></span></div>
      <div id="dashCalEvents"><div style="text-align:center;padding:20px;color:#aaa;">読み込み中...</div></div>
    </div>
  </div>
</div>

<div id="staff" class="tab-panel">
  <div style="padding:16px 20px;">
    <!-- 統計カード -->
    <div id="staffStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;"></div>
    <!-- 検索バー -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
      <input type="text" id="dashStaffSearch" placeholder="名前・部署・役職で検索..." oninput="filterDashStaff()" style="flex:1;min-width:160px;padding:8px 12px;border:1.5px solid #d8dde8;border-radius:8px;font-size:13px;">
      <div style="display:flex;gap:5px;flex-wrap:wrap;" id="dashDeptBtns">
        <button class="dash-dept-btn active" data-dept="" onclick="toggleDashDept(this)" style="padding:5px 12px;border:1.5px solid #d8dde8;border-radius:20px;background:white;cursor:pointer;font-size:12px;font-weight:700;color:#6b7a99;">すべて</button>
        <button class="dash-dept-btn" data-dept="板金・塗装" onclick="toggleDashDept(this)" style="padding:5px 12px;border:1.5px solid #d8dde8;border-radius:20px;background:white;cursor:pointer;font-size:12px;font-weight:700;color:#6b7a99;">板金・塗装</button>
        <button class="dash-dept-btn" data-dept="整備" onclick="toggleDashDept(this)" style="padding:5px 12px;border:1.5px solid #d8dde8;border-radius:20px;background:white;cursor:pointer;font-size:12px;font-weight:700;color:#6b7a99;">整備</button>
        <button class="dash-dept-btn" data-dept="フロント" onclick="toggleDashDept(this)" style="padding:5px 12px;border:1.5px solid #d8dde8;border-radius:20px;background:white;cursor:pointer;font-size:12px;font-weight:700;color:#6b7a99;">フロント</button>
        <button class="dash-dept-btn" data-dept="事務・保険" onclick="toggleDashDept(this)" style="padding:5px 12px;border:1.5px solid #d8dde8;border-radius:20px;background:white;cursor:pointer;font-size:12px;font-weight:700;color:#6b7a99;">事務・保険</button>
        <button class="dash-dept-btn" data-dept="管理" onclick="toggleDashDept(this)" style="padding:5px 12px;border:1.5px solid #d8dde8;border-radius:20px;background:white;cursor:pointer;font-size:12px;font-weight:700;color:#6b7a99;">管理</button>
      </div>
      <a href="forum_auto_staff.html" style="background:#1a3a6b;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;">✏️ 社員管理を開く</a>
    </div>
    <!-- 社員カード一覧 -->
    <div id="dashStaffGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;">
      <div style="text-align:center;padding:30px;color:#aaa;">読み込み中...</div>
    </div>
  </div>
</div>

<div id="mapview" class="tab-panel">
  <div id="map-container">
    <div id="map"></div>
    <div class="map-legend">
      <span>🔵 進行中案件</span>
      <span>🟢 完成・納車待ち</span>
      <span>🔴 保険修理</span>
    </div>
  </div>
</div>

<div class="notify" id="notify"></div>

<script>
const SB_URL = 'https://uhppgdwbyrijnqpvusxw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocHBnZHdieXJpam5xcHZ1c3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDEyMDksImV4cCI6MjA4OTExNzIwOX0.mJ2GXQUsRZAZ-VL6XTVTz3gfG3MTNtfnWxsIPU_DK60';

const STATUSES = ['受付','見積中','作業待ち','板金中','塗装中','組付け磨き','完成','納車済'];

var allEstimates = [];
var allRentals = [];
var mapInstance = null;
var mapMarkers = [];

function getStatusColor(s){
  var colors = {
    '受付':'linear-gradient(135deg,#5c6bc0,#7986cb)',
    '見積中':'linear-gradient(135deg,#f57c00,#ffb74d)',
    '作業待ち':'linear-gradient(135deg,#0288d1,#4fc3f7)',
    '板金中':'linear-gradient(135deg,#7b1fa2,#ba68c8)',
    '塗装中':'linear-gradient(135deg,#c62828,#ef9a9a)',
    '組付け磨き':'linear-gradient(135deg,#00838f,#4dd0e1)',
    '完成':'linear-gradient(135deg,#2e7d32,#66bb6a)',
    '納車済':'linear-gradient(135deg,#455a64,#90a4ae)'
  };
  return colors[s] || '#888';
}

async function sbFetch(path){
  var r = await fetch(SB_URL + path, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function sbPatch(path, data){
  var r = await fetch(SB_URL + path, {
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });
  return r.ok;
}

async function loadAll(){
  document.getElementById('lastUpdate').textContent = '更新中...';
  try{
    var estimates = await sbFetch('/rest/v1/estimates?status=neq.deleted&order=estimate_date.desc&limit=100&select=id,estimate_no,customer_name,car_name,plate,repair_type,repair_status,staff_name,delivery_date,estimate_date,grand_total,memo');
    allEstimates = estimates || [];
    try{
      var rentals = await sbFetch('/rest/v1/' + encodeURIComponent('レンタカーマスタ') + '?order=' + encodeURIComponent('車種') + '.asc&select=*');
      allRentals = rentals || [];
    }catch(e){
      allRentals = [];
    }
    renderSummary();
    renderKanban();
    renderRental();
    if(document.getElementById('mapview').classList.contains('active')){
      renderMap();
    }
    document.getElementById('lastUpdate').textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
  }catch(e){
    document.getElementById('lastUpdate').textContent = 'エラー: ' + e.message;
    showNotify('⚠ データ読み込み失敗: ' + e.message);
  }
}

function renderSummary(){
  var today = new Date().toISOString().split('T')[0];
  var active = allEstimates.filter(function(e){ return e.repair_status !== '納車済' && e.repair_status !== '削除済'; }).length;
  var todayCount = allEstimates.filter(function(e){ return e.estimate_date === today; }).length;
  var ready = allEstimates.filter(function(e){ return e.repair_status === '完成'; }).length;
  var rentalBusy = allRentals.filter(function(r){ return (r['現在の状況']||r.status) === '貸出中'; }).length;
  var rentalFree = allRentals.filter(function(r){ return (r['現在の状況']||r.status) === '空き'; }).length;
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-today').textContent = todayCount;
  document.getElementById('s-rental').textContent = rentalBusy;
  document.getElementById('s-rental-free').textContent = rentalFree;
  document.getElementById('s-ready').textContent = ready;
}

async function deleteCard(event, id){
  event.stopPropagation();
  if (!confirm('このカードを削除しますか？')) return;
  await sbPatch('/rest/v1/estimates?id=eq.' + id, { repair_status: '削除済' });
  await loadAll();
}

function renderKanban(){
  var board = document.getElementById('kanbanBoard');
  var cols = '';
  STATUSES.forEach(function(status){
    var cards = allEstimates.filter(function(e){
      if (e.repair_status === '削除済') return false;
      return (e.repair_status || '受付') === status;
    });
    cols += '<div class="column">'
      + '<div class="col-header" style="color:white;background:' + getStatusColor(status) + '">'
      + status
      + '<span class="col-count">' + cards.length + '</span>'
      + '</div>'
      + '<div class="col-body">'
      + (cards.length === 0 ? '<div style="text-align:center;color:#ccc;padding:16px;font-size:11px;">なし</div>' : '')
      + cards.map(function(e){ return renderCard(e); }).join('')
      + '</div></div>';
  });
  board.innerHTML = cols;
}

function renderCard(e){
  var repType = e.repair_type === 'own' ? '自費' : '保険';
  var badgeClass = e.repair_type === 'own' ? 'badge-own' : 'badge-ins';
  var totalStr = e.grand_total ? '¥' + Math.round(e.grand_total).toLocaleString() : '';
  var opts = STATUSES.map(function(s){
    return '<option value="' + s + '"' + ((e.repair_status||'受付')===s?' selected':'') + '>' + s + '</option>';
  }).join('');
  var cardClass = e.repair_status === '完成' ? 'case-card case-card-complete' : 'case-card';
  return '<div class="' + cardClass + '" onclick="">'
    + '<div class="cname">' + (e.customer_name||'未設定') + ' 様</div>'
    + '<div class="ccar">' + (e.car_name||'') + ' ' + (e.plate||'') + '</div>'
    + '<div class="cbadges">'
    + '<span class="badge ' + badgeClass + '">' + repType + '</span>'
    + (e.staff_name ? '<span class="badge" style="background:#f3e5f5;color:#6a1b9a;">' + e.staff_name + '</span>' : '')
    + (totalStr ? '<span class="badge" style="background:#e8f5e9;color:#1b5e20;">' + totalStr + '</span>' : '')
    + '</div>'
    + (e.delivery_date ? '<div class="cdate">納車予定: ' + e.delivery_date + '</div>' : '')
    + (e.repair_status === '完成' ? '<button onclick="event.stopPropagation();openQCFromKanban(\'' + e.id + '\',\'' + e.estimate_no + '\',\'' + (e.customer_name||'') + '\',\'' + (e.car_name||'') + '\')" style="margin-top:6px;width:100%;padding:6px;background:#e65100;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;">✅ 品質チェック入力</button>' : '')
    + (e.repair_status === '納車済' ? '<button onclick="deleteCard(event,\'' + e.id + '\')" style="margin-top:6px;width:100%;padding:4px;background:#e74c3c;color:white;border:none;border-radius:4px;cursor:pointer;font-size:11px;">削除</button>' : '')
    + '<select class="cstatus-sel" onchange="updateStatus(\'' + e.id + '\',this.value)" onclick="event.stopPropagation()">'
    + opts + '</select>'
    + '</div>';
}

function openQCFromKanban(id, no, name, car){
  // ダッシュボード.htmlの品質チェック機能にリダイレクト
  if(window.openQualityCheck){
    openQualityCheck(id, no, name, car);
  } else {
    // ダッシュボード.htmlを開く
    window.open('ダッシュボード.html', '_blank');
  }
}

async function updateStatus(id, newStatus){
  if(newStatus === '完成'){
    var est = allEstimates.find(function(e){ return e.id === id; });
    var estimatedAmt = est ? Math.round(est.grand_total || 0) : 0;
    var input = prompt(
      '【完成確認】最終金額を確認してください。\n' +
      '見積金額：¥' + estimatedAmt.toLocaleString() + '\n\n' +
      '値引き等がある場合は修正してください。\n' +
      '確定金額（数字のみ）：',
      estimatedAmt
    );
    if(input === null) return;
    var confirmed = parseInt(input.replace(/,/g,''), 10);
    if(isNaN(confirmed)){ showNotify('⚠ 金額が正しくありません'); return; }
    var discount = estimatedAmt - confirmed;
    var ok = await sbPatch('/rest/v1/estimates?id=eq.' + id, {
      repair_status: '完成',
      confirmed_amount: confirmed,
      discount_amount: discount,
      confirmed_at: new Date().toISOString()
    });
    if(ok){
      showNotify('✅ 完成確定：¥' + confirmed.toLocaleString() + (discount !== 0 ? '（値引き¥' + discount.toLocaleString() + '）' : ''));
      var est2 = allEstimates.find(function(e){ return e.id === id; });
      if(est2){ est2.repair_status = '完成'; est2.confirmed_amount = confirmed; }
      renderSummary(); renderKanban();
    } else { showNotify('⚠ 更新失敗'); }
    return;
  }
  var ok = await sbPatch('/rest/v1/estimates?id=eq.' + id, {repair_status: newStatus});
  if(ok){
    showNotify('✅ ステータス更新: ' + newStatus);
    var est = allEstimates.find(function(e){ return e.id === id; });
    if(est){ est.repair_status = newStatus; }
    renderSummary(); renderKanban();
  } else { showNotify('⚠ 更新失敗'); }
}

var dashAllStaff = [];

function calcYearsDash(joinDate) {
  if (!joinDate) return 0;
  var now = new Date(), join = new Date(joinDate);
  var y = now.getFullYear() - join.getFullYear();
  var m = now.getMonth() - join.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < join.getDate())) y--;
  return Math.max(0, y);
}

function calcYearsMonthsDash(joinDate) {
  if (!joinDate) return '—';
  var now = new Date(), join = new Date(joinDate);
  var y = now.getFullYear() - join.getFullYear();
  var m = now.getMonth() - join.getMonth();
  if (m < 0) { y--; m += 12; }
  if (now.getDate() < join.getDate()) m = Math.max(0, m - 1);
  return y + '年' + m + 'ヶ月';
}

async function loadDashStaff() {

function renderDashStaffStats() {

  var depts = [...new Set(dashAllStaff.map(function(s){return s.dept;}))].length;

    statCard('🏢 部署数', depts+'部署', '#e53935');
}

function filterDashStaff() {
  var q = (document.getElementById('dashStaffSearch').value||'').toLowerCase();
  var activeBtn = document.querySelector('.dash-dept-btn[style*="background: rgb(26, 58, 107)"], .dash-dept-btn[style*="background:#1a3a6b"]');
  var dept = activeBtn ? activeBtn.getAttribute('data-dept') : '';
  var filtered = dashAllStaff.filter(function(s){
    var match = !q || (s.name||'').toLowerCase().includes(q) || (s.dept||'').includes(q) || (s.role||'').includes(q);
    var depts = (s.dept||'').split(',');
    var dMatch = !dept || depts.some(function(d){return d.trim()===dept;});
    return match && dMatch;
  });
  renderDashStaffGrid(filtered);
}

function renderDashStaffGrid(list) {
  var el = document.getElementById('dashStaffGrid');
  if (!list || !list.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:#aaa;">該当する社員がいません</div>';
    return;
  }
  el.innerHTML = list.map(function(s, i) {
    var ac = AVATAR_COLORS_DASH[i % AVATAR_COLORS_DASH.length];
    var initials = (s.name||'?').replace(/\s+/g,'').slice(0,2);
    var certs = (s.certs||'').split(',').filter(function(c){return c.trim();});
    var certTags = certs.slice(0,3).map(function(c){
      return '<span style="padding:2px 8px;background:#e8f0ff;color:#1a2744;border-radius:20px;font-size:10px;font-weight:700;">'+c.trim()+'</span>';
    }).join('');
    var yrs = calcYearsDash(s.join_date);
    var pct = Math.min(100, Math.round(yrs/40*100));
    var statusColor = s.status==='在籍'?'#2e7d32':s.status==='休職'?'#e53935':'#f57c00';
    var statusBg = s.status==='在籍'?'#e8f8ee':s.status==='休職'?'#fff0ee':'#fff3e0';
    return '<div style="background:white;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08);border:1.5px solid #f0f2f5;">'
      + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">'
      + '<div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;background:'+ac.bg+';color:'+ac.c+';">'+initials+'</div>'
      + '<div><div style="font-size:15px;font-weight:700;color:#1a3a6b;">'+s.name+'</div>'
      + '<div style="font-size:11px;color:#888;">'+( s.role||'')+'</div></div>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;margin-bottom:8px;">'
      + '<div><span style="color:#aaa;">部署</span><br><b>'+( s.dept||'—')+'</b></div>'
      + '<div><span style="color:#aaa;">ステータス</span><br><span style="background:'+statusBg+';color:'+statusColor+';border-radius:10px;padding:1px 8px;font-weight:700;">'+(s.status||'在籍')+'</span></div>'
      + '<div><span style="color:#aaa;">入社日</span><br><b>'+(s.join_date||'—')+'</b></div>'
      + '<div><span style="color:#aaa;">勤続</span><br><b>'+calcYearsMonthsDash(s.join_date)+'</b></div>'
      + '</div>'
      + '<div style="height:4px;background:#f0f2f5;border-radius:2px;margin-bottom:8px;"><div style="height:4px;background:#1a3a6b;border-radius:2px;width:'+pct+'%;"></div></div>'
      + (certTags ? '<div style="display:flex;flex-wrap:wrap;gap:4px;">'+certTags+'</div>' : '')
      + '</div>';
  }).join('');
}

async function loadDashCalEvents() {
  var el = document.getElementById('dashCalEvents');
  var cnt = document.getElementById('dashCalCount');
  var elModal = document.getElementById('calModalEvents');
  var now = new Date();
  var future = new Date(now.getTime() + 30*24*60*60*1000);
  var url = 'https://www.googleapis.com/calendar/v3/calendars/'
    + encodeURIComponent(GCAL_ID)
    + '/events?key=' + GCAL_API_KEY
    + '&timeMin=' + encodeURIComponent(now.toISOString())
    + '&timeMax=' + encodeURIComponent(future.toISOString())
    + '&singleEvents=true&orderBy=startTime&maxResults=20';
  try {
    var res = await fetch(url);
    var data = await res.json();
    var items = data.items || [];
    if (cnt) cnt.textContent = '（'+items.length+'件）';
    var html = items.length ? items.map(function(ev) {
      var start = ev.start.dateTime || ev.start.date;
      var dt = new Date(start);
      var isAllDay = !ev.start.dateTime;
      var dateStr = dt.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
      var timeStr = isAllDay ? '終日' : dt.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      var today = new Date();
      var isToday = dt.toDateString() === today.toDateString();
      var isTomorrow = dt.toDateString() === new Date(today.getTime()+86400000).toDateString();
      var badge = isToday ? '<span style="background:#e8392a;color:white;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;">今日</span>'
                : isTomorrow ? '<span style="background:#f5a623;color:white;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;">明日</span>' : '';
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f2f5;">'
        + '<div style="min-width:44px;height:44px;background:'+(isToday?'#e8392a':'#1a3a6b')+';color:white;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">'
        + '<div style="font-size:15px;font-weight:700;line-height:1;">'+dt.getDate()+'</div>'
        + '<div style="font-size:10px;opacity:0.8;">'+(dt.getMonth()+1)+'月</div></div>'
        + '<div style="flex:1;"><div style="font-size:13px;font-weight:700;">'+(ev.summary||'（タイトルなし）')+badge+'</div>'
        + '<div style="font-size:11px;color:#888;">'+dateStr+'　'+timeStr+'</div></div>'
        + '</div>';
    }).join('') : '<div style="text-align:center;padding:20px;color:#aaa;">直近30日の予定はありません</div>';
    if (el) el.innerHTML = html;
    if (elModal) elModal.innerHTML = html;
  } catch(e) {
    var errHtml = '<div style="color:#e8392a;font-size:12px;padding:10px;">カレンダー読み込みエラー: '+e.message+'</div>';
    if (el) el.innerHTML = errHtml;
    if (elModal) elModal.innerHTML = errHtml;
  }
}
