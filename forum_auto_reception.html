<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォーラムオート 受付システム</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23e8392a'/><rect x='8' y='52' width='70' height='20' rx='4' fill='%23ffffff'/><rect x='68' y='44' width='24' height='28' rx='4' fill='%23ffffff'/><rect x='71' y='47' width='18' height='12' rx='2' fill='%23a8c8e8'/><rect x='10' y='40' width='60' height='12' rx='2' fill='%23eeeeee' transform='rotate(-9 40 46)'/><rect x='18' y='28' width='30' height='14' rx='4' fill='%231a2744'/><rect x='22' y='24' width='22' height='10' rx='3' fill='%23263a6e'/><rect x='24' y='25' width='8' height='7' rx='1' fill='%23a8c8e8' opacity='.9'/><rect x='34' y='25' width='8' height='7' rx='1' fill='%23a8c8e8' opacity='.9'/><circle cx='22' cy='74' r='8' fill='%23333'/><circle cx='22' cy='74' r='4' fill='%23666'/><circle cx='52' cy='74' r='8' fill='%23333'/><circle cx='52' cy='74' r='4' fill='%23666'/><circle cx='80' cy='74' r='8' fill='%23333'/><circle cx='80' cy='74' r='4' fill='%23666'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Oswald:wght@400;600&display=swap');
:root {
  --primary: #1a2744; --accent: #e8392a; --accent2: #f5a623; --bg: #f0f2f5; --card: #ffffff;
  --text: #1a2744; --text-light: #6b7a99; --border: #d8dde8; --success: #2ecc71;
  --shadow: 0 4px 20px rgba(26,39,68,0.10); --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--primary); color: white; padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-logo h1 { font-family: 'Oswald', sans-serif; font-size: 18px; letter-spacing: 1px; line-height: 1.2; }
.header-logo p { font-size: 11px; opacity: 0.7; }
.header-time { font-size: 13px; opacity: 0.8; text-align: right; }
.tab-nav { background: var(--primary); border-top: 1px solid rgba(255,255,255,0.1); display: flex; overflow-x: auto; scrollbar-width: none; }
.tab-btn { flex-shrink: 0; padding: 10px 18px; color: rgba(255,255,255,0.6); background: none; border: none; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
.tab-btn.active { color: white; border-bottom-color: var(--accent); }
.main { padding: 16px; max-width: 900px; margin: 0 auto; }
.card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.card-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--bg); display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 28px; height: 28px; background: var(--primary); color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.card-title .icon.red { background: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 11px; font-weight: 700; color: var(--text-light); }
input, select, textarea { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; width: 100%; }
.type-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.type-btn { flex: 1; min-width: 80px; padding: 10px 8px; border: 2px solid var(--border); border-radius: 8px; background: white; cursor: pointer; text-align: center; font-size: 12px; font-weight: 700; }
.type-btn.active { border-color: var(--accent); background: #fff0ee; color: var(--accent); }
#map, #mainMap { width: 100%; height: 300px; border-radius: 8px; border: 1.5px solid var(--border); background: #e8edf5; }
.search-bar { display: flex; gap: 8px; margin-bottom: 10px; }
.search-bar input { flex: 1; }
.search-bar button { padding: 10px 16px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
.arrival-display { background: linear-gradient(135deg, var(--primary), #263a6e); color: white; border-radius: 10px; padding: 16px; text-align: center; margin-top: 10px; display: none; }
.arrival-display.show { display: block; }
.arrival-time { font-size: 36px; font-weight: 700; }
.loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,39,68,0.5); z-index: 500; align-items: center; justify-content: center; }
.loading-overlay.show { display: flex; }
.loading-box { background: white; border-radius: 16px; padding: 32px; text-align: center; }
.spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
.toast.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <div class="logo-icon">🔧</div>
      <div><h1>FORUM AUTO</h1><p>受付・現場管理</p></div>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('reception',this)">📋 受付</button>
    <button class="tab-btn" onclick="switchTab('map',this)">📍 現場マップ</button>
  </div>
</div>

<div class="main">
  <div class="tab-content" id="tab-reception" style="display:block;">
    <div class="card">
      <div class="card-title"><div class="icon red">📍</div>現場位置・到着予測</div>
      <div class="search-bar">
        <input type="text" id="locationInput" placeholder="現場の住所を入力してください">
        <button onclick="searchLocation()">🔍 検索</button>
      </div>
      <div id="map"></div>
      <div class="arrival-display" id="arrivalDisplay">
        <div style="font-size:12px; opacity:0.8;">フォーラムオートからの到着予測</div>
        <div class="arrival-time" id="arrivalTime">--分</div>
        <div id="arrivalDistance" style="font-size:14px;">距離: -- km</div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-map" style="display:none;">
    <div class="card">
      <div class="card-title"><div class="icon">🗺️</div>広域マップ（起点：下山梨545）</div>
      <div id="mainMap"></div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box"><div class="spinner"></div><div id="loadingText">読み込み中...</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// 設定値
const MAPS_API_KEY = 'AIzaSyD7EOjNdQp0YdyQ9TxbYkuAJjxxyRrabnQ'; // お客様のキー
const FORUM_AUTO_LAT = 34.7268; // 下山梨545の緯度
const FORUM_AUTO_LNG = 137.9195; // 下山梨545の経度
const FORUM_AUTO_ADDR = '静岡県袋井市下山梨545';

var map = null, mainMap = null, geocoder = null, directionsService = null, marker = null;

// 時間更新
function updateTime() {
  var now = new Date();
  document.getElementById('headerTime').innerHTML = now.toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}
setInterval(updateTime, 1000);
updateTime();

// タブ切り替え
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'block';
  btn.classList.add('active');
  if (name === 'map') initMainMap();
}

// Google Maps 初期化（API読み込み後に呼ばれる）
function initMap() {
  geocoder = new google.maps.Geocoder();
  directionsService = new google.maps.DirectionsService();
  
  // 最初の地図を店舗中心で表示
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 15,
    center: {lat: FORUM_AUTO_LAT, lng: FORUM_AUTO_LNG},
    mapTypeId: 'roadmap'
  });
  
  // 店舗にマーカーを立てる
  new google.maps.Marker({
    position: {lat: FORUM_AUTO_LAT, lng: FORUM_AUTO_LNG},
    map: map,
    title: "フォーラムオート"
  });
}

// 現場検索処理
function searchLocation() {
  var addr = document.getElementById('locationInput').value;
  if (!addr) { showToast('住所を入力してください'); return; }
  
  showLoading('検索中...');
  
  geocoder.geocode({ address: addr + ' 静岡県' }, function(results, status) {
    hideLoading();
    if (status !== 'OK') { showToast('住所が見つかりませんでした'); return; }
    
    var destLocation = results[0].geometry.location;
    
    // 地図の中心を目的地へ
    map.setCenter(destLocation);
    if (marker) marker.setMap(null);
    marker = new google.maps.Marker({ map: map, position: destLocation });

    // フォーラムオートからのルート計算
    directionsService.route({
      origin: new google.maps.LatLng(FORUM_AUTO_LAT, FORUM_AUTO_LNG),
      destination: destLocation,
      travelMode: google.maps.TravelMode.DRIVING
    }, function(result, st) {
      if (st === 'OK') {
        var leg = result.routes[0].legs[0];
        document.getElementById('arrivalDisplay').classList.add('show');
        document.getElementById('arrivalTime').textContent = leg.duration.text;
        document.getElementById('arrivalDistance').textContent = '距離: ' + leg.distance.text;
        showToast('ルートを表示しました');
      }
    });
  });
}

// 現場マップタブの初期化
function initMainMap() {
  if (mainMap) return;
  mainMap = new google.maps.Map(document.getElementById('mainMap'), {
    zoom: 15,
    center: {lat: FORUM_AUTO_LAT, lng: FORUM_AUTO_LNG}
  });
  new google.maps.Marker({
    position: {lat: FORUM_AUTO_LAT, lng: FORUM_AUTO_LNG},
    map: mainMap,
    title: "フォーラムオート（起点）"
  });
}

function showToast(m) { var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
function showLoading(m) { document.getElementById('loadingText').textContent=m; document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7EOjNdQp0YdyQ9TxbYkuAJjxxyRrabnQ&callback=initMap&language=ja"></script>
</body>
</html>
