<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォーラムオート 作業状況</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1e;color:white;font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;}

/* ヘッダー */
.header{
  background:linear-gradient(135deg,#0d1b3e,#1a3a6b);
  border-bottom:2px solid #2196f3;
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  height:70px;
}
.header-left{display:flex;align-items:center;gap:16px;}
.logo{font-size:22px;font-weight:bold;color:#64b5f6;letter-spacing:2px;}
.tagline{font-size:13px;color:#90a4ae;}
.header-right{text-align:right;}
.clock{font-size:32px;font-weight:bold;color:white;letter-spacing:2px;font-variant-numeric:tabular-nums;}
.date-str{font-size:13px;color:#90a4ae;margin-top:2px;}

/* サマリーバー */
.summary-bar{
  display:flex;gap:0;
  background:#0d1b3e;
  border-bottom:1px solid #1a2a5e;
  height:64px;
}
.sum-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid #1a2a5e;padding:6px;
}
.sum-item:last-child{border-right:none;}
.sum-label{font-size:11px;color:#78909c;margin-bottom:2px;}
.sum-value{font-size:26px;font-weight:900;line-height:1;}
.sum-unit{font-size:11px;color:#78909c;}
.sum-active{color:#64b5f6;}
.sum-warn{color:#ffb74d;}
.sum-ok{color:#81c784;}
.sum-ready{color:#ce93d8;}

/* カンバン */
.kanban-wrap{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:10px 16px;
  height:calc(100vh - 70px - 64px - 48px);
  overflow:hidden;
}
.column{
  background:#0d1b3e;
  border-radius:10px;
  border:1px solid #1a2a5e;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.col-header{
  padding:10px 12px;
  font-size:14px;font-weight:bold;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.col-count-badge{
  font-size:13px;font-weight:bold;
  background:rgba(255,255,255,0.15);
  padding:2px 10px;border-radius:12px;
}
.col-body{overflow-y:auto;flex:1;padding:6px;}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:#2a3a5e;border-radius:2px;}

/* ステータス色 */
.h-受付{background:linear-gradient(135deg,#3949ab,#5c6bc0);}
.h-見積中{background:linear-gradient(135deg,#e65100,#f57c00);}
.h-作業待ち{background:linear-gradient(135deg,#01579b,#0288d1);}
.h-板金中{background:linear-gradient(135deg,#6a1b9a,#8e24aa);}
.h-塗装中{background:linear-gradient(135deg,#b71c1c,#d32f2f);}
.h-完成{background:linear-gradient(135deg,#1b5e20,#2e7d32);}
.h-納車済{background:linear-gradient(135deg,#37474f,#546e7a);}

/* カード */
.case-card{
  background:#111d3a;
  border:1px solid #1e2d5a;
  border-left:4px solid #2196f3;
  border-radius:7px;
  padding:10px 12px;
  margin-bottom:7px;
}
.case-card.ins{border-left-color:#ef5350;}
.case-card.own{border-left-color:#ffa726;}
.case-card.done{border-left-color:#66bb6a;}
.card-name{font-size:15px;font-weight:bold;color:#e3f2fd;margin-bottom:3px;}
.card-car{font-size:12px;color:#90a4ae;margin-bottom:5px;}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;}
.cbadge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:bold;}
.cbadge-ins{background:#1a237e;color:#90caf9;}
.cbadge-own{background:#4e342e;color:#ffcc80;}
.cbadge-staff{background:#1a237e;color:#ce93d8;}
.cbadge-total{background:#1b5e20;color:#a5d6a7;}
.card-date{font-size:10px;color:#546e7a;}

/* フッター */
.footer{
  height:48px;background:#0d1b3e;border-top:1px solid #1a2a5e;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;font-size:12px;color:#546e7a;
}
.footer-marquee{overflow:hidden;flex:1;margin:0 20px;}
.marquee-inner{white-space:nowrap;display:inline-block;animation:marquee 40s linear infinite;}
@keyframes marquee{0%{transform:translateX(100%);}100%{transform:translateX(-100vw);}}

/* 更新インジケーター */
.update-dot{width:8px;height:8px;border-radius:50%;background:#2e7d32;display:inline-block;margin-right:6px;}
.update-dot.blink{animation:blink 0.5s;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* 代車バー（オーバーレイ） */
.rental-bar{
  position:fixed;bottom:48px;right:0;
  background:#0d1b3e;border-top:1px solid #1a2a5e;border-left:1px solid #1a2a5e;
  border-radius:10px 0 0 0;
  padding:8px 14px;
  max-width:320px;
}
.rental-bar-title{font-size:11px;color:#90a4ae;margin-bottom:6px;}
.rental-items{display:flex;gap:6px;flex-wrap:wrap;}
.rental-pill{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:bold;}
.rp-free{background:#1b5e20;color:#a5d6a7;}
.rp-busy{background:#7f0000;color:#ef9a9a;}
.rp-maint{background:#4e342e;color:#ffcc80;}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">🏭 フォーラムオート</div>
      <div class="tagline">車のアシスタントパートナー　静岡県袋井市下山梨545</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="index_top.html" style="display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(255,255,255,0.15);border-radius:8px;color:white;text-decoration:none;font-size:13px;font-weight:bold;">🏠 ホーム</a>
    <div class="header-right">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date-str" id="dateStr"></div>
  </div>
</div>

<!-- サマリーバー -->
<div class="summary-bar">
  <div class="sum-item"><div class="sum-label">進行中</div><div class="sum-value sum-active" id="s-active">-</div><div class="sum-unit">案件</div></div>
  <div class="sum-item"><div class="sum-label">本日受付</div><div class="sum-value sum-warn" id="s-today">-</div><div class="sum-unit">台</div></div>
  <div class="sum-item"><div class="sum-label">板金中</div><div class="sum-value" style="color:#ce93d8" id="s-bankin">-</div><div class="sum-unit">台</div></div>
  <div class="sum-item"><div class="sum-label">塗装中</div><div class="sum-value" style="color:#ef9a9a" id="s-tosou">-</div><div class="sum-unit">台</div></div>
  <div class="sum-item"><div class="sum-label">完成・納車待ち</div><div class="sum-value sum-ok" id="s-ready">-</div><div class="sum-unit">台</div></div>
  <div class="sum-item"><div class="sum-label">代車貸出中</div><div class="sum-value sum-warn" id="s-rental">-</div><div class="sum-unit">台</div></div>
  <div class="sum-item"><div class="sum-label">代車空き</div><div class="sum-value sum-ok" id="s-free">-</div><div class="sum-unit">台</div></div>
</div>

<!-- カンバン -->
<div class="kanban-wrap" id="kanban"></div>

<!-- 代車バー -->
<div class="rental-bar" id="rentalBar" style="display:none;">
  <div class="rental-bar-title">🚗 代車状況</div>
  <div class="rental-items" id="rentalItems"></div>
</div>

<!-- フッター -->
<div class="footer">
  <span><span class="update-dot" id="dot"></span><span id="lastUpdate">起動中...</span></span>
  <div class="footer-marquee"><span class="marquee-inner" id="marquee">フォーラムオート　板金・塗装・修理・レッカー　TEL: 0538-49-0632</span></div>
  <span>30秒自動更新</span>
</div>

<script>
const SB_URL='https://uhppgdwbyrijnqpvusxw.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocHBnZHdieXJpam5xcHZ1c3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDEyMDksImV4cCI6MjA4OTExNzIwOX0.mJ2GXQUsRZAZ-VL6XTVTz3gfG3MTNtfnWxsIPU_DK60';
const STATUSES=['受付','見積中','作業待ち','板金中','塗装中','完成','納車済'];

// 時計
function updateClock(){
  var now=new Date();
  document.getElementById('clock').textContent=
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
  var days=['日','月','火','水','木','金','土'];
  document.getElementById('dateStr').textContent=
    now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日（'+days[now.getDay()]+'）';
}
setInterval(updateClock,1000);
updateClock();

async function loadAll(){
  var dot=document.getElementById('dot');
  dot.classList.add('blink');
  try{
    var r=await fetch(SB_URL+'/rest/v1/estimates?status=neq.deleted&order=estimate_date.desc&limit=100&select=id,estimate_no,customer_name,car_name,plate,repair_type,repair_status,staff_name,delivery_date,estimate_date,grand_total',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    var estimates=r.ok?await r.json():[];

    // レンタカー
    var rentals=[];
    try{
      var r2=await fetch(SB_URL+'/rest/v1/rental_cars?select=car_name,plate,status&order=car_name.asc',{
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
      });
      if(r2.ok) rentals=await r2.json();
    }catch(e){}

    renderAll(estimates,rentals);
    document.getElementById('lastUpdate').textContent='最終更新: '+new Date().toLocaleTimeString('ja-JP');
  }catch(e){
    document.getElementById('lastUpdate').textContent='エラー: '+e.message;
  }
  setTimeout(function(){ dot.classList.remove('blink'); },600);
}

function renderAll(estimates,rentals){
  var today=new Date().toISOString().split('T')[0];
  // サマリー
  var active=estimates.filter(function(e){ return e.repair_status!=='納車済'; }).length;
  var todayC=estimates.filter(function(e){ return e.estimate_date===today; }).length;
  var bankin=estimates.filter(function(e){ return e.repair_status==='板金中'; }).length;
  var tosou=estimates.filter(function(e){ return e.repair_status==='塗装中'; }).length;
  var ready=estimates.filter(function(e){ return e.repair_status==='完成'; }).length;
  var rBusy=rentals.filter(function(r){ return r.status==='貸出中'; }).length;
  var rFree=rentals.filter(function(r){ return r.status==='空き'; }).length;

  document.getElementById('s-active').textContent=active;
  document.getElementById('s-today').textContent=todayC;
  document.getElementById('s-bankin').textContent=bankin;
  document.getElementById('s-tosou').textContent=tosou;
  document.getElementById('s-ready').textContent=ready;
  document.getElementById('s-rental').textContent=rBusy;
  document.getElementById('s-free').textContent=rFree;

  // カンバン
  var kanban=document.getElementById('kanban');
  kanban.innerHTML=STATUSES.map(function(status){
    var cards=estimates.filter(function(e){ return (e.repair_status||'受付')===status; });
    return '<div class="column">'
      +'<div class="col-header h-'+status+'">'
      +'<span>'+status+'</span>'
      +'<span class="col-count-badge">'+cards.length+'</span>'
      +'</div>'
      +'<div class="col-body">'
      +( cards.length===0
        ? '<div style="text-align:center;color:#2a3a5e;padding:20px;font-size:13px;">─</div>'
        : cards.map(function(e){ return renderCard(e); }).join('') )
      +'</div></div>';
  }).join('');

  // 代車バー
  if(rentals.length>0){
    document.getElementById('rentalBar').style.display='block';
    document.getElementById('rentalItems').innerHTML=rentals.map(function(r){
      var cls=r.status==='貸出中'?'rp-busy':r.status==='整備中'?'rp-maint':'rp-free';
      return '<span class="rental-pill '+cls+'">'+(r.car_name||r.plate||'代車')+'</span>';
    }).join('');
  }

  // マーキー更新
  var activeNames=estimates.filter(function(e){ return e.repair_status!=='納車済'; }).map(function(e){
    return (e.customer_name||'')+'様（'+(e.car_name||'')+'）'+(e.repair_status||'');
  }).join('　／　');
  if(activeNames){
    document.getElementById('marquee').textContent='【進行中案件】 '+activeNames;
  }
}

function renderCard(e){
  var repClass=e.repair_status==='完成'?'done':(e.repair_type==='own'?'own':'ins');
  var total=e.grand_total?'¥'+Math.round(e.grand_total).toLocaleString():'';
  return '<div class="case-card '+repClass+'">'
    +'<div class="card-name">'+(e.customer_name||'未設定')+'　様</div>'
    +'<div class="card-car">'+(e.car_name||'')+'　'+(e.plate||'')+'</div>'
    +'<div class="card-badges">'
    +(e.repair_type==='own'
      ?'<span class="cbadge cbadge-own">自費</span>'
      :'<span class="cbadge cbadge-ins">保険</span>')
    +(e.staff_name?'<span class="cbadge cbadge-staff">'+e.staff_name+'</span>':'')
    +(total?'<span class="cbadge cbadge-total">'+total+'</span>':'')
    +'</div>'
    +(e.delivery_date?'<div class="card-date">納車予定: '+e.delivery_date+'</div>':'')
    +'</div>';
}

// 30秒ごと自動更新
setInterval(loadAll,30000);
loadAll();
</script>
</body>
</html>
