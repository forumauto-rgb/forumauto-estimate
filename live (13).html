<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>フォーラムオート Live DX</title>
<style>
:root{
  --navy:#0b1c35;--navy2:#0e2240;--gold:#b8960c;
  --cream:#f7f3ea;--tl:#e8e0d0;--red:#c0392b;--green:#1a5c3a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--navy);font-family:'Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif;overflow:hidden;}

/* 全画面レイアウト */
.live-app{display:flex;flex-direction:column;height:100vh;max-width:640px;margin:0 auto;}

/* ヘッダー */
.live-hdr{background:var(--navy);border-bottom:1px solid rgba(184,150,12,0.3);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.live-hdr-brand{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:0.15em;}
.live-status{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(232,224,208,0.5);}
.status-dot{width:7px;height:7px;border-radius:50%;background:#444;}
.status-dot.connecting{background:orange;animation:pulse 1s infinite;}
.status-dot.connected{background:#4caf7d;animation:pulse 2s infinite;}
.status-dot.listening{background:#e05050;animation:pulse 0.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* キャラクター選択 */
.char-bar{display:flex;background:var(--navy2);border-bottom:1px solid rgba(184,150,12,0.15);flex-shrink:0;}
.char-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;border:none;background:transparent;transition:background 0.2s;position:relative;}
.char-btn.active{background:rgba(184,150,12,0.12);}
.char-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);}
.char-photo{width:42px;height:42px;border-radius:50%;object-fit:cover;object-position:top;border:1.5px solid rgba(184,150,12,0.3);}
.char-btn.active .char-photo{border-color:var(--gold);}
.char-photo-ph{width:42px;height:42px;border-radius:50%;background:#1a3060;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--gold);}
.char-nm{font-size:10px;color:var(--tl);margin-top:3px;font-weight:600;}
.char-role{font-size:8px;color:rgba(232,224,208,0.4);margin-top:1px;}

/* カメラ映像エリア */
.camera-area{position:relative;background:#000;flex-shrink:0;height:140px;overflow:hidden;}
.camera-video{width:100%;height:100%;object-fit:cover;opacity:0.85;}
.camera-off{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:rgba(255,255,255,0.3);}
.camera-off-icon{font-size:32px;}
.camera-off-text{font-size:11px;}
.camera-overlay{position:absolute;top:8px;right:8px;display:flex;gap:6px;}
.cam-toggle-btn{background:rgba(0,0,0,0.6);border:1px solid rgba(184,150,12,0.4);color:var(--gold);padding:5px 10px;border-radius:16px;font-size:11px;cursor:pointer;backdrop-filter:blur(4px);}

/* 吹き出し */
.bubble-area{background:var(--navy2);padding:10px 14px;flex-shrink:0;}
.bubble-speaker{font-size:9px;color:var(--gold);letter-spacing:0.1em;margin-bottom:4px;}
.bubble-box{background:rgba(255,255,255,0.05);border:1px solid rgba(184,150,12,0.25);border-radius:10px;padding:10px 13px;min-height:48px;max-height:80px;overflow-y:auto;}
.bubble-text{font-size:13px;color:var(--tl);line-height:1.8;}

/* 波形ビジュアライザー */
.visualizer{background:var(--navy);padding:6px 14px;display:flex;align-items:center;justify-content:center;gap:2px;height:36px;flex-shrink:0;}
.viz-bar{width:3px;background:var(--gold);border-radius:2px;height:4px;transition:height 0.05s;opacity:0.6;}

/* コントロール */
.controls{background:var(--navy2);border-top:1px solid rgba(184,150,12,0.15);padding:12px 16px;flex-shrink:0;}
.main-controls{display:flex;align-items:center;justify-content:center;gap:16px;}

.ctrl-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:transparent;border:none;}
.ctrl-btn-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.2s;}
.ctrl-btn-label{font-size:9px;color:rgba(232,224,208,0.5);}

.btn-connect .ctrl-btn-circle{background:var(--gold);color:var(--navy);}
.btn-connect.connected .ctrl-btn-circle{background:#1a5c3a;}
.btn-mic .ctrl-btn-circle{background:rgba(255,255,255,0.08);border:1px solid rgba(184,150,12,0.3);color:var(--gold);}
.btn-mic.active .ctrl-btn-circle{background:#e05050;border-color:#e05050;color:white;animation:mic-ring 1s infinite;}
.btn-end .ctrl-btn-circle{background:rgba(192,57,43,0.2);border:1px solid rgba(192,57,43,0.4);color:#e05050;}

@keyframes mic-ring{
  0%{box-shadow:0 0 0 0 rgba(224,80,80,0.4)}
  70%{box-shadow:0 0 0 10px rgba(224,80,80,0)}
  100%{box-shadow:0 0 0 0 rgba(224,80,80,0)}
}

/* ログエリア */
.log-area{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.log-msg{display:flex;gap:8px;animation:mi 0.25s ease;}
@keyframes mi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.log-msg.user{flex-direction:row-reverse;}
.log-bubble{max-width:82%;padding:8px 12px;font-size:12.5px;line-height:1.65;}
.log-msg.ai .log-bubble{background:rgba(255,255,255,0.07);color:var(--tl);border-radius:2px 12px 12px 12px;border:0.5px solid rgba(184,150,12,0.2);}
.log-msg.user .log-bubble{background:rgba(184,150,12,0.2);color:var(--tl);border-radius:12px 2px 12px 12px;border:0.5px solid rgba(184,150,12,0.3);}

/* ツールバー下 */
.bottom-bar{background:var(--navy);border-top:1px solid rgba(184,150,12,0.1);padding:6px 14px;display:flex;gap:8px;flex-shrink:0;}
.bottom-btn{flex:1;padding:7px;border-radius:8px;border:1px solid rgba(184,150,12,0.25);background:transparent;color:rgba(232,224,208,0.6);font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.18s;}
.bottom-btn:hover{background:rgba(184,150,12,0.1);color:var(--gold);}

/* モーダル */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal.hidden{display:none;}
.modal-box{background:var(--navy2);border:1px solid rgba(184,150,12,0.35);border-radius:14px;padding:20px;width:100%;max-width:380px;}
.modal-title{font-size:14px;color:var(--gold);font-weight:700;margin-bottom:12px;letter-spacing:0.08em;}
.modal-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(184,150,12,0.3);color:var(--tl);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px;}
.modal-input::placeholder{color:rgba(232,224,208,0.3);}
.modal-btn{width:100%;padding:11px;border-radius:8px;border:none;background:var(--gold);color:var(--navy);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.modal-note{font-size:10px;color:rgba(232,224,208,0.4);margin-top:8px;line-height:1.6;}
</style>
</head>

【口調】温かく親しみやすい。専門用語は使わず日常語で話す。「大丈夫ですよ」「一緒に考えましょう」など安心感のある言葉を使う。

【板金の読み方】板金は「ばんきん」と読む。`
  },
  mako: {
    name: '真子', speaker: '真子 より',
    instruction: `あなたは「真子」です。フォーラムオート（静岡県袋井市、板金塗装・保険事故対応57年）の技術担当スタッフです。
【役割】車の損傷を技術的に診断し、修理か交換かを正確に判断する。カメラ映像があれば積極的に活用して具体的な診断をする。

【修理vs交換の判断基準】手のひらサイズ以下の凹み・傷は板金修理が基本。それ以上の損傷・変形・ADAS部品への影響がある場合は交換を推奨。修理と交換の費用を比較して賢明な判断を促す。
【ADAS・エーミング】フロントカメラ・ミリ波レーダー・サイドカメラが関わる部位の修理・交換後は必ずエーミング（再校正）が必要。費用は1〜3万円。これを省くと自動ブレーキ・車線維持が正常作動しない。AJがエーミングを削ろうとしたら「安全基準上、削除は不可能です」と断言する。
【ナンバープレート】傷・曲がり・割れは板金ではなく「運輸支局または警察署で再発行手続きが必要」と案内する。
【口調】車への情熱がある。「絶対に綺麗に直せます」「ぜひ私に直させてください」など誇りと愛情を込めて話す。絵文字は使わない。板金は1回の返答で1度だけ使う。`

};

// ===== Supabase設定 =====
const SUPABASE_URL = 'https://uhppgdwbyrijnqpvusxw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVocHBnZHdieXJpam5xcHZ1c3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2OTY0MDg5NzMsImV4cCI6MjAxMTk4NDk3M30.rEIEPBGMBTMwXQFCQJJ4wKPDC5oNmu_DK60';

// ===== 状態管理 =====
let currentChar = 'reiko';
let apiKey = '';
let ws = null;
let isConnected = false;
let isMicActive = false;
let audioContext = null;
let mediaStream = null;
let cameraStream = null;
let cameraActive = false;
let processor = null;
let vizBars = [];
let frameInterval = null;

// ===== 波形初期化 =====
const viz = document.getElementById('visualizer');
for(let i = 0; i < 24; i++){
  const bar = document.createElement('div');
  bar.className = 'viz-bar';
  viz.appendChild(bar);
  vizBars.push(bar);
}

function animateViz(active){
  vizBars.forEach((bar, i) => {
    const h = active ? (4 + Math.random() * 24) : 4;
    bar.style.height = h + 'px';
    bar.style.opacity = active ? '0.8' : '0.3';

// ===== キャラ選択 =====
function selectChar(key){
  currentChar = key;
  document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-char="'+key+'"]').classList.add('active');
  document.getElementById('bubbleSpeaker').textContent = chars[key].speaker;
  if(isConnected){ endSession(); }
}

// ===== APIキー =====
function saveApiKey(){
  // APIキーはEdge Function経由で取得するため、手動入力は廃止
  document.getElementById('apiModal').classList.add('hidden');
  startSession();
}

// ===== 接続切り替え =====
function toggleConnect(){
  if(isConnected){ endSession(); }
  else { startSession(); }
}

// ===== Edge FunctionからAPIキー取得 =====
async function getApiToken(){
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/gemini-live-proxy`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({ action: 'get_token' })
    });
    const data = await res.json();
    if(data.token){
      apiKey = data.token;
      return true;
    }
    throw new Error(data.error || 'トークン取得失敗');
  } catch(e) {
    setBubble('接続エラー: ' + e.message);
    return false;
  }
}

// ===== セッション開始 =====
async function startSession(){
  setStatus('connecting', '接続中...');
  setBubble('APIキーを取得しています...');

  // Edge FunctionからAPIキーを安全に取得
  const ok = await getApiToken();
  if(!ok){ setStatus('', 'エラー'); return; }

  setBubble('接続しています...');
  const model = 'gemini-2.0-flash-exp';
  const url = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${apiKey}`;

  try {
    ws = new WebSocket(url);

    ws.onopen = () => {
      // onopen時点で接続フラグをセット（setupComplete待たない）
      setTimeout(() => {
        if(!isConnected && ws && ws.readyState === WebSocket.OPEN){
          isConnected = true;
          setStatus('connected', '接続中');
          document.getElementById('connectBtn').classList.add('connected');
          document.getElementById('connectLabel').textContent = '接続済';
          setBubble(`こんにちは。${chars[currentChar].name}です。何でもお聞きください。`);
        }
      }, 2000);
      // セッション設定を送信
      const setup = {
        setup: {
          model: `models/${model}`,
          generation_config: {
            response_modalities: ['AUDIO'],
            speech_config: {
              voice_config: {
                prebuilt_voice_config: {
                  voice_name: currentChar === 'reiko' ? 'Aoede' : currentChar === 'aika' ? 'Zephyr' : 'Charon'
                }
              }
            }
          },
          system_instruction: {
            parts: [{ text: chars[currentChar].instruction }]
          }
        }
      };
      ws.send(JSON.stringify(setup));
    };

    ws.onmessage = async (evt) => {
      try {
        const data = JSON.parse(evt.data);
        console.log('受信:', JSON.stringify(data).substring(0, 200));
        handleServerMessage(data);
      } catch(e) {
        console.log('メッセージ解析エラー:', e);
      }
    };

    ws.onclose = (e) => {
      console.log('切断:', e.code, e.reason);
      setStatus('', '未接続');
      isConnected = false;
      document.getElementById('connectBtn').classList.remove('connected');
      document.getElementById('connectLabel').textContent = '接続';
      stopMic();
    };

    ws.onerror = (e) => {
      console.log('WSエラー:', e);
      setBubble('接続エラーが発生しました。');
      setStatus('', 'エラー');
    };

  } catch(e) {
    setBubble('接続に失敗しました: ' + e.message);
  }
}

// ===== サーバーメッセージ処理 =====
let audioQueue = [];
let isPlaying = false;

function handleServerMessage(data){
  // セットアップ完了
  if(data.setupComplete){
    isConnected = true;
    setStatus('connected', '接続中');
    document.getElementById('connectBtn').classList.add('connected');
    document.getElementById('connectLabel').textContent = '接続済';
    const greeting = `こんにちは。${chars[currentChar].name}です。何でもお聞きください。`;
    setBubble(greeting);
    addLog(greeting, 'ai');
    return;
  }

  // 音声データ
  if(data.serverContent?.modelTurn?.parts){
    for(const part of data.serverContent.modelTurn.parts){
      if(part.inlineData?.mimeType?.startsWith('audio/')){
        const audioData = base64ToArrayBuffer(part.inlineData.data);
        audioQueue.push(audioData);
        playNextAudio();
      }
      if(part.text){
        setBubble(part.text);
        addLog(part.text, 'ai');
      }
    }
  }
}

// ===== 音声再生 =====
async function playNextAudio(){
  if(isPlaying || audioQueue.length === 0) return;
  isPlaying = true;
  animateViz(true);
  const audioData = audioQueue.shift();
  try {
    if(!audioContext) audioContext = new AudioContext();
    const buffer = await audioContext.decodeAudioData(audioData);
    const source = audioContext.createBufferSource();
    source.buffer = buffer;
    source.connect(audioContext.destination);
    source.onended = () => {
      isPlaying = false;
      if(audioQueue.length > 0) playNextAudio();
      else animateViz(false);
    };
    source.start();
  } catch(e) {
    isPlaying = false;
    animateViz(false);
  }
}

// ===== マイク制御 =====
async function toggleMic(){
  // isConnectedではなくWebSocketの実際の状態で判定
  if(!ws || ws.readyState !== WebSocket.OPEN){
    alert('先に接続ボタンを押してください');
    return;
  }
  // 接続済みならフラグを強制セット
  if(!isConnected){
    isConnected = true;
    setStatus('connected', '接続中');
    document.getElementById('connectBtn').classList.add('connected');
    document.getElementById('connectLabel').textContent = '接続済';
    setBubble(`こんにちは。${chars[currentChar].name}です。何でもお聞きください。`);
  }
  if(isMicActive){ stopMic(); }
  else { await startMic(); }
}

async function startMic(){
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
    if(!audioContext) audioContext = new AudioContext({sampleRate:16000});
    const source = audioContext.createMediaStreamSource(mediaStream);
    processor = audioContext.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if(!ws || ws.readyState !== WebSocket.OPEN) return;
      const inputData = e.inputBuffer.getChannelData(0);
      const pcm16 = float32ToPCM16(inputData);
      const b64 = arrayBufferToBase64(pcm16.buffer);
      const msg = {
        realtime_input: {
          media_chunks: [{
            mime_type: 'audio/pcm;rate=16000',
            data: b64
          }]
        }
      };
      ws.send(JSON.stringify(msg));
      animateViz(true);
    };

    source.connect(processor);
    processor.connect(audioContext.destination);
    isMicActive = true;
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('micLabel').textContent = '話し中';
    setStatus('listening', '聴いています');
  } catch(e) {
    alert('マイクの使用を許可してください');
  }
}

function stopMic(){
  if(processor){ processor.disconnect(); processor = null; }
  if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream = null; }
  isMicActive = false;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micLabel').textContent = 'マイク';
  if(isConnected) setStatus('connected', '接続中');
  animateViz(false);
}

// ===== カメラ =====
async function toggleCamera(){
  if(cameraActive){ stopCamera(); }
  else { await startCamera(); }
}

async function startCamera(){
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video = document.getElementById('cameraVideo');
    video.srcObject = cameraStream;
    video.style.display = 'block';
    document.getElementById('cameraOff').style.display = 'none';
    document.getElementById('camToggleBtn').textContent = '📷 カメラOFF';
    cameraActive = true;
    startSendingFrames();
  } catch(e) {
    alert('カメラの使用を許可してください');
  }
}

function stopCamera(){
  if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
  if(frameInterval){ clearInterval(frameInterval); frameInterval = null; }
  document.getElementById('cameraVideo').style.display = 'none';
  document.getElementById('cameraOff').style.display = 'flex';
  document.getElementById('camToggleBtn').textContent = '📷 カメラON';
  cameraActive = false;
}

function startSendingFrames(){
  const video = document.getElementById('cameraVideo');
  const canvas = document.createElement('canvas');
  canvas.width = 320; canvas.height = 240;
  const ctx = canvas.getContext('2d');

  frameInterval = setInterval(() => {
    if(!ws || ws.readyState !== WebSocket.OPEN || !isConnected) return;
    ctx.drawImage(video, 0, 0, 320, 240);
    const b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
    const msg = {
      realtime_input: {
        media_chunks: [{
          mime_type: 'image/jpeg',
          data: b64
        }]
      }
    };
    ws.send(JSON.stringify(msg));
  }, 1000);
}

// ===== クイックメッセージ =====
function sendQuickMsg(text){
  if(!ws || ws.readyState !== WebSocket.OPEN){ alert('先に接続ボタンを押してください'); return; }
  if(!isConnected){ isConnected = true; }
  addLog(text, 'user');
  const msg = {
    client_content: {
      turns: [{ role: 'user', parts: [{ text }] }],
      turn_complete: true
    }
  };
  ws.send(JSON.stringify(msg));
}

// ===== セッション終了 =====
function endSession(){
  stopMic();
  stopCamera();
  if(ws){ ws.close(); ws = null; }
  isConnected = false;
  setStatus('', '未接続');
  document.getElementById('connectBtn').classList.remove('connected');
  document.getElementById('connectLabel').textContent = '接続';
  setBubble('セッションを終了しました。');
  animateViz(false);
}

// ===== UI ヘルパー =====
function setStatus(cls, text){
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (cls ? ' ' + cls : '');
  document.getElementById('statusText').textContent = text;
}

function setBubble(text){
  document.getElementById('bubbleText').textContent = text;
}

function addLog(text, role){
  const area = document.getElementById('logArea');
  const row = document.createElement('div');
  row.className = 'log-msg ' + role;
  const bub = document.createElement('div');
  bub.className = 'log-bubble';
  bub.textContent = text;
  row.appendChild(bub);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

// ===== 変換ユーティリティ =====
function float32ToPCM16(float32Array){
  const pcm = new Int16Array(float32Array.length);
  for(let i=0;i<float32Array.length;i++){
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return pcm;
}

function arrayBufferToBase64(buffer){
  const bytes = new Uint8Array(buffer);
  let b = '';
  for(let i=0;i<bytes.byteLength;i++) b += String.fromCharCode(bytes[i]);
  return btoa(b);
}

function base64ToArrayBuffer(b64){
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for(let i=0;i<bin.length;i++) view[i] = bin.charCodeAt(i);
  return buf;
}
