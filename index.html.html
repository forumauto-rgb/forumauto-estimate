<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォーラムオート 見積システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;font-size:13px;color:#1a1a1a;background:#eef0f4}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:linear-gradient(135deg,#1a3a6b 0%,#2a5298 100%);color:white;padding:0 16px;display:flex;align-items:center;height:48px;flex-shrink:0;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.print-only{display:none}
.logo{font-size:14px;font-weight:bold;margin-right:16px;padding-right:16px;border-right:1px solid rgba(255,255,255,0.3);white-space:nowrap}
.tab{padding:0 13px;height:48px;display:flex;align-items:center;border:none;background:none;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.7);border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.15s}
.tab.active{color:white;border-bottom-color:#64b5f6;font-weight:bold}
.tab:hover:not(.active){color:white;background:rgba(255,255,255,0.08)}
.content{flex:1;overflow:auto;padding:12px}
.card{background:white;border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.sec-hd{background:linear-gradient(90deg,#1a3a6b,#2a5298);color:white;padding:8px 14px;border-radius:8px 8px 0 0;font-size:12px;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:#888;font-weight:bold}
.fg input,.fg select{height:30px;padding:0 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:12px;background:white}
.fg input:focus,.fg select:focus{outline:none;border-color:#2a5298}
.btn{padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:bold;border:1px solid #ccc;background:white;color:#333;transition:all 0.15s}
.btn:hover{background:#f0f0f0}
.btn-p{background:linear-gradient(135deg,#1a3a6b,#2a5298);color:white;border:none;box-shadow:0 2px 5px rgba(26,58,107,0.3)}
.btn-g{background:linear-gradient(135deg,#2e7d32,#43a047);color:white;border:none}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:11px}
.del-btn{background:none;border:none;color:#e53935;cursor:pointer;font-size:12px;padding:2px 6px;border-radius:3px}
.del-btn:hover{background:#ffebee}

/* メインレイアウト */
.main-layout{display:flex;flex-direction:column;gap:10px}
.part-and-task{display:grid;grid-template-columns:minmax(480px,580px) 1fr;gap:10px;align-items:start}

/* 検索枠 */
.kw-wrap{display:flex;gap:6px;margin-bottom:10px}
.kw-input{flex:1;height:42px;padding:0 16px;border:2px solid #e0e0e0;border-radius:24px;font-size:15px;transition:border-color 0.15s}
.kw-input:focus{outline:none;border-color:#2a5298;box-shadow:0 0 0 3px rgba(42,82,152,0.1)}

/* タスク */
.task-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #f5f5f5;background:white;transition:background 0.1s}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:#fafafa}
.task-item.checked{background:#f0faf0}
.task-item input[type=checkbox]{width:16px;height:16px;accent-color:#2a5298;cursor:pointer;flex-shrink:0}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:bold;white-space:nowrap;flex-shrink:0}
.tag-paint{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.tag-remove{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
.tag-attach{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}

/* 選択作業テーブル */
.est-tbl{width:100%;border-collapse:collapse;font-size:12px}
.est-tbl th{background:#f0f4ff;padding:7px 8px;text-align:left;border-bottom:2px solid #c5cae9;font-size:11px;color:#555;white-space:nowrap;font-weight:bold}
.est-tbl td{padding:5px 7px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.est-tbl tr:hover td{background:#fafbff}
.drag-h{color:#ccc;cursor:grab;user-select:none;font-size:16px}
.ed-num{height:26px;padding:0 4px;border:1px solid #ddd;border-radius:4px;font-size:12px;text-align:right;background:#fffde7}
.ed-num:focus{outline:none;border-color:#2a5298;background:#fff}
.ed-h{width:56px}
.ed-c{width:76px}

/* サマリー */
.sum-box{background:linear-gradient(135deg,#e8eaf6,#e3f2fd);border-radius:8px;padding:12px 16px;margin-top:10px;border:1px solid #c5cae9}
.sum-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sum-row.total{font-size:16px;font-weight:bold;border-top:2px solid #9fa8da;margin-top:8px;padding-top:8px;color:#1a3a6b}

/* 部品材料 */
.sub-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sub-tbl th{background:#f9f9f9;padding:5px 7px;text-align:left;border-bottom:1px solid #e0e0e0;font-size:11px;color:#888}
.sub-tbl td{padding:4px 6px;border-bottom:1px solid #f5f5f5}
.sub-tbl input{width:100%;height:26px;padding:0 6px;border:1px solid #e0e0e0;border-radius:4px;font-size:12px}
.sub-tbl input:focus{outline:none;border-color:#2a5298}

/* マスター */
.mst-tbl{width:100%;border-collapse:collapse;font-size:11px}
.mst-tbl th{background:#f0f4ff;padding:7px 8px;text-align:left;border-bottom:2px solid #c5cae9;font-size:10px;color:#555;font-weight:bold;white-space:nowrap}
.mst-tbl td{padding:5px 7px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.mst-tbl tr:hover td{background:#f5f7ff}
.mst-tbl input{width:100%;height:26px;padding:0 6px;border:1px solid #e0e0e0;border-radius:4px;font-size:11px}
.mst-tbl input:focus{outline:none;border-color:#2a5298}
.mst-tbl select{height:26px;padding:0 4px;border:1px solid #e0e0e0;border-radius:4px;font-size:11px;width:100%}
.mtab{padding:7px 18px;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;font-weight:bold}
.mtab.active{color:#1a3a6b;border-bottom-color:#1a3a6b}

/* 塗装係数 */
.paint-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.paint-card{background:#f5f7fa;border-radius:8px;padding:12px;border:1px solid #e0e0e0}
.paint-lbl{font-size:10px;color:#888;margin-bottom:6px;font-weight:bold;text-transform:uppercase}
.paint-sel{width:100%;height:30px;padding:0 6px;border:1px solid #ccc;border-radius:6px;font-size:12px}
.paint-val{font-size:20px;font-weight:bold;color:#1a3a6b;margin-top:5px}
.formula-box{background:#fff8e1;border-radius:8px;padding:12px 16px;border:1px solid #ffe082;font-size:12px;line-height:2;margin-bottom:12px}
.result-box{background:linear-gradient(135deg,#e3f2fd,#e8eaf6);border-radius:8px;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border:1px solid #bbdefb}

/* 車体SVG */
.car-part{cursor:pointer;transition:all 0.15s}
.ps{fill:#dce8f8;stroke:#2a5298;stroke-width:1.5;opacity:0.45;transition:all 0.15s}
.car-part:hover .ps{opacity:0.8}
.car-part.has-tasks .ps{fill:#c8e6c9;stroke:#2e7d32;opacity:0.85}
.car-part.active .ps{fill:#1a3a6b;opacity:0.9}
.pl{font-size:8.5px;fill:#1a3a6b;text-anchor:middle;pointer-events:none;font-weight:bold}
.car-part.active .pl{fill:white}
.car-part.has-tasks .pl{fill:#1b5e20}

/* 係数インジケーター */
.coef-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:6px 12px;background:#e8eaf6;border-radius:8px;margin-bottom:10px}
.coef-item{font-size:11px;color:#555}
.coef-item strong{color:#1a3a6b;font-size:13px}
.coef-item.paint{color:#2e7d32}
.coef-item.paint strong{color:#2e7d32}
.coef-item.total{color:#e65100}
.coef-item.total strong{font-size:15px;color:#e65100}

/* 見積書 */
.print-bar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px}
/* リサイズ可能パネル */
div[style*="resize:vertical"]{
  resize:vertical;
  overflow:auto;
  border-bottom:3px double #c5cae9;
  padding-bottom:2px;
  cursor:ns-resize;
}
div[style*="resize:vertical"]::-webkit-scrollbar{width:6px}
div[style*="resize:vertical"]::-webkit-scrollbar-thumb{background:#c5cae9;border-radius:3px}
.ep{background:white;width:100%;max-width:760px;margin:0 auto;padding:20px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.12);border-radius:4px;font-family:'MS Mincho','Yu Mincho','Hiragino Mincho ProN',serif;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.ep-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
.ep-tbl thead tr{background:#1a3a6b;color:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.ep-tbl th{padding:5px 6px;text-align:center;font-weight:bold;border:1px solid #1a3a6b;white-space:nowrap;background:#1a3a6b;color:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.ep-tbl th.left{text-align:left}
.ep-tbl td{padding:4px 6px;border:1px solid #ccc;vertical-align:middle;white-space:normal;word-break:break-word}
.ep-tbl td.proc{font-size:9.5px;text-align:center;line-height:1.3;word-break:break-all}
.ep-tbl td.c{text-align:center}
.ep-tbl td.r{text-align:right;font-weight:bold}
.ep-tbl tbody tr:nth-child(even) td{background:#f8f9ff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@media print{
  body > *{display:none!important}
  .app{display:block!important}
  .no-print,
  .topbar,.coef-bar,.toggle-panel-bar,#printBtn,
  .body-type-grid,.shortcut-grid,.part-and-task,
  #estListPanel,.damage-suggest-overlay{display:none!important}
  .print-only{display:block!important}
  .content{display:block!important;padding:0!important;overflow:visible!important;height:auto!important}
  .card:not(.ep-wrap):not(.wo-card){display:none!important}
  #wo-wrap{display:block!important}
  @page{size:A4 portrait;margin:8mm 8mm 8mm 8mm}
  html,body{
    width:210mm!important;
    background:white!important;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
    font-size:9pt!important;
    margin:0!important;padding:0!important;
    color:#000!important;
    -webkit-text-stroke:0.5px #000;
  }
  /* 見積書本体 */
  .ep-wrap{
    display:block!important;
    width:194mm!important;max-width:194mm!important;
    height:auto!important;min-height:281mm!important;
    margin:0 auto!important;padding:0!important;
    font-size:9.5pt!important;box-sizing:border-box!important;
    background:white!important;
  }
  .ep{
    box-shadow:none!important;
    border:1.5px solid #000!important;
    width:194mm!important;max-width:194mm!important;
    padding:4mm 5mm!important;margin:0!important;
    font-size:9pt!important;box-sizing:border-box!important;
    background:white!important;color:#000!important;
  }
  /* 全テキスト黒・太字 */
  .ep *{
    color:#000!important;
    -webkit-text-stroke:0.5px #000;
  }
  /* タイトル */
  .ep-title{font-size:20pt!important;letter-spacing:0.2em!important;margin-bottom:3mm!important;font-weight:bold!important;color:#000!important;}
  .ep-header{font-size:9pt!important;margin-bottom:2mm!important;color:#000!important;font-weight:bold!important;}
  /* 顧客名・車両行 */
  .ep-header td{border-bottom:1px solid #000!important;padding:1mm 2mm!important;font-weight:bold!important;}
  /* 御見積金額バー */
  .ep-amount-bar{
    padding:3mm 5mm!important;font-size:12pt!important;font-weight:bold!important;
    background:white!important;color:#000!important;
    border:1.5px solid #000!important;
    margin-bottom:3mm!important;
  }
  .ep-amount-bar *{color:#000!important;font-weight:bold!important;}
  /* 作業テーブル */
  .ep-tbl{
    font-size:9pt!important;width:100%!important;
    border-collapse:collapse!important;
    border:1px solid #000!important;
  }
  .ep-tbl th{
    background:white!important;color:#000!important;
    font-size:9pt!important;font-weight:bold!important;
    padding:2mm 2.5mm!important;
    border:1px solid #000!important;
    border-bottom:2px solid #000!important;
    -webkit-text-stroke:0.5px #000;
  }
  .ep-tbl td{
    padding:1.5mm 2.5mm!important;
    border-bottom:0.5px solid #000!important;
    border-right:0.5px solid #888!important;
    color:#000!important;
    font-size:9pt!important;
    font-weight:bold!important;
    -webkit-text-stroke:0.5px #000;
  }
  .ep-tbl tbody tr:nth-child(even) td{
    background:#f8f8f8!important;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
  /* 工程ヘッダー行（⓪損傷確認など）- 黒太字・薄グレー背景 */
  .ep-tbl tr td[colspan="6"]{
    background:#e8e8e8!important;
    color:#000!important;
    font-weight:bold!important;
    font-size:8pt!important;
    border-top:1px solid #000!important;
    border-bottom:1px solid #000!important;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
  /* 部位グループ行 */
  .ep-tbl tr td[colspan="6"]:not(:first-child){
    background:#f0f0f0!important;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
  /* 合計欄 */
  .ep-grand-total{
    background:white!important;color:#000!important;
    border:2px solid #000!important;
    font-size:14pt!important;font-weight:bold!important;
    padding:3mm 5mm!important;
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }
  .ep-grand-total *{color:#000!important;font-weight:bold!important;}
  /* サマリー */
  .ep-summary{font-size:8.5pt!important;color:#000!important;font-weight:bold!important;}
  .ep-summary td{border:0.5px solid #000!important;padding:1mm 2mm!important;font-weight:bold!important;color:#000!important;}
  /* 備考・注意書き */
  .ep-note{font-size:8pt!important;margin-top:3mm!important;color:#000!important;font-weight:500!important;}
  /* ページ区切り */
  .ep-page-break{page-break-before:always!important}
}

.mat-tbl{width:100%;border-collapse:collapse;font-size:12px}
.mat-tbl th{background:#2a5298;color:white;padding:6px 8px;text-align:center;position:sticky;top:0;z-index:2}
.mat-tbl td{padding:5px 8px;border-bottom:1px solid #eee;vertical-align:middle}
.mat-tbl tr:hover td{background:#f0f4ff}
.mat-tbl tr.has-use td{background:#fff8e1}
.mat-num{text-align:right;font-family:monospace}
.mat-search{width:100%;padding:8px 12px;border:1.5px solid #c5cae9;border-radius:8px;font-size:13px;margin-bottom:10px;box-sizing:border-box}
.mat-sum-box{background:linear-gradient(135deg,#1a3a6b,#2a5298);color:white;border-radius:10px;padding:10px 16px;min-width:140px}
.mat-sum-label{font-size:10px;opacity:0.8;margin-bottom:4px}
.mat-sum-val{font-size:18px;font-weight:bold}
.toggle-panel-bar{display:flex;gap:0;align-items:center;border-radius:10px;border:2px solid #2a5298;margin-bottom:10px;padding-right:4px}
.tpb-btn{flex:1;padding:8px;border:none;cursor:pointer;font-size:12px;font-weight:bold;background:#f0f4ff;color:#2a5298;transition:all 0.2s;white-space:nowrap}
.tpb-btn.active{background:#2a5298;color:white}
.body-type-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px}
.body-type-btn{padding:5px 2px;border-radius:8px;font-size:10px;font-weight:bold;cursor:pointer;border-width:1.5px;border-style:solid;text-align:center;line-height:1.3}
.body-type-btn.active{background:linear-gradient(135deg,#1a3a6b,#2a5298);color:white;border-color:#1a3a6b;box-shadow:0 3px 8px rgba(26,58,107,0.4)}
.body-type-btn:not(.active){background:#f0f4ff;color:#1a3a6b;border-color:#c5cae9}
.shortcut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:8px}
.damage-suggest-overlay{background:rgba(26,58,107,0.97);color:white;border-radius:12px;padding:18px;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);position:relative;z-index:100}
.shortcut-btn{padding:5px 3px;border-radius:6px;font-size:10px;font-weight:bold;cursor:pointer;border:1px solid #ddd;background:#f5f5f5;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.shortcut-btn.active{background:#1a3a6b;color:white;border-color:#1a3a6b}
@media(max-width:700px){@media(max-width:700px){
  .part-and-task{grid-template-columns:1fr!important}
  .main-layout{gap:6px}
}
</style>
</head>

<script>


// ===== 毎月1日バックアップ警告 =====
function checkBackupReminder(){
  try{
    var last=localStorage.getItem('fa_last_backup_date')||'';
    var today=new Date();
    var todayStr=today.toISOString().split('T')[0];
    var isFirstDay=(today.getDate()===1);
    var isOverdue=false;
    if(last){var d=new Date(last);isOverdue=Math.floor((today-d)/(1000*60*60*24))>=30;}
    else isOverdue=true;
    if((isFirstDay||isOverdue)&&localStorage.getItem('fa_backup_warned_today')!==todayStr){
      localStorage.setItem('fa_backup_warned_today',todayStr);
      var msg=isFirstDay?'📅 今日は月初め（1日）です。\nJSONバックアップをお勧めします。':'⚠ 前回バックアップから30日以上経過しています。';
      var lastMsg=last?'前回バックアップ：'+last:'まだバックアップされていません';
      var div=document.createElement('div');
      div.id='backup-reminder';
      div.style.cssText='position:fixed;top:56px;left:50%;transform:translateX(-50%);background:white;border:2px solid #e65100;border-radius:12px;padding:18px 22px;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,0.2);min-width:300px;max-width:380px;text-align:center;';
      div.innerHTML='<div style="font-size:18px;margin-bottom:6px">💾</div>'
        +'<div style="font-size:14px;font-weight:bold;color:#e65100;margin-bottom:6px;white-space:pre-line">'+msg+'</div>'
        +'<div style="font-size:11px;color:#888;margin-bottom:14px;">'+lastMsg+'</div>'

async function dbGetAll(table){
  try{
    var res = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?order=created_at.asc',{
      method:'GET',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json'
      }
    });

async function syncToCloud(){
  if(DB_MODE==='local'){
    var ok = await testConnection();
    if(!ok){ showNotify('⚠ Supabaseに接続できません'); return; }
  }
  showNotify('☁ クラウドに保存中...');
  var ok = true;
  try{
    if(cMaster.length>0){
      var cData=cMaster.map(function(c){return{
        customer_no:c.id||'',
        name:c.name||'(名前なし)',
        honorific:c.honorific||'様',
        tel:c.tel||'',
        postal:c.postal||'',
        address:c.address||'',
        insurance:c.insurance||'',
        aj_staff:c.aj||'',
        memo:c.memo||''
      };});
      // まず既存データを全削除してから再INSERT（確実なupsert）
      var rDel1=await fetch(SUPABASE_URL+'/rest/v1/customers?customer_no=neq.DUMMY_NEVER_EXISTS',{
        method:'DELETE',
        headers:{
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Content-Type':'application/json'
        }
      });
      var r1=await fetch(SUPABASE_URL+'/rest/v1/customers',{
        method:'POST',
        headers:{
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Content-Type':'application/json',
          'Prefer':'return=minimal'
        },
        body:JSON.stringify(cData)
      });
      if(!r1.ok){var e1=await r1.text();throw new Error('顧客保存失敗: '+e1);}
    }
    if(vMaster.length>0){
      var vData=vMaster.map(function(v){return{
        vehicle_no:v.id||'',
        plate:v.plate||'',
        maker:v.maker||'',
        name:v.name||'',
        vin:v.vin||'',
        year_num:parseInt(v.year)||null,
        drive:v.drive||'2WD',
        grade:v.grade||'中型',
        grade_coef:parseFloat(v.gradeCoef)||1.1,
        color_name:v.color||'',
        color_code:v.colorCode||'',
        film_type:v.film||'2コートソリッド',
        paint_type:v.paint||'2K(標準)',
        clear_type:v.clear||'標準クリヤー',
        special:v.special||'なし',
        memo:v.memo||''
      };});
      var rDel2=await fetch(SUPABASE_URL+'/rest/v1/vehicles?vehicle_no=neq.DUMMY_NEVER_EXISTS',{
        method:'DELETE',
        headers:{
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Content-Type':'application/json'
        }
      });
      var r2=await fetch(SUPABASE_URL+'/rest/v1/vehicles',{
        method:'POST',
        headers:{
          'apikey':SUPABASE_KEY,
          'Authorization':'Bearer '+SUPABASE_KEY,
          'Content-Type':'application/json',
          'Prefer':'return=minimal'
        },
        body:JSON.stringify(vData)
      });
      if(!r2.ok){var e2=await r2.text();throw new Error('車両保存失敗: '+e2);}
    }
    showNotify('✅ クラウド保存完了 顧客:'+cMaster.length+'件 車両:'+vMaster.length+'件');
  }catch(e){
    console.error('syncToCloud error:',e);
    showNotify('❌ 保存失敗: '+e.message);
  }
}

function getGradeCoef(){const g=GRADE_MASTER.find(x=>x.name===customer.grade);return g?g.coef:1.1;}
function getPaintCoef4(){
  const f=PAINT_MASTERS.film.find(x=>x.name===pc4.film);
  const p=PAINT_MASTERS.paint.find(x=>x.name===pc4.paint);
  const c=PAINT_MASTERS.clear.find(x=>x.name===pc4.clear);
  const s=PAINT_MASTERS.special.find(x=>x.name===pc4.special);
  return (f?f.val:1)*(p?p.val:1)*(c?c.val:1)*(s?s.val:1);
}
function getTotalPaintCoef(){return getGradeCoef()*getPaintCoef4();}
function getTotalLaborCoef(){return getGradeCoef();}
function effectiveLR(item){
  if(typeof item === 'boolean') return item ? Math.round(RATE*getTotalPaintCoef()) : Math.round(RATE*getTotalLaborCoef());
  if(item && item.tag === 'booth') return 2000;
  if(item && item.tag === 'paint') return Math.round(RATE*getTotalPaintCoef());
  return Math.round(RATE*getTotalLaborCoef());
}

function getDeptName(t){
  var p = t.process || '';
  var tag = t.tag || '';
  var name = t.name || '';
  var viewTab = t._viewTab || '';

  // ① エーミング（最優先）
  if(name.indexOf('エーミング')>=0 || name.indexOf('アライメント')>=0) return 'エーミング';

  // ② ガラス
  if(name.indexOf('ガラス')>=0 || name.indexOf('ウインド')>=0) return 'ガラス';

  // ③ 塗装（tag=paint/booth または工程名が塗装系）
  if(tag==='paint' || tag==='booth') return '塗装';
  if(['塗装','パネル塗装','バンパー塗装','ぼかし塗装','新品パネル塗装','修正パネル塗装',
      '下地処理（少）','下地処理（中）','下地処理（大）','養生','養生（小）','養生（中）',
      '養生（大）','養生（特大）','裏面塗装','裏面塗装（小）','裏面塗装（中）','裏面塗装（全）',
      '磨き肌調整','乾燥','乾燥（0.5h）','乾燥（2h）','乾燥（3h）',
      '使用','使用（0.5h）','使用（2h）','使用（3h）','塗布'].indexOf(p)>=0) return '塗装';

  // ④ 仕上げ（清掃・納車・洗車系）
  if(['清掃','洗車','外装洗車・仕上げ','室内清掃','ガラス清掃・仕上げ',
      'エンジンルーム清掃','下回り洗浄','走行テスト（一般道）','走行テスト（高速道路含む）'].indexOf(p)>=0) return '仕上げ';
  if(name.indexOf('洗車')>=0 || name.indexOf('清掃')>=0 || name.indexOf('仕上げ')>=0 || name.indexOf('走行テスト')>=0) return '仕上げ';

  // ⑤ 整備（足回り・メカニカル）
  if(tag==='replace') return '整備';
  if(viewTab==='suspension') return '整備';
  if(['交換','調整','点検調整'].indexOf(p)>=0 &&
     (name.indexOf('サスペンション')>=0 || name.indexOf('ブレーキ')>=0 ||
      name.indexOf('タイヤ')>=0 || name.indexOf('アーム')>=0 ||
      name.indexOf('ハブ')>=0 || name.indexOf('ロッド')>=0)) return '整備';

  // ⑥ 内装
  if(viewTab==='interior') return '内装';
  if(name.indexOf('シート')>=0 || name.indexOf('ダッシュ')>=0 ||
     name.indexOf('インパネ')>=0 || name.indexOf('カーペット')>=0 ||
     name.indexOf('トリム')>=0 || name.indexOf('ピラー内装')>=0) return '内装';

  // ⑦ 鈑金（修正・修理・板金）
  if(tag==='body' || p==='修正' || p==='修理' || p==='修理後点検・確認') return '鈑金';

  // ⑧ 脱着（取外し・取付・取替・脱着）
  if(['取外し','脱着','取外し取付','処理','廃棄','取付','取替','脱着・取替','設定'].indexOf(p)>=0) return '脱着';

  // ⑨ その他は確認・計測
  return '確認';
}

async function woLoadFromCloud(estId,estNo){
  showNotify('☁ 指示書を読み込み中...');
  try{
    var r0=await fetch(SUPABASE_URL+'/rest/v1/estimates?id=eq.'+estId,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    var hdrs=await r0.json();
    var h=hdrs&&hdrs[0]?hdrs[0]:{};
    var r1=await fetch(SUPABASE_URL+'/rest/v1/estimate_items?estimate_id=eq.'+estId+'&order=sort_order.asc',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    var items=await r1.json();
    var selData=items.map(function(t){return{name:t.item_name||'',process:t.process||'',tag:t.tag||'remove',
      hours:t.hours||0,h:t.actual_hours||0,cost:t.cost||0,price:t.cost||0,
      part:t.part_name||'',_part:t.part_name||'',_actualH:t.actual_hours||0,
      _staff:t.staff_name||'',_viewTab:t.view_tab||'exterior',id:t.id||(Date.now()+Math.random())};});
    woCurrentEst={id:estId,no:estNo,customerName:h.customer_name||'',car:h.car_name||'',
      plate:h.plate||'',color:h.color_name||'',colorCode:h.color_code||'',
      grade:h.grade||'中型',date:h.estimate_date||'',selSnapshot:selData,_estId:estId};
    woMode='view';render();
    showNotify('✅ '+estNo+'\n'+(h.customer_name||'')+'　様の指示書を開きました');

}

function woUpdateActualH(id,val){
  if(!woCurrentEst||!woCurrentEst.selSnapshot)return;
  var item=woCurrentEst.selSnapshot.find(function(s){return String(s.id)==String(id);});
  if(item){
    item._actualH=parseFloat(val)||0;
    var total=woCurrentEst.selSnapshot.reduce(function(s,t){return s+(parseFloat(t._actualH)||0);},0);
    var el=document.getElementById('wo-actual-total');
    if(el)el.textContent=Math.round(total*10)/10>0?Math.round(total*10)/10+'h':'';
    if(!woCurrentEst.id){var orig=sel.find(function(s){return String(s.id)==String(id);});if(orig)orig._actualH=item._actualH;}
    woAutoSave();
  }
}
function woUpdateStaff(id,val){
  if(!woCurrentEst||!woCurrentEst.selSnapshot)return;
  var item=woCurrentEst.selSnapshot.find(function(s){return String(s.id)==String(id);});
  if(item){item._staff=val;if(!woCurrentEst.id){var orig=sel.find(function(s){return String(s.id)==String(id);});if(orig)orig._staff=val;}woAutoSave();}

var _woSaveTimer=null;
function woAutoSave(){
  if(_woSaveTimer)clearTimeout(_woSaveTimer);
  _woSaveTimer=setTimeout(function(){
    if(woCurrentEst&&woCurrentEst._estId&&DB_MODE==='cloud'){woSaveActualToCloud();}
    else{autoSaveM();}
  },2000);
}
async function woSaveActualToCloud(){
  if(!woCurrentEst||!woCurrentEst._estId)return;
  try{
    var updates=(woCurrentEst.selSnapshot||[]).map(function(t){
      return fetch(SUPABASE_URL+'/rest/v1/estimate_items?id=eq.'+t.id,{
        method:'PATCH',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({actual_hours:parseFloat(t._actualH)||0,staff_name:t._staff||''})
      });
    });
    await Promise.all(updates);
    showNotify('💾 実作業時間を保存しました');
  }catch(e){console.warn('woSaveActualToCloud error:',e);}
}

function checkGate(action){
  var missing = [];
  // 作業開始ゲート：顧客名・車名が必須
  if(!customer.name) missing.push('顧客名');
  if(!customer.car)  missing.push('車名');
  if(action==='work' && missing.length){
    showGateAlert(missing, '⚠ 作業の選択を開始できません', '顧客情報を先に入力してください');
    return false;
  }
  // 見積確定ゲート：ナンバー・入庫写真が必須
  if(action==='preview'){
    if(!customer.plate) missing.push('ナンバー');
    if(!customer.photoIncoming || !customer.photoIncoming.length){
      missing.push('入庫時写真（📷 最低1枚）');
    }
    if(missing.length){
      showGateAlert(missing, '⚠ 見積書を表示できません', 'この時点で撮影しないと取り返しがつきません！');
      return false;
    }
  }
  return true;
}

function addPhotos(input, category){
  var cat = category || 'photoIncoming';
  var files = Array.from(input.files || []);
  if(!files.length) return;
  files.forEach(function(file){
    if(!file.type.match(/^image\//)) return;
    var reader = new FileReader();
    reader.onload = function(e){
      if(!e.target || !e.target.result) return;
      // Canvas で圧縮（iPadの写真は大きすぎる）
      var img = new Image();
      img.onload = function(){
        try {
          var canvas = document.createElement('canvas');
          var maxSize = 900;
          var w = img.width, h = img.height;
          if(w > maxSize || h > maxSize){
            if(w > h){ h = Math.round(h * maxSize / w); w = maxSize; }
            else { w = Math.round(w * maxSize / h); h = maxSize; }
          }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var compressed = canvas.toDataURL('image/jpeg', 0.75);
          if(!customer[cat]) customer[cat] = [];
          customer[cat].push(compressed);
          if(!customer.photos) customer.photos = [];
          customer.photos.push(compressed);
        } catch(err) {
          // 圧縮失敗時はそのまま
          if(!customer[cat]) customer[cat] = [];
          customer[cat].push(e.target.result);
          if(!customer.photos) customer.photos = [];
          customer.photos.push(e.target.result);
        }
        rIP();
      };
      img.onerror = function(){
        if(!customer[cat]) customer[cat] = [];
        customer[cat].push(e.target.result);
        rIP();
      };
      img.src = e.target.result;
    };
    reader.onerror = function(){ showNotify('⚠ 写真の読込に失敗しました'); };

  });

// ===== Google スプレッドシート連携 =====
async function gasPost(action, data){
  if(!GAS_URL){ showNotify('⚠ GAS URLが設定されていません'); return null; }
  try{
    var resp = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(Object.assign({action: action}, data))
    });
    return await resp.json();
  } catch(e){
    showNotify('❌ GAS通信エラー: ' + e.message);
    return null;
  }
}

// SupabaseデータをGoogleシートに一括転送
async function syncSupabaseToSheet(){
  if(!confirm('SupabaseのデータをGoogleシートに転送します。\n顧客マスター・車両マスター・見積データを全て転送します。\nよろしいですか？')) return;
  showNotify('🔄 Supabase → Googleシート転送中...');
  try{
    // 顧客・車両マスター転送
    await saveMasterToSheet();
    // 見積データ転送（Supabaseから取得）
    var estResp = await fetch(SUPABASE_URL+'/rest/v1/estimates?select=*&order=created_at.desc&limit=500', {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY}
    });
    if(estResp.ok){
      var ests = await estResp.json();
      showNotify('📊 見積データ'+ests.length+'件を転送中...');
      for(var i=0; i<ests.length; i++){
        var est = ests[i];
        await gasPost('saveEstimate', {
          customer: {
            no: est.estimate_no||'',
            name: est.customer_name||'',
            car: est.car_name||'',
            plate: est.plate||'',
            color: est.color_name||'',
            repairType: est.repair_type||'insurance',
            insCompany: est.ins_company||'',
            ajCompany: est.aj_company||'',
            ajStaff: est.aj_staff||'',
            deductible: est.deductible||0,
            discount: est.discount||0,
            paymentDue: est.payment_due||'',
            paymentDate: est.payment_date||''
          },
          sel: JSON.parse(est.items||'[]'),
          totals: {
            labor: est.labor_total||0,
            pt: est.parts_total||0,
            mt: est.material_total||0,
            sub: est.subtotal||0,
            tax: est.tax||0,
            total: est.total||0,
            discount: est.discount||0,
            actualIncome: (est.total||0) - (est.discount||0)
          }
        });
      }
      showNotify('✅ 全データ転送完了！顧客・車両・見積'+ests.length+'件');
    }
  } catch(e){
    showNotify('❌ 転送エラー: ' + e.message);
  }
}

function applyDamageSuggest(partKey, items){
  document.getElementById('damage-suggest-overlay').remove();

  // サスペンション系部位かどうかを判定
  var SUSPENSION_KEYS = ['サスペンション','タイロッド','ロアアーム','ハブベアリング',
    'ラテラルロッド','フロントサスペンション','リヤーサスペンション',
    'ストラットタワー','クロスメンバー','フェンダーエプロン','サイドフレーム',
    'Fサイドメンバー','フロントサイドメンバー','ブレーキ'];
  var needsAlignment = SUSPENSION_KEYS.some(function(k){
    return partKey.indexOf(k) >= 0;
  });

  var added = 0;
  var toAdd = [];

  items.forEach(function(item, i){
    var cb = document.getElementById('dsi_'+i);
    if(!cb || !cb.checked) return;

    if(PARTS_DATA[item]){
      // PARTS_DATAの全作業をgetProcessOrder順で追加
      var tasks = PARTS_DATA[item];
      tasks.forEach(function(t){
        var already = sel.find(function(s){
          return s._part === item && s.name === t.name && s.process === t.process;
        });
        if(!already){
          var lr = effectiveLR(t);
          var newItem = Object.assign({}, t, {
            _part: item,
            _viewTab: 'exterior',
            id: 'dmg_' + Date.now() + '_' + Math.random(),
            cost: t.hours ? Math.round(lr * t.hours) : (t.cost || 0),
            price: t.hours ? Math.round(lr * t.hours) : (t.cost || 0),
            h: t.hours || 0
          });
          toAdd.push(newItem);
          added++;
        }
      });
    } else {
      // PARTS_DATAにない場合は確認作業として追加
      var already2 = sel.find(function(s){return s.name === item;});
      if(!already2){
        toAdd.push({
          name: item, process: '確認', tag: 'other',
          cost: 0, price: 0, hours: 0, h: 0,
          _part: partKey, _viewTab: 'exterior',
          id: 'dmg_' + Date.now() + '_' + Math.random()
        });
        added++;
      }
    }
  });

  // 作業順（getProcessOrder）でソートして追加
  toAdd.sort(function(a,b){return getProcessOrder(a) - getProcessOrder(b);});
  toAdd.forEach(function(t){ sel.push(t); });

  // サスペンション系：アライメント調整を強制追加（最後に）
  if(needsAlignment){
    var alreadyAlign = sel.find(function(s){
      return s.name && (s.name.indexOf('アライメント') >= 0 || s.name.indexOf('サイドスリップ') >= 0);
    });
    if(!alreadyAlign){
      // フロントサスペンションのアライメント調整を使用
      var alignTask = null;
      var fsData = PARTS_DATA['フロントサスペンション（右）'];
      if(fsData){
        alignTask = fsData.find(function(t){return t.process === 'アライメント';});
      }
      if(alignTask){
        sel.push(Object.assign({}, alignTask, {
          _part: 'フロントサスペンション（右）',
          _viewTab: 'suspension',
          id: 'align_' + Date.now(),
          cost: alignTask.cost || 17000,
          price: alignTask.cost || 17000,
          h: alignTask.hours || 1.0
        }));
        added++;
        showNotify('✅ '+added+'件の作業を追加しました\n⚠ 足回り系のため「アライメント調整」を自動追加しました');
      } else {
        showNotify('✅ '+added+'件の作業を追加しました');
      }
    } else {
      showNotify('✅ '+added+'件の作業を追加しました');
    }
  } else {
    showNotify('✅ '+added+'件の作業を追加しました');
  }

  autoSaveM();
  rIP();
}

function pFill(key){
  var b=getBP()[key]; if(!b) return '#eeeeee';
  if(b.p.includes(curPart)) return '#1a3a6b';
  if(sel.find(function(s){return b.p.some(function(p){return s._part===p;});})) return '#c8e6c9';
  return '#dce8f8';
}
function pStroke(key){
  var b=getBP()[key]; if(!b) return '#cccccc';
  if(b.p.includes(curPart)) return '#1a3a6b';
  if(sel.find(function(s){return b.p.some(function(p){return s._part===p;});})) return '#2e7d32';
  return '#2a5298';
}
var _bpCache={};
function selectParts(key){
  var fps=_bpCache[key];
  if(!fps||!fps.length){var b=getBP()[key];if(b)fps=b.p.filter(function(p){return PARTS_DATA[p];});}
  if(!fps||!fps.length) return;
  curPart=fps[0]; curParts=fps; kw=''; rIP(); checkDamageSuggest(fps[0]);
}
function ponclick(key){
  var b=getBP()[key];
  if(!b) return '';
  var fps=b.p.filter(function(p){return PARTS_DATA[p];});
  if(!fps.length) return '';
  _bpCache[key]=fps;
  return 'onclick="selectParts(\'' + key + '\')"';
}

function addWorkSet(key){
  // ライナー取外し取付を1行でpushするヘルパー（往復 1.0h）
  function pushLiner(side){
    var nm='Rフェンダーライナー 取外し取付（'+side+'）';
    var dup=sel.some(function(s){return s.name===nm;});
    if(dup)return;
    var lr=effectiveLR({tag:'remove'});
    sel.push({id:Date.now()+'_'+Math.random(),name:nm,process:'取外し取付',tag:'remove',hours:1.0,h:1.0,cost:Math.round(1.0*lr),price:Math.round(1.0*lr),stdH:1.0});
  }
  function pushFLiner(side){
    var nm='Fフェンダーライナー 取外し取付（'+side+'）';
    var dup=sel.some(function(s){return s.name===nm;});
    if(dup)return;
    var lr=effectiveLR({tag:'remove'});
    sel.push({id:Date.now()+'_'+Math.random(),name:nm,process:'取外し取付',tag:'remove',hours:1.0,h:1.0,cost:Math.round(1.0*lr),price:Math.round(1.0*lr),stdH:1.0});
  }
  // タイヤ取外し取付を追加するヘルパー
  function pushTire(partKey){
    var pd=PARTS_DATA[partKey];
    if(!pd)return;
    var task=pd.find(function(t){return t.process==='取外し取付';});
    if(!task)return;
    var dup=sel.some(function(s){return s.name===task.name&&s.process===task.process;});
    if(dup)return;
    var h=task.hours||0;
    var lr=effectiveLR(task);
    sel.push({id:Date.now()+'_'+Math.random(),name:task.name,process:task.process,tag:task.tag||'remove',hours:h,h:h,cost:Math.round(h*lr),price:Math.round(h*lr),stdH:h});
  }
  // リフトアップを追加するヘルパー
  function pushLift(){
    var pd=PARTS_DATA['リフトアップ・タイヤ取外し'];
    if(!pd)return;
    var task=pd[0];
    if(!task)return;
    var dup=sel.some(function(s){return s.name===task.name&&s.process===task.process;});
    if(dup)return;
    var h=task.hours||0;
    var lr=effectiveLR(task);
    sel.push({id:Date.now()+'_'+Math.random(),name:task.name,process:task.process,tag:task.tag||'remove',hours:h,h:h,cost:Math.round(h*lr),price:Math.round(h*lr),stdH:h});
  }

  var prevLen=sel.length;
  pushLift();
  if(key==='set_fbump'){
    pushTire('タイヤ・ホイール右F'); pushTire('タイヤ・ホイール左F');
    pushFLiner('右'); pushFLiner('左');
  } else if(key==='set_rbump'){
    pushTire('タイヤ・ホイール右R'); pushTire('タイヤ・ホイール左R');
    pushLiner('右'); pushLiner('左');
  } else if(key==='set_side_r'){
    pushTire('タイヤ・ホイール右F'); pushTire('タイヤ・ホイール右R');
    pushFLiner('右'); pushLiner('右');
  } else if(key==='set_side_l'){
    pushTire('タイヤ・ホイール左F'); pushTire('タイヤ・ホイール左R');
    pushFLiner('左'); pushLiner('左');
  } else if(key==='set_ffend_r'){
    pushTire('タイヤ・ホイール右F');
    pushFLiner('右');
  } else if(key==='set_ffend_l'){
    pushTire('タイヤ・ホイール左F');
    pushFLiner('左');
  } else if(key==='set_rfend_r'){
    pushTire('タイヤ・ホイール右R');
    pushLiner('右');
  } else if(key==='set_rfend_l'){
    pushTire('タイヤ・ホイール左R');
    pushLiner('左');
  }

  if(sel.length > prevLen){render();checkArabikiSuggestion();}
  else{alert('このセットは既に全て追加済みです');}
}

function pcSet(field, val){
  paintCalcState[field]=val;
  var el=document.getElementById('paint-calc-panel');
  if(el)el.innerHTML=renderPaintCalcPanel();
}
function pcTogglePart(key){
  paintCalcState.parts[key]=!paintCalcState.parts[key];
  if(!paintCalcState.parts[key]) delete paintCalcState.polish[key];
  var el=document.getElementById('paint-calc-panel');
  if(el)el.innerHTML=renderPaintCalcPanel();
}
function pcTogglePolish(key){
  paintCalcState.polish[key]=!paintCalcState.polish[key];
  var el=document.getElementById('paint-calc-panel');
  if(el)el.innerHTML=renderPaintCalcPanel();
}

function applyPaintCalc(){
  var cs=paintCalcState;
  var cnt=0;
  var paintSum=0;
  PAINT_PARTS.forEach(function(p){
    if(!cs.parts[p.key])return;
    cnt++;
    paintSum+=(cs.coat==='3coat'?p.coat3:p.coat2);
  });
  if(cnt===0){alert('部位を選択してください');return;}
  var adjustedSum=paintSum*(1+cnt*0.1);
  var tbl=PAINT_TIME_TABLE[cs.coat+'_'+cs.season];
  var dryH=tbl.dry, boothH=tbl.booth, bakeH=tbl.bake;
  var totalPaintH=adjustedSum+dryH;
  var paintLR=Math.round(RATE*getTotalPaintCoef());
  var laborLR=Math.round(RATE*getTotalLaborCoef());
  var polishSum=0;
  PAINT_PARTS.forEach(function(p){if(cs.polish[p.key])polishSum+=p.polish;});

  var noteStr=cs.note?'（'+cs.note+'）':'';

  // 既存の塗装計算追加分を削除（tag===paintcalc）
  sel=sel.filter(function(s){return s._paintcalc!==true;});

  // 塗装工数
  sel.push({
    id:'pc_paint_'+Date.now(),name:'塗装（塗り+乾燥）'+noteStr,
    process:'パネル塗装',tag:'paint',
    hours:Math.round(totalPaintH*100)/100,
    h:Math.round(totalPaintH*100)/100,
    cost:Math.round(totalPaintH*paintLR),
    price:Math.round(totalPaintH*paintLR),
    stdH:Math.round(totalPaintH*100)/100,_paintcalc:true
  });
  // ブース
  if(boothH>0){
    sel.push({
      id:'pc_booth_'+Date.now(),name:'ブース使用'+noteStr,
      process:'使用',tag:'booth',
      hours:boothH,h:boothH,
      cost:Math.round(boothH*2000),price:Math.round(boothH*2000),
      stdH:boothH,_paintcalc:true
    });
  }
  // 焼付
  if(bakeH>0){
    sel.push({
      id:'pc_bake_'+Date.now(),name:'焼付乾燥'+noteStr,
      process:'乾燥',tag:'booth',
      hours:bakeH,h:bakeH,
      cost:Math.round(bakeH*2000),price:Math.round(bakeH*2000),
      stdH:bakeH,_paintcalc:true
    });
  }
  // 磨き
  if(polishSum>0){
    sel.push({
      id:'pc_polish_'+Date.now(),name:'磨き肌調整'+noteStr,
      process:'磨き肌調整',tag:'remove',
      hours:Math.round(polishSum*100)/100,
      h:Math.round(polishSum*100)/100,
      cost:Math.round(polishSum*laborLR),
      price:Math.round(polishSum*laborLR),
      stdH:Math.round(polishSum*100)/100,_paintcalc:true
    });
  }

  // 見積書備考欄に色名を追記
  if(cs.note){
    var existNote=customer.estNote||'';
    var lineToAdd='【塗装】'+cs.note+' ('+cs.coat+'/'+totalPaintH.toFixed(2)+'h)';
    if(existNote.indexOf(lineToAdd)<0){
      customer.estNote=(existNote?existNote+'\n':'')+lineToAdd;
    }
  }
  // 備考をリセット（次の塗装のため）
  paintCalcState.note='';

  render();
  checkArabikiSuggestion();
  alert('塗装工数を見積に追加しました！\n塗装+乾燥: '+totalPaintH.toFixed(2)+'h / ブース: '+boothH+'h / 焼付: '+bakeH+'h'+(polishSum>0?' / 磨き: '+polishSum.toFixed(1)+'h':'')+(noteStr?' / 色: '+cs.note:''));
}

// ===== ② あらびき作業 自動提案（50万超え） =====
function checkArabikiSuggestion(){
  var t=calcTotals();
  if(t.labor<500000)return;
  // 既にあらびきがあれば追加しない
  var already=sel.some(function(s){return s.name&&s.name.indexOf('あらびき')>=0;});
  if(already)return;
  if(confirm('⚠️ 工賃合計が¥'+t.labor.toLocaleString()+' と50万円を超えています。\n「あらびき作業」(0.5h)を追加しますか？')){
    var laborLR=Math.round(RATE*getTotalLaborCoef());
    sel.push({
      id:'arabiki_'+Date.now(),
      name:'あらびき作業（修理後仕上前研磨）',
      process:'その他',
      tag:'other',
      hours:0.5,h:0.5,
      cost:Math.round(0.5*laborLR),
      price:Math.round(0.5*laborLR),
      stdH:0.5
    });
    render();
  }
}

        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        ${isLinked?`<button class="btn btn-g" onclick="savePaintToVehicle()" style="font-size:12px">💾 この係数を車両に登録</button>`:''}
        <button class="btn btn-sm" onclick="ST('master',document.querySelectorAll('.tab')[2])" style="font-size:11px">📋 マスター管理で確認</button>
      </div>
    </div>
  </div>

    <div style="font-size:11px;font-weight:bold;color:#999;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.8px">塗装工数係数設定（マニュアル準拠）</div>

      <strong>計算式：</strong>　金額 = 基準LR(${RATE.toLocaleString()}) × 車格係数(<strong>${gc.toFixed(2)}</strong>) × 塗装係数(${PAINT_BASE}) × 塗装工数係数(<strong>${p4.toFixed(3)}</strong>) × 工数<br>

    </div>
    <div class="paint-grid">
      ${Object.entries(PAINT_MASTERS).map(([k,opts])=>`<div class="paint-card">

function calcPaintMatAuto(){
  // 塗装工数の合計（tag=paint）× 塗装LR × 30%
  var paintH = sel.filter(function(t){return t.tag==='paint';})
                  .reduce(function(s,t){return s+(t.h||parseFloat(t.hours)||0);},0);
  var paintLR = Math.round(RATE * getTotalPaintCoef());
  return Math.round(paintH * paintLR * 0.30);
}
function calcTotals(){
  const labor=sel.reduce((s,t)=>s+(t.cost||t.price||parseFloat(t.editC)||0),0);
  const pt=partsItems.reduce((s,p)=>s+(parseFloat(p.cost)||0)*((100+(parseFloat(p.profit)||0))/100),0);
  var mt;
  if(matAutoMode){
    mt = calcPaintMatAuto();
  } else {
    mt = matItems.reduce((s,m)=>s+(parseFloat(m.cost)||0)*((100+(parseFloat(m.profit)||0))/100),0);
  }
  const sub=labor+pt+mt;
  const tax=Math.round(sub*0.1);
  const total=sub+tax;
  const discount=parseFloat(customer.discount)||0;
  const deductible=parseFloat(customer.deductible)||0;
  const actualIncome=total-discount;  // 実入金 = 合計 - 値引き（損金）
  return{labor,pt,mt,sub,tax,total,discount,deductible,actualIncome};
}
function uS(){const{labor,pt,mt,sub,tax}=calcTotals();const sb=document.getElementById('sB');if(sb)sb.innerHTML=sumHTML(labor,pt,mt,sub,tax);}

function addMatRow(){matData.push({id:'mat_'+Date.now(),bango:'',name:'新規材料',capacity:1000,price:0,gtan:0,useG:0});render();}
function delMatRow(idx){if(!confirm('「'+matData[idx].name+'」を削除しますか？'))return;matData.splice(idx,1);render();}
function recalcGtan(idx){var m=matData[idx];if(m.capacity>0&&m.price>0)m.gtan=Math.round(m.price/m.capacity*100)/100;render();}
function saveMatMaster(){try{localStorage.setItem('fa_mat_master',JSON.stringify(matData));showNotify('材料マスターを保存しました（'+matData.length+'品番）');}catch(e){alert('保存に失敗しました');}}
function resetMatMaster(){if(!confirm('マスターを初期状態に戻しますか？'))return;matData=JSON.parse(JSON.stringify(MATERIAL_MASTER));localStorage.removeItem('fa_mat_master');render();}

function clearMatUse(){
  if(!confirm("\u4F7F\u7528\u91CF\u3092\u5168\u3066\u30AF\u30EA\u30A2\u3057\u307E\u3059\u304B\uFF1F"))return;
  matData.forEach(function(m){m.useG=0;});render();
}
function applyMatToEst(){
  var total=matCostTotal();
  if(total<=0){alert("\u4F7F\u7528\u91CF\u304C\u5165\u529B\u3055\u308C\u3066\u3044\u307E\u305B\u3093");return;}
  var profit=customer.matProfit!=null?customer.matProfit:0.3;
  var sell=Math.round(total/(1-profit)/50)*50;
  customer.mat=sell;
  showNotify("\u6750\u6599\u4EE3\u3092\u898B\u7A4D\u306B\u53CD\u6620\u3057\u307E\u3057\u305F");
  ST("estimate",document.querySelectorAll(".tab")[0]);

function markBackupDone(){try{localStorage.setItem('fa_last_backup_date',new Date().toISOString().split('T')[0]);}catch(e){}}
function exportData(){

function importData(){
  var inp=document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0]; if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.customers||!data.vehicles){alert('\u30d5\u30a1\u30a4\u30eb\u5f62\u5f0f\u30a8\u30e9\u30fc'); return;}
        if(!confirm(data.customers.length+'\u9867\u5ba2\u3001'+data.vehicles.length+'\u8eca\u4e21\u3092\u5fa9\u5143\u3002\u73fe\u5728\u30c7\u30fc\u30bf\u306f\u4e0a\u66f8\u304d\u3055\u308c\u307e\u3059\u3002\u7d9a\u3051\u307e\u3059\u304b'))return;
        cMaster=data.customers; vMaster=data.vehicles;
        if(data.matMaster&&data.matMaster.length>0) matData=data.matMaster;
        try{
          localStorage.setItem('fa_c6',JSON.stringify(cMaster));
          localStorage.setItem('fa_v6',JSON.stringify(vMaster));
          if(data.matMaster) localStorage.setItem('fa_mat_master',JSON.stringify(matData));
        }catch(err){}
        render();
        showNotify('\u2705 \u5fa9\u5143\u5b8c\u4e86 '+cMaster.length+'\u9867\u5ba2 '+vMaster.length+'\u8eca\u4e21');
      }catch(err){ alert('\u30a8\u30e9\u30fc:'+err.message); }
    };
    reader.readAsText(file,'UTF-8');
  };
  inp.click();
}

   ['\ufeff'+vH+'\n'+vR.join('\n'),'\u8eca\u4e21\u30de\u30b9\u30bf\u30fc_'+d+'.csv']

var GD_CLIENT_ID='';
var GD_API_KEY='';
var GD_LOADED=false;
var GD_TOKEN=null;

function gdLoadAPI(){
  if(GD_LOADED)return;
  var s=document.createElement('script');
  s.src='https://apis.google.com/js/api.js';
  s.onload=function(){
    gapi.load('client:auth2',function(){
      gapi.client.init({
        apiKey:GD_API_KEY,
        clientId:GD_CLIENT_ID,
        discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        scope:'https://www.googleapis.com/auth/drive.file'
      }).then(function(){
        GD_LOADED=true;
        showNotify('Google Drive API \u63a5\u7d9a\u6e96\u5099\u5b8c\u4e86');
      }).catch(function(e){
        showNotify('API\u30a8\u30e9\u30fc: '+(e.error||e.message||e));
      });
    });
  };
  document.head.appendChild(s);
}

function gdSignIn(){
  if(!GD_CLIENT_ID||!GD_API_KEY){
    alert('\u30af\u30e9\u30a4\u30a2\u30f3\u30c8ID\u3068API\u30ad\u30fc\u3092\u5165\u529b\u3057\u3066\u300c\u8a2d\u5b9a\u4fdd\u5b58\u300d\u3092\u62bc\u3057\u3066\u304f\u3060\u3055\u3044');
    return;
  }
  if(!GD_LOADED){gdLoadAPI();setTimeout(gdSignIn,2000);return;}
  gapi.auth2.getAuthInstance().signIn().then(function(){
    GD_TOKEN=gapi.auth2.getAuthInstance().currentUser.get().getAuthResponse().access_token;
    showNotify('\u2705 Google Drive\u30ed\u30b0\u30a4\u30f3\u6210\u529f');
    var el=document.getElementById('gdStatus');
    if(el){el.textContent='\u63a5\u7d9a\u4e2d';el.style.color='#2e7d32';}
  }).catch(function(e){
    showNotify('Google Drive\u30ed\u30b0\u30a4\u30f3\u5931\u6557');
  });
}

function gdSave(){
  if(!GD_TOKEN){
    if(confirm('Google Drive\u306b\u30ed\u30b0\u30a4\u30f3\u3057\u307e\u3059\u304b\uff1f')){gdSignIn();}
    return;
  }
  var d=new Date().toISOString().split('T')[0];

  var meta={name:fname,mimeType:'application/json'};
  var form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',new Blob([json],{type:'application/json'}));
  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',
    headers:{Authorization:'Bearer '+GD_TOKEN},

  }).then(function(r){return r.json();}).then(function(f){

async function lookupZip(zip){
  var clean=zip.replace(/[^0-9]/g,'');
  if(clean.length!==7){ alert('郵便番号は7桁で入力してください（例：4370123）'); return; }
  try{
    var res=await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+clean);
    var data=await res.json();
    if(data.results&&data.results[0]){
      var r=data.results[0];
      var addr=r.address1+r.address2+r.address3;
      // 顧客マスターの住所欄に反映
      var addrEl=document.getElementById('editAddr');
      if(addrEl){ addrEl.value=addr; }
      // cMaster編集中のデータにも反映
      if(typeof editingCustomer!=='undefined'&&editingCustomer!==null){
        cMaster[editingCustomer].address=addr;
      }
      showNotify('\u2705 住所: '+addr);
    } else {
      showNotify('\u26a0 郵便番号が見つかりません');
    }
  }catch(e){
    showNotify('\u26a0 住所検索失敗: '+e.message);
  }
}

  showNotify('住所から郵便番号を検索中...');

}

// ===== 見積 Supabase保存・読込 =====

async function generateEstimateNo(){
  var d=new Date();
  var year=d.getFullYear().toString();
  var base='FA-'+year+'-';
  try{
    var res=await fetch(SUPABASE_URL+'/rest/v1/estimates?estimate_no=like.'+encodeURIComponent(base)+'*&order=estimate_no.desc&limit=1',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    var data=await res.json();
    if(data&&data.length>0){
      var last=data[0].estimate_no||'';
      var parts=last.split('-');
      var seq=parseInt(parts[parts.length-1]||'0')+1;
      return base+('000'+seq).slice(-4);
    }
  }catch(e){console.error('採番エラー:',e);}
  return base+'0001';
}

async function saveEstimate(){
  var ok=await testConnection();
  if(!ok){showNotify('\u26a0 Supabase\u672a\u63a5\u7d9a');return;}
  if(!sel.length){showNotify('\u26a0 \u4f5c\u696d\u304c\u9078\u629e\u3055\u308c\u3066\u3044\u307e\u305b\u3093');return;}
  showNotify('\u2601 \u898b\u7a4d\u3092\u4fdd\u5b58\u4e2d...');
  try{
    var estNo=customer.no||await generateEstimateNo();
    customer.no=estNo;
    var tots=calcTotals();
    var estData={
      estimate_no:estNo,
      customer_name:customer.name||'',
      car_name:customer.car||'',
      plate:customer.plate||'',
      color_name:customer.color||'',
      color_code:customer.colorCode||'',
      estimate_date:customer.date||new Date().toISOString().split('T')[0],
      grade:customer.grade||'\u4e2d\u578b',
      grade_coef:getGradeCoef(),
      film_type:pc4.film,paint_type:pc4.paint,clear_type:pc4.clear,special:pc4.special,
      labor_total:tots.labor,
      parts_total:Math.round(tots.pt),
      mat_total:Math.round(tots.mt),
      subtotal:Math.round(tots.sub),
      tax_total:tots.tax,
      grand_total:Math.round(tots.sub)+tots.tax,
      status:'draft'
    };
    // 既存削除→再INSERT
    await fetch(SUPABASE_URL+'/rest/v1/estimates?estimate_no=eq.'+encodeURIComponent(estNo),{
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    var r1=await fetch(SUPABASE_URL+'/rest/v1/estimates',{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify(estData)
    });
    if(!r1.ok){var e1=await r1.text();throw new Error('\u30d8\u30c3\u30c0\u4fdd\u5b58\u5931\u6557:'+e1);}
    var estArr=await r1.json();
    var estId=estArr[0].id;
    // 明細保存
    var items=sel.map(function(s,i){return{
      estimate_id:estId,
      part_name:s._part||s.part||'',
      item_name:s.name||'',
      process:s.process||'',
      tag:s.tag||'remove',
      hours:s.hours||0,
      actual_hours:s.h||0,
      cost:s.cost||0,
      sort_order:i
    };});
    await fetch(SUPABASE_URL+'/rest/v1/estimate_items',{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(items)
    });
    // 部品・材料保存
    var pm=(partsItems||[]).filter(function(p){return p.name||p.cost;}).map(function(p,i){return{estimate_id:estId,item_type:'parts',name:p.name||'',cost:parseInt(p.cost)||0,profit:parseInt(p.profit)||10,sort_order:i};});
    var mm=(matItems||[]).filter(function(m){return m.name||m.cost;}).map(function(m,i){return{estimate_id:estId,item_type:'material',name:m.name||'',cost:parseInt(m.cost)||0,profit:parseInt(m.profit)||30,sort_order:i};});
    var all=pm.concat(mm);
    if(all.length>0){
      await fetch(SUPABASE_URL+'/rest/v1/estimate_parts',{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify(all)
      });
    }
    showNotify('\u2705 \u898b\u7a4d\u4fdd\u5b58\u5b8c\u4e86 '+estNo);
    render();
  }catch(e){
    console.error('saveEstimate error:',e);
    showNotify('\u274c \u4fdd\u5b58\u5931\u6557:'+e.message);
  }
}

function buildEstRows(list){
  return list.map(function(e){
    var total=(e.grand_total||0).toLocaleString();
    var oc="loadEstimate('"+e.id+"','"+e.estimate_no+"')";
    return '<tr style="border-bottom:1px solid #f0f0f0;cursor:pointer;" onmouseover="this.style.background=\'#f5f7ff\'" onmouseout="this.style.background=\'\'">'
      +'<td style="padding:5px 6px;font-weight:bold;color:#1a3a6b;">'+e.estimate_no+'</td>'
      +'<td style="padding:5px 6px;">'+(e.customer_name||'-')+'</td>'
      +'<td style="padding:5px 6px;">'+(e.car_name||'-')+'</td>'
      +'<td style="padding:5px 6px;text-align:right;font-weight:bold;">¥'+total+'</td>'
      +'<td style="padding:5px 6px;color:#888;">'+(e.estimate_date||'')+'</td>'
      +'<td style="padding:4px 6px;">'
      +'<button onclick="'+oc+'" style="background:#1a3a6b;color:white;border:none;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;">呼出し</button>'
      +'</td></tr>';
  }).join('');
}

function filterEstList(kw){
  if(!window._estListAll) return;
  var filtered=kw
    ? window._estListAll.filter(function(e){
        return (e.estimate_no||'').indexOf(kw)>=0
            || (e.customer_name||'').indexOf(kw)>=0
            || (e.car_name||'').indexOf(kw)>=0;
      })
    : window._estListAll;
  var rows=document.getElementById('estListRows');
  if(rows) rows.innerHTML=buildEstRows(filtered);
}

function aiApplyChecked(){
  if(!aiState.proposals || !aiState.proposals.tasks) return;
  var added = 0;
  var laborLR = Math.round(RATE * getTotalLaborCoef());
  var paintLR = Math.round(RATE * getTotalPaintCoef());
  aiState.proposals.tasks.forEach(function(t, i){
    var cb = document.getElementById('ai_cb_' + i);
    if(!cb || !cb.checked) return;
    // 重複チェック
    var dup = sel.find(function(s){ return s.name === t.name && s.process === t.process; });
    if(dup) return;
    var isPaint = (t.tag === 'paint' || t.tag === 'booth');
    var lr = isPaint ? paintLR : laborLR;
    var h = parseFloat(t.hours) || 0;
    sel.push({
      id: 'ai_' + Date.now() + '_' + i + '_' + Math.random(),
      name: t.name || '',
      process: t.process || 'その他',
      tag: t.tag || 'remove',
      hours: h, h: h,
      cost: h ? Math.round(lr * h) : (t.cost || 0),
      price: h ? Math.round(lr * h) : (t.cost || 0),
      stdH: h,
      _part: (aiState.selectedParts[0] ? (getBP()[aiState.selectedParts[0]] ? getBP()[aiState.selectedParts[0]].p[0] : '') : ''),
      _viewTab: 'exterior',
      _aiAssist: true
    });
    added++;
  });
  if(added === 0){ showNotify('⚠ 追加できる作業がありません（重複または未選択）'); return; }
  aiState.proposals = null;
  aiState.checkedItems = {};
  autoSaveM();
  showNotify('✅ AI提案から ' + added + ' 件の作業を追加しました');
  ST('estimate', document.querySelector('.tab'));
}

        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    var data = await resp.json();
    var text = '';
    if(data.content && data.content.length){
      data.content.forEach(function(c){ if(c.type === 'text') text += c.text; });
    }
    text = text.replace(/```json|```/g, '').trim();
    var parsed = JSON.parse(text);
    // checkedItemsを全チェック状態で初期化
    aiState.checkedItems = {};
    if(parsed.tasks){ parsed.tasks.forEach(function(t, i){ aiState.checkedItems[i] = true; }); }
    aiState.proposals = parsed;
  } catch(e){
    aiState.proposals = {
      summary: '取得エラー',
      comment: 'AI応答の取得に失敗しました。もう一度お試しください。エラー: ' + e.message,
      tasks: []
    };
  }

  aiState.loading = false;
  render();
}
// ===== AIアシストここまで =====

function render(){
  const c=document.getElementById('TC');
  if(curTab==='estimate')c.innerHTML=renderEstimate();
  else if(curTab==='paint')c.innerHTML=renderPaint();
  else if(curTab==='master'){
    c.innerHTML=renderMaster();
    // マスタータブを開くたびに接続状態を更新
    updateCloudTag();
  }
  else if(curTab==='material')c.innerHTML=renderMaterial();
  else if(curTab==='manual')c.innerHTML=renderManual();
  else if(curTab==='aiassist')c.innerHTML=renderAiAssist();
  else if(curTab==='workorder')c.innerHTML=renderWorkOrder();
  else if(curTab==='preview')c.innerHTML=renderPreview();
  else c.innerHTML=renderPreview();
  // 見出しボタンのアクティブ状態を更新
  ['both','process','group','none'].forEach(function(m){
    var btn=document.getElementById('hm-'+m);
    if(btn){btn.style.background=headerMode===m?'#1a3a6b':'#fff';btn.style.color=headerMode===m?'white':'#333';btn.style.fontWeight=headerMode===m?'bold':'normal';}
  });
}

function updateCloudTag(){
  var tag=document.getElementById('dbModeTag');
  if(!tag) return;
  if(DB_MODE==='cloud'){
    tag.textContent='CLOUD ☁';
    tag.style.background='#c8e6c9';
    tag.style.color='#1b5e20';
  } else {
    tag.textContent='LOCAL';
    tag.style.background='#e0e0e0';
    tag.style.color='#555';
    // LOCALの場合は接続テストを再試行
    testConnection().then(function(ok){
      if(ok) updateCloudTag();
    });
  }
}
render();
</script>
