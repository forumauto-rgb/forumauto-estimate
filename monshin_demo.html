<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>フォーラムオート 受付問診(試作品デモ)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1c2a47; --navy-deep:#131e35; --gold:#b0893c; --gold-soft:#d8c08a;
    --paper:#f6f3ec; --card:#ffffff; --ink:#22293a; --sub:#5a6274;
    --line:#e3ddcf; --ok:#2e7d32; --warn:#b3541e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--paper); color:var(--ink);
    font-family:'Noto Sans JP',sans-serif; height:100%;}
  #app{width:100%; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
  main{width:100%; max-width:1100px; margin:0 auto;}
  @media (min-width:900px){
    .qtext{font-size:34px;}
    .choices{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
    .choices button.primary{grid-column:1 / -1;}
    .parts{grid-template-columns:repeat(3,1fr);}
    button.choice{font-size:24px; min-height:76px;}
    .staffList{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  }

  /* ヘッダー */
  header{background:var(--navy); color:#fff; padding:14px 18px; display:flex; align-items:center; justify-content:space-between;}
  header .brand{font-family:'Noto Serif JP',serif; font-size:20px; letter-spacing:.12em;}
  header .brand small{display:block; font-size:11px; color:var(--gold-soft); letter-spacing:.3em; font-family:'Noto Sans JP',sans-serif;}
  #btnStaff{background:var(--warn); color:#fff; border:none; border-radius:10px;
    font-size:18px; font-weight:700; padding:12px 18px; cursor:pointer;}

  /* 進捗 */
  #progressWrap{padding:10px 18px 0;}
  #progressLabel{font-size:16px; color:var(--sub); margin-bottom:6px;}
  #bar{height:10px; background:var(--line); border-radius:5px; overflow:hidden;}
  #barFill{height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--gold-soft)); transition:width .3s;}

  /* 質問エリア */
  main{flex:1; padding:20px 18px 120px; display:flex; flex-direction:column;}
  .qnum{color:var(--gold); font-weight:700; font-size:16px; letter-spacing:.2em; margin-bottom:6px;}
  .qtext{font-family:'Noto Serif JP',serif; font-size:29px; font-weight:700; line-height:1.5;
    border-left:6px solid var(--gold); padding-left:14px; margin:0 0 8px;}
  .qnote{font-size:18px; color:var(--sub); margin:4px 0 16px; line-height:1.6;}
  .choices{display:flex; flex-direction:column; gap:14px; margin-top:8px;}
  button.choice{background:var(--card); border:2px solid var(--line); border-radius:14px;
    min-height:68px; font-size:23px; font-weight:500; color:var(--ink); text-align:left;
    padding:14px 20px; cursor:pointer; font-family:inherit; line-height:1.4;
    box-shadow:0 1px 3px rgba(28,42,71,.08); transition:border-color .15s;}
  button.choice:active{border-color:var(--gold);}
  button.choice.selected{border-color:var(--gold); background:#fdf9ef; font-weight:700;}
  button.choice .mark{color:var(--gold); font-weight:700; margin-right:8px;}
  .parts{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .parts button.choice{min-height:60px; font-size:20px; text-align:center; padding:12px 8px;}
  button.primary{background:var(--navy); color:#fff; border:none; border-radius:14px;
    min-height:68px; font-size:23px; font-weight:700; cursor:pointer; margin-top:18px; font-family:inherit;}
  button.primary:disabled{opacity:.35;}
  .alertbox{background:#fff7ee; border:2px solid var(--warn); color:#7a3a12;
    border-radius:12px; padding:14px 16px; font-size:19px; line-height:1.6; margin-top:14px;}

  /* テンキー */
  .pad{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:360px; margin:10px auto;}
  .pad button{min-height:64px; font-size:26px; border-radius:12px; border:2px solid var(--line);
    background:var(--card); cursor:pointer; font-family:inherit;}
  #padView{font-size:34px; letter-spacing:.3em; text-align:center; min-height:48px; font-weight:700;}

  /* フッター */
  footer{position:fixed; bottom:0; left:0; right:0; background:rgba(246,243,236,.96);
    border-top:1px solid var(--line); padding:12px 18px; display:flex; justify-content:space-between;}
  footer .inner{max-width:1100px; margin:0 auto; width:100%; display:flex; justify-content:space-between;}
  #progressWrap{max-width:1100px; margin:0 auto; width:100%;}
  #btnBack{background:#e8e4d9; color:var(--ink); border:none; border-radius:10px;
    font-size:19px; padding:14px 22px; cursor:pointer; font-family:inherit;}
  #demoTag{align-self:center; color:var(--sub); font-size:14px;}

  /* スタッフ確認 */
  .staffList{display:flex; flex-direction:column; gap:8px;}
  .srow{background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
  .srow .k{color:var(--sub); font-size:16px;}
  .srow .v{font-size:19px; font-weight:700; text-align:right; max-width:60%;}
  .typebox{background:var(--navy); color:#fff; border-radius:14px; padding:18px; margin-top:16px;}
  .typebox h3{margin:0 0 6px; color:var(--gold-soft); font-family:'Noto Serif JP',serif; font-size:22px;}
  .typebox p{margin:6px 0; font-size:18px; line-height:1.7;}
  .typebox .ban{color:#ffb4a0; font-size:16px; border-top:1px solid rgba(255,255,255,.25); padding-top:8px; margin-top:10px;}

  /* お約束・サイン */
  .promise{background:var(--card); border:2px solid var(--gold); border-radius:16px; padding:20px;}
  .promise h3{font-family:'Noto Serif JP',serif; font-size:26px; margin:0 0 12px; color:var(--navy); text-align:center; letter-spacing:.1em;}
  .promise ol{margin:0; padding-left:26px;}
  .promise li{font-size:21px; line-height:1.8; margin-bottom:10px;}
  #signPad{background:#fff; border:2px dashed var(--gold); border-radius:12px; width:100%; height:200px; touch-action:none;}
  .signRow{display:flex; gap:12px; margin-top:10px;}
  .signRow button{flex:1;}
  button.ghost{background:#e8e4d9; border:none; border-radius:12px; min-height:56px; font-size:19px; cursor:pointer; font-family:inherit;}

  /* 完了 */
  .doneWrap{text-align:center; padding-top:40px;}
  .doneWrap .circle{width:110px; height:110px; border-radius:50%; background:var(--gold);
    color:#fff; font-size:56px; line-height:110px; margin:0 auto 20px;}
  .doneWrap h2{font-family:'Noto Serif JP',serif; font-size:30px; color:var(--navy);}
  .doneWrap p{font-size:20px; color:var(--sub); line-height:1.8;}

  /* オーバーレイ */
  #overlay{position:fixed; inset:0; background:rgba(19,30,53,.75); display:none;
    align-items:center; justify-content:center; z-index:50; padding:20px;}
  #overlay .box{background:#fff; border-radius:16px; padding:28px; max-width:420px; text-align:center;}
  #overlay .box p{font-size:22px; line-height:1.7;}
  #overlay button{margin-top:10px;}
  @media (max-width:480px){ .qtext{font-size:24px;} button.choice{font-size:20px;} }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">フォーラムオート<small>受付問診(試作品デモ)</small></div>
    <button id="btnStaff" onclick="showOverlay()">スタッフをよぶ</button>
  </header>
  <div id="progressWrap">
    <div id="progressLabel"></div>
    <div id="bar"><div id="barFill"></div></div>
  </div>
  <main id="main"></main>
  <footer><div class="inner">
    <button id="btnBack" onclick="goBack()">← まえにもどる</button>
    <span id="demoTag">デモ版: データは保存されません</span>
  </div></footer>
</div>
<div id="overlay"><div class="box">
  <p>スタッフをお呼びしました。<br>そのままお待ちください。</p>
  <p style="font-size:16px;color:#888">(本番ではダッシュボードに通知が飛びます)</p>
  <button class="primary" style="width:100%" onclick="hideOverlay()">とじる</button>
</div></div>

<script>
const A = {};            // 回答
let history = [];        // 画面履歴
let current = 'Q1';
const TOTAL = 14;        // 進捗表示用のおおよその問数

const PARTS = ['フロントバンパー','ボンネット','右フロントフェンダー','左フロントフェンダー','右ドア','左ドア','右クォーター','左クォーター','リヤバンパー','バックドア','ルーフ','その他・わからない'];

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function showOverlay(){document.getElementById('overlay').style.display='flex';}
function hideOverlay(){document.getElementById('overlay').style.display='none';}

function choiceBtns(list, key, next){
  return list.map(t=>`<button class="choice" onclick="pick('${key}', '${esc(t)}', '${next}')"><span class="mark">▸</span>${esc(t)}</button>`).join('');
}
function pick(key, val, next){ A[key]=val; go(routeAfter(key, val, next)); }

// 分岐ロジック
function routeAfter(key, val, next){
  if(key==='cause'){ return (val==='相手のいる事故'||val.startsWith('駐車中')) ? 'Q7' : 'Q10'; }
  if(key==='police'){ return val==='まだ' ? 'Q9NOTE' : 'Q10'; }
  if(key==='payment'){
    if(val==='自分で支払う(実費)') return 'Q11a';
    return (A.cause==='相手のいる事故'||(A.cause&&A.cause.startsWith('駐車中'))) ? 'Q11b' : 'Q12';
  }
  if(key==='rentalRider'){ return (A.cause==='相手のいる事故'||(A.cause&&A.cause.startsWith('駐車中'))) ? 'Q14b' : 'Q15'; }
  if(key==='intent'){ return (A.fault && A.fault.startsWith('相手が全部悪い')) ? 'Q16' : 'Q17'; }
  if(key==='wishSelf'){ return 'Q17'; }
  return next;
}

// 類型判定(第7章)
function decideType(){
  const f=A.fault||'', pay=A.payment||'', vi=A.vehicleIns||'', it=A.intent||'', g=A.goal||'';
  const R=(x)=>x.filter(Boolean).join(' × ');
  if(A.oppIns==='入っていない(無保険)'){
    if(vi==='入っている') return ['I','無保険車対応型(車両保険あり)','相手が無保険。お客様は車両保険加入済みなので、車両保険先行で修理を進め、相手への請求(求償)は損保に任せる。お客様が相手とやり取りする必要はない。',R(['相手=無保険','車両保険=入っている']),
    '「相手の方が保険に入っていなくても、ご安心ください。○○様は車両保険にご加入ですので、まずご自分の車両保険で先に修理を進められます。そのあと相手の方への請求は保険会社が行いますので、○○様が相手とやり取りする必要はありません。悩まれることは何もありませんよ。」'];
    return ['I','無保険車対応型(車両保険なし)','相手が無保険で車両保険もなし。最悪、全額自己負担の可能性。弁護士費用特約の有無を確認し、あれば相手への請求を弁護士に任せる先手を打つ。',R(['相手=無保険','車両保険='+(vi||'なし・不明')]),
    '「正直に申し上げますと、相手の方が無保険の場合、最悪はご自身のお支払いになる可能性があります。ですので先に確認させてください。弁護士費用特約は付いていらっしゃいますか?付いていれば、相手への請求を費用の心配なく弁護士さんに任せられます。先に手を打っておけば、あとで慌てることはありません。当店はどちらの場合でも、損害をきちんと証明するお見積りとお写真をご用意します。」'];
  }
  if(f.startsWith('相手が全部悪い')){
    if(it.startsWith('修理せず')) return ['C','実損害見積型','修理しなくても実損害の賠償は正当な権利。実損害見積を作成して渡す。上乗せ査定は不可の線引きを明確に。',R(['過失=100対0','お気持ち=修理せず賠償のみ']),
    '「修理をされない場合でも、実際の損害分の賠償を受け取るのは正当な権利ですので、ご安心ください。そのための損害のお見積りを当店でお作りします。ひとつだけ正直にお伝えしますと、実際の損害より金額を上乗せするためのお見積りは、当店ではお作りできません。実際の損害をきちんと証明する書類なら、しっかりご用意できますよ。なお、修理をされない場合の損害お見積りは、作成費用としてお見積り額の5%をいただいております。あらかじめご了承ください。」'];
    if(g.startsWith('とにかく早く')) return ['A','早期協定型','相手保険での修理。写真と整合性ある見積を最優先で作成し、AJが承認を取りやすい資料を先回りで用意。代車手配を即対応。',R(['過失=100対0','ご希望=とにかく早く直したい']),
    '「かしこまりました。最短で直す段取りを組みますね。本日お車のお写真を撮らせていただいて、保険会社さんがすぐにOKを出せるお見積りを整えます。書類がきちんとしていると話が早いんです。お代車もすぐご用意しますので、ご不便のないようにいたします。」'];
    if(g.startsWith('補償も')) return ['B','権利説明型','工場選択の自由・実損害賠償は正当な権利であることを正確に説明。修理見積と実損害見積は出せるが交渉用の上乗せ査定は出せないことを明示し、「個人での上乗せ交渉はなかなか大変ですよ」と添えてお客様に選んでいただく(3点セット)。',R(['過失=100対0','ご希望=補償もしっかり']),
    '「今回はお客様に落ち度のない事故ですから、修理も補償も、受け取れるものをきちんと受け取っていただくのが正当な権利です。修理のお見積りと、実際の損害のお見積りまでは当店でしっかりお作りします。ただ、金額を上乗せするための査定はお作りできないんです。上乗せの交渉をご自分でなさるのは、正直なかなか大変ですよ。当店としては、実際の損害を漏れなくきちんと積み上げるお手伝いをさせていただきます。どう進めるかは○○様に決めていただけます。」'];
    return ['D','相談型','3つのお約束を最初に伝えて安心してもらい、選択肢(早く直す/補償重視)を一つずつ説明して選んでもらう。',R(['過失=100対0','ご希望=相談したい']),
    '「ご安心ください。お写真もお見積りも当店がすべてご用意しますので、難しいことは何もお客様にお願いしません。進め方は大きく2つあります。1つめは、とにかく早くお車を直す進め方です。保険会社さんとの話がまとまり次第、すぐ修理に入ります。2つめは、補償の内容をしっかり確かめながら進めるやり方です。お代車の費用など、受け取れるものを漏れなく確認してから進めます。少しお時間はかかりますが、取りこぼしがありません。どちらが○○様のお気持ちに近いですか?」'];
  }
  if(f.startsWith('自分にも過失')){
    if(vi==='入っている') return ['E','自車両保険検討型','双方に過失がある場合は双方の保険で対応が基本。ただし自分の車両保険を使うかは、修理金額と等級ダウンによる保険料割増の損得比較で決める。確定は概算見積後。',R(['過失=自分にも過失あり','車両保険=入っている']),
    '「9対1のように双方に過失がある場合は、それぞれの保険で対応するのが基本の形です。ただ、ご自分の車両保険をお使いになるかは、ここでは決めないでください。修理金額と、保険を使った場合の来年からの保険料の上がり分を比べて、お得な方を選ぶのが一番です。過失分のご負担が割増より小さければ、使わない方が得なこともあります。まず当店でお見積りをお出ししますので、金額が出てから一緒に見比べて決めましょう。」'];
    return ['F','実費併用型','過失分は実費になる可能性を早めに説明。実費と保険の併用見積を用意。',R(['過失=自分にも過失あり','車両保険='+(vi||'なし・不明')]),
    '「過失の分は、ご自身のご負担になる可能性があります。先に正直にお伝えしておきますね。その分、ご負担をなるべく抑えられるよう、直し方の選択肢を入れたお見積りをお作りします。金額を見てから、どこまで直すか一緒に決めましょう。」'];
  }
  if(f) return ['G','両にらみ型','証拠固め(写真・現車確認)を最優先。過失が決まってから支払い方法を確定。見積は先行してよい。',R(['過失='+f]),
  '「過失割合が決まるまで、お支払いの方法は保留で大丈夫ですよ。その間に当店でやっておくべきことがあります。お車のお写真と現車の確認です。これさえきちんと揃っていれば、割合がどう決まっても困ることはありません。今日はその準備をしっかりさせていただきますね。」'];
  if(pay==='保険を使うか迷っている') return ['H','比較判断型','概算見積を先に出し、保険利用と実費の比較で判断してもらう。免責金額・等級の説明。',R(['お支払い=保険を使うか迷っている']),
  '「保険を使うかどうかは、金額を見てから決めるのが一番です。まず概算のお見積りをお出ししますね。保険を使うと来年からの保険料が上がりますので、修理代と比べてどちらが得か、表にして一緒に見比べましょう。それから決めていただければ大丈夫です。」'];
  return null;
}

// ===== 画面定義 =====
const S = {
Q1:{n:'ようこそ', p:1, html:()=>`
  <div class="qnum">はじめに</div>
  <h1 class="qtext">本日はご来店ありがとうございます。<br>当店のご利用は初めてですか?</h1>
  <div class="choices">${choiceBtns(['初めてです','以前も利用しました'],'first','Q2')}</div>`},

Q2:{n:'お客様確認', p:2, html:()=>{
  if(A.first==='以前も利用しました'){
    return `<div class="qnum">お客様確認</div>
    <h1 class="qtext">お電話番号の下4桁を入力してください。</h1>
    <div id="padView">－ － － －</div>
    <div class="pad">${[1,2,3,4,5,6,7,8,9,'←',0,'OK'].map(k=>`<button onclick="padKey('${k}')">${k}</button>`).join('')}</div>
    <p class="qnote" style="text-align:center">(デモ版: どの番号でも進めます)</p>`;
  }
  return `<div class="qnum">お客様確認</div>
  <h1 class="qtext">お車の車検証をスタッフにお渡しください。</h1>
  <p class="qnote">読み取り機でお名前・お車の情報を登録いたします。少々お待ちください。</p>
  <button class="primary" style="width:100%" onclick="A.ocr='OCR読取(デモ)'; go('Q3')">読み取りが終わりました(デモ用)</button>`;
}},

Q3:{n:'損傷の場所', p:3, html:()=>`
  <div class="qnum">お車のこと 1/3</div>
  <h1 class="qtext">お車のどこを直したいですか?</h1>
  <p class="qnote">あてはまる場所を <b>すべて</b> タップしてください。</p>
  <div class="parts choices">${PARTS.map(t=>`<button class="choice ${ (A.parts||[]).includes(t)?'selected':''}" onclick="togglePart('${t}')">${t}</button>`).join('')}</div>
  <button class="primary" ${!(A.parts&&A.parts.length)?'disabled':''} onclick="go('Q4')">えらび終わりました →</button>`},

Q4:{n:'損傷の程度', p:4, html:()=>`
  <div class="qnum">お車のこと 2/3</div>
  <h1 class="qtext">傷やへこみの大きさは、どのくらいですか?</h1>
  <div class="choices">${choiceBtns(['小さい(手のひらくらいまで)','中くらい','大きい(パネル全体など)','わからない'],'level','Q5')}</div>`},

Q5:{n:'走行の可否', p:5, html:()=>`
  <div class="qnum">お車のこと 3/3</div>
  <h1 class="qtext">いま、お車は問題なく走れますか?</h1>
  <div class="choices">${choiceBtns(['問題なく走れる','警告灯・異音など気になる点がある','走れない(レッカーで来た)'],'drivable','Q6')}</div>`},

// ===== 部位・テンキー・サイン =====
function togglePart(t){
  A.parts = A.parts||[];
  const i=A.parts.indexOf(t);
  if(i>=0) A.parts.splice(i,1); else A.parts.push(t);
  render();
}
let padBuf='';
let pinBuf='';
function pinKey(k){
  const err=document.getElementById('pinErr');
  if(k==='←'){pinBuf=pinBuf.slice(0,-1);}
  else if(k==='OK'){
    if(pinBuf==='0632'){pinBuf=''; go('STAFF'); return;}
    if(err) err.style.display='block';
    pinBuf='';
  }
  else if(pinBuf.length<4){pinBuf+=k; if(err) err.style.display='none';}
  const v=document.getElementById('padView');
  if(v) v.textContent=(pinBuf.replace(/./g,'●')+'－－－－').slice(0,4).split('').join(' ');
}
function padKey(k){
  if(k==='←'){padBuf=padBuf.slice(0,-1);}
  else if(k==='OK'){ if(padBuf.length===4){A.tel4=padBuf; A.custName='(候補: 山田太郎 様 ― デモ)'; go('Q3');} return; }
  else if(padBuf.length<4){padBuf+=k;}
  const v=document.getElementById('padView');
  if(v) v.textContent=(padBuf+'－－－－').slice(0,4).split('').join(' ');
}
function initSign(){
  const c=document.getElementById('signPad'); if(!c) return;
  c.width=c.offsetWidth; c.height=200;
  const ctx=c.getContext('2d'); ctx.lineWidth=3; ctx.lineCap='round'; ctx.strokeStyle='#1c2a47';
  let draw=false;
  const pos=e=>{const r=c.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return [p.clientX-r.left,p.clientY-r.top];};
  const start=e=>{draw=true; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault();};
  const move=e=>{if(!draw)return; const [x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); e.preventDefault();};
  const end=()=>{draw=false;};
  c.addEventListener('mousedown',start); c.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  c.addEventListener('touchstart',start,{passive:false}); c.addEventListener('touchmove',move,{passive:false}); c.addEventListener('touchend',end);
}
function clearSign(){const c=document.getElementById('signPad'); c.getContext('2d').clearRect(0,0,c.width,c.height);}

// ===== 画面制御 =====
const KEY2Q={first:'Q1',partsView:'Q3',level:'Q4',drivable:'Q5',cause:'Q6',accDate:'Q7',fault:'Q8',police:'Q9',payment:'Q10',wishSelf:'Q11a',oppIns:'Q11b',insCo:'Q12',vehicleIns:'Q13',rentalRider:'Q14',lawyerRider:'Q14b',intent:'Q15',goal:'Q16',courtesy:'Q17',coating:'Q18',delivery:'Q19',contact:'Q20'};
function jump(key){ if(KEY2Q[key]) go(KEY2Q[key]); }
function go(id){ history.push(current); current=id; render(); window.scrollTo(0,0); }
function goBack(){ if(history.length){ current=history.pop(); render(); } }
function restart(){ for(const k in A) delete A[k]; history=[]; padBuf=''; current='Q1'; render(); }
function render(){
  const s=S[current];
  document.getElementById('main').innerHTML=s.html();
  const done=Math.min(s.p, TOTAL);
  const pct=current==='DONE'?100:Math.round(done/(TOTAL+2)*100);
  document.getElementById('barFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent =
    current==='DONE' ? 'おつかれさまでした' :
    current==='STAFF' ? 'スタッフ確認中' :
    current==='PROMISE' ? 'あとサインだけです' : `かんたんな質問にお答えください(全体の ${pct}% まで来ました)`;
  if(s.after) s.after();
}
render();
</script>
